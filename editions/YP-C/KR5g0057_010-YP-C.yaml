front:
  text: 子陽桃皮田鸞柏葉
  hash: sha256:1b75c61baca43bd6b6c3a2faf19cfc697ce76d7fddc8405501196bff5e30edac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_YP-C_27yiji-04-0136b, image: JY296/27yiji-04-0136b.png}
body:
  text: 眞誥黃子陽魏人也少知長生之妙入博落山中學道九十餘年但食桃皮飲石中黃水後遇司馬季主遂得度世廣記田鸞入華山遇異人指柏木示之曰此長生藥也何求於遠鸞歸服柏葉數年自覺身輕一夕夢神仙持節相引入洞眾仙皆曰服柏仙人來勒名上清玉策金字復告之曰爾且止於人間候有位卽召遂悟自後隱於嵩陽百二十三嵗少容郭無四壁劉有二囷眞境錄郭文字文舉嘗於華陰山石室中得神虎內眞紫元丹章值晉室衰乃負笈入餘杭大滌山伐木倚林苫覆爲舍不置四壁葛裘鹿巾區種菽麥及採箬以貿鹽酪或餘食卽施貧者乾符中封靈曜眞君山中遺跡甚多晉逸史劉驎之字子驥少尚質素虛退寡欲不修儀操人莫知之好遊山澤志在遯逸嘗採藥至衡山深入忘返見有一澗水水南有二石囷一囷閉一囷開深廣不得過欲還失道遇伐薪人問徑僅得還家或說囷中皆仙靈方藥諸雜物驎之欲更尋索終不知處也孝成朿帶自然綸巾丹臺新錄梁諶字孝成諶好樂仙道年十七爲道士卽持齋誦經廣建功德濟諸苦厄視地而履恐傷含氣有鳥獸當衢每下路避之見人卑恭泊然虛靜一旦謂弟子王子年曰吾屬良友待我於南津當往彼爾可知之乃束帶南出子年隨之惟覺雲氣鬱鬱紘覆林谷良久諶忽踊身騰雲倏已不見遙聞鼓吹之音而已本朝蒙求趙自然太平州人夢一人綸巾素袍鬚髮斑白自云姓陰引之登山曰汝有道氣教以辟穀法乃出青柏枝令㗖夢中食之及覺遂不食青巾佳客白衣老人神仙傳陳希夷先生一日謂門人賈昇曰今日有佳客至速報少頃一人衣褐青巾扣門賈走報其人已行賈逐之見一老人衣鹿皮賈問前老人去遠否老人曰此是神仙李八百動則八百里而鹿皮老人亦不見先生曰老人者乃太清得道白鹿先生也今旣不見鹿皮者又去吾不可久留乃返眞漢武傳武帝出遊岱山遇一白衣老人耳聳於頂髮垂於肩頭有數尺之光帝異而問之老人曰予聞嵩山有菖蒲一寸九節服之長生遂不見帝曰此乃岳神也時王興聞之服菖蒲得仙酆丹一斗翁藥千緡續仙傳處州松陽乃張天師修眞之所酆去奢慕前人之迹結菴以居朝夕焚修山南有一巨石嘗坐其上感神人告之曰天師丹劒在此石下可以取之師曰此石天設非人力可加神人曰勤修不怠丹劒可致師如其言不三年神人送丹一斗劒一口師後施丹治病功成上昇又賣藥翁莫知其姓名常提一大葫蘆賣藥人以疾苦求藥得錢不得錢悉與之無不神驗或戲問之有大還丹否曰有一粒厥直千緡人皆笑之以爲風狂後於長安賣藥抖擻其葫蘆已空只餘一粒安於掌中曰百年賣藥無一人買者深可哀哉今當自喫藥方入口足下五色雲生騰空而去銅牌誌鹿金盆射鵲高道傳明皇狩于咸陽獲大鹿命庖人欲烹之張果奏曰此仙鹿也已滿千嵗昔漢武元狩五年臣曾侍從畋之于上林獲此鹿乃放之時以銅牌誌於左角遂命驗之果然有銅牌二寸許但文字彫暗耳又軒轅集宣宗嘗召入問長生可致乎集曰絶聲色薄滋味哀樂一致德施無偏自然與天地合德日月齊明雖堯舜禹湯之道自可致況長生久視乎及退又以金盆覆白鵲試之時集方休於館謂中人曰皇帝安能更令老夫射覆乎中人不諭其意上復令速至集纔及玉陛謂上曰盆下白鵲宜放之上大笑李明合丹伯眞採藥茅山記李明長官避世不仕隱句曲鬱岡山合丹丹成而昇玄洲除大卿之任至今舊迹壇井存焉眞誥姜伯眞入猛山中行道採藥奄遇仙人令伯眞平倚日中其影偏仙人曰子知道之貴而篤志學之不知不正之爲失君欲使心正常以日出時錯手著兩肩上以日當心覺腹煖則心正矣常行之爲佳葛氏蛟帳女媧雲幕徂異志九夷山樵者婦諸葛氏感時疾數日起白舅姑曰新婦不唯疾平復且得仙矣俄出門乘雲而去又數日復回云天上樓觀皆碧玉碾成窗戸悉以珠密綴蛟絲帳幔五色相照行空明中燃不死之香我今暫來相看俄有五色車駕雙龍力士御之女童爲從婦乘之冉冉而去事始云女媧氏作雲幕又煉五色石以補天劉安雞犬靜之龜鶴續仙傳劉安卽漢高祖之孫也安好神仙煉大丹丹成乃去時人傳云安臨去時有餘藥在器內置於庭中雞犬舐啄盡得昇天故人云雞鳴天上犬吠雲中列仙傳蕭靜之絶粒學道一日掘地得一物似人手卽時食之遇一異人告之曰子必餌仙藥矣子所食者肉芝也得肉芝食者壽齊龜鶴宜隱山林以期至道遂遁去德休霹靂王興雲車神仙傳曹德休自言從東海青嶼山來遊於江西人見之三十餘年顏貌不改有疾者以符藥救之無不愈有一女年二十餘將聘於人忽有邪物所魅百方治之益甚其父詣德休具陳病狀德休曰汝家居近山溪有潭穴汝女春月閑步溪側爲蛟所窺以拘攝精魂入其穴矣可將吾一符投於潭中少頃有驗投符後忽見潭水翻涌水中霹靂聲須臾有一物浮出長二丈餘形如烏蛇頭若大杓已劈死矣女病亦尋愈王氏神仙傳王興蜀人昔爲蒲江主簿而境有靈迹興喜之遂去官隱於山中九年忽見洞中瓊花吐艷金蟾跳躍遂入洞中得仙丹服之卽時乘雲車上昇今人以洞號主簿治自此始也浮胡白豹雷公黃蛇神仙傳施存眞人號浮胡先生師黃蘆子得三皇內文驅策虎豹之術隱衡嶽石室山每跨白豹出入晉元康間白日騰昇廣異記武勝之嘗於江灘見雷公逐一黃蛇或以石投之鏗然有聲雷公飛去得一銅劒有文云許旌陽眞君斬蛟第三劒無競懷果孫鍾設瓜青瑣李無競入都調官至朱遷鎭有匄者喧爭於路一嫗曰我終身乞匄聚得少金此子貸去不償無競取金如所逋數與匄者謝曰吾實逋其錢君行路人能償之又解其鬭何以報德吾家在隆和曲筠栅青簾乃所居也子能訪我否無競異之卽往焉入門見數匄者擁鑪共火喜見於色命坐具小酌無競頗疑其人終不飲但濡脣而已時大寒盤中皆夏果取小御桃三枚懷歸丐者以詩送曰君子多疑卽多誤世人無信卽無誠吾家路徑平如砥何事夫君不肯行無競至邸取桃視之乃紫金也後琢其金爲酒器年七十面色紅潤豈酒濡脣之力乎幽冥錄孫鍾少時家貧種瓜瓜熟有三人來乞瓜鐘爲設瓜曰我司命也化白鶴飛去陵陽沆瀣曼卿流霞列仙傳陵陽子春食朝霞夏食沆瀣是夜半天地玄黃之氣也霞日初出青黃氣卽朝霞也抱朴子項曼卿河東蒲坂人入山修道一日有仙人來迎到天上見紫府金牀玉几仙人飲以流霞一杯輙不飢渴忽思家爲帝所斥遂還河東呼爲斥仙人明皇紫雲元之絳雪宣室志唐明皇夢仙子十餘輩御卿雲下列於庭各執樂器而奏之其度曲清越殆非人世也及樂闋有一仙子前而言曰陛下知此樂乎此神仙紫雲曲也今傳授陛下爲唐正始音明皇甚喜卽傳教焉及寤以玉笛吹令習之盡得其節奏仙傳拾遺申元之不知何許人開元中詔至上都開元觀恩渥愈厚明皇與論道動移晷刻嘗命趙雲容侍元之茶藥意甚恭恪乘閑乞藥少許以延其生元之曰我無所惜但爾不久處世耳愈切懇告乃與絳雪丹一粒曰服此丹死必不壞但能大其棺廣其穴含以珠玉疏而有風魂不蕩空魄不淪翳百年外可以復生此爲太陰煉形之道後雲容從幸東洛病於蘭宫得以此事白於貴妃如其所謂道元觀燈知微翫月仙傳拾遣葉法善天師字道元開元初正月望夜明皇移仗上陽宫以觀燈焉尚方匠毛順心結綵樓三十餘間金翠珠玉間厠其內樓高百五十尺微風所動鏗然成韻以燈爲龍鳳螭豹騰擲之狀似非人力上見大悅師曰影燈之盛固無比矣然西京今夕之燈亦以如此適自彼來上異其語今欲一往得乎曰此易爾於是令上閉目俄而至焉上稱其盛者久之請迴復閉目頃之已在樓下而歌舞之曲未終上於涼州以鐵如意貫酒翌日命中使託以他事求如意以還驗之非謬三水小牘道士趙知微有道術中秋積陰不解眾惜良辰知微曰可備酒肴登天柱峰翫月旣出門天色開晴及登峰月如晝至月落方歸下山則淒風苦雨陰晦如前禦寇剖心道君剪舌雲溪友議列禦寇墓在鄭郊有胡生者家貧少爲洗鑑鎪釘之業號胡釘鉸有美酒茶果輒祭禦寇祠以求聰明夢一人刀劃其腹以一卷書致于心腑及覺乃能詩嘗贈韓少府云忽聞梅福來相訪笑著荷衣出草堂兒童不慣見車馬爭入蘆花深處藏廣畢記夔州有道士王洪明舌長呼字不正乃曰誦道德經忽夢道君爲剪其舌旣覺語遂正灰袋佯狂麻襦卓越神仙傳蜀有道士佯狂俗號爲灰袋翟天師之弟子也翟每戒其徒勿輕此人吾所不及嘗大雪中布衣褐入青城山暮投蘭若求宿僧曰貧僧一衲而已矣天寒如此奈何灰袋曰一牀足矣夜半風雪益甚僧意其卒往視之去牀數尺氣如蒸炊流汗袒寢未曉不辭而去曾病口瘡數月狀若將死村人素神之因爲設齋齋散忽謂眾曰試窺吾口中何物乃張口如箕五臟悉露莫不驚異後不知所終晉逸史麻襦者莫得其姓名石季龍時在魏乞丐常著麻襦布衣故時人謂之麻襦言語卓越狀如狂者乞得米穀不食輙散之頗顯神異與高僧圖澄極爲交友蘇驢蟲流王屍泉涌神仙傳薊子訓嘗駕驢車與諸生俱詣許下道過滎陽止主人舍而所駕之驢忽然卒僵蛆蟲流出主遽白之子訓曰乃爾乎方安坐飯食畢徐出以杖扣之驢應聲奮起行步如初茆亭客話王客者失其名及鄕里常携笻挈籃引一斑犬往來卭僰間以採藥爲事天禧戊午嵗遊青城山迴臨卭宰師仲冉召之與語曰吾野人也久居城市頗思歸鄕誠有奉託宰亦莫諭其意一日獨携笈往國寧寺於寺門下坐卒鄕耆聞官瘞之道左師宰聞之曰曩所言斯之謂乎遣吏往彼焚之發其屍顏貌如生四肢皆軟若熟寐焉頃之屍下清泉涌出浮屍而起遂就更衣沐浴以殮之方遠辯慧道華愚懵高道傳閭丘方遠字大方幼辯慧通經史昭宗累詔不起就錫命服賜號玄同先生羅隱每詣受書先生輙閉目授之曰隱才高識下蓋正容悟物故隱卒保終吉先生一日忽沐浴焚香端坐返眞顏色不變異香三日不散時錢武肅夢先生騎鶴訪別明日訃至及就壙但空棺而已又侯道華常如風狂人人多侮之未嘗有愠色好讀丹經子史或問誦此奚爲曰天上無愚懵神仙楊雄墟墓周暢義塚仙傳拾遣楊雄字子雲口吃善屬文王莽篡位聞理獄使者欲來收雄雄恐不免時校書於天祿閣上自投幾死天鳳中辭疾還蜀卒於家乾符中進士趙郁臥疾於嘉州開元觀稍愈於殿上見一少年弊蓋鶉衣白潔與郁並坐郁因言此觀巨功製作國力興創何乃俯逼殿後而有墟墓也嘗問郡人皆不知少年笑曰此漢相留侯之後辟强之孫天師之祖也爲南安太守殁於郡而葬於此乃說兩漢魏晉間事皆若目擊郁問以姓氏答曰子雲姓楊乃强力隨之遂出門而去至今往往有見者眞誥周暢好行陰德功不在覺時嵗大旱客死者數萬而暢收骸骨萬餘具立義塚時或祭祀之應時大雨今在洞中爲明晨侍郎自然雷鳴法樂霞擁雲笈七籤馬湘字自然狀若風狂能治病有告之者湘無藥但以竹杖打病處或以竹杖指之口吹杖頭如雷鳴便愈或遊宫觀巖洞多留詩句其登杭州秦望山詩曰太一初分何處尋空留厯數變人心九天日月移朝夕萬里山川換古今風動水光舍遠嶠雨添嵐氣没高林秦皇謾作驅山計江海茫茫轉更深高道傳道士張法樂居耿谷之西抱元守一凡三十餘年雲生梁棟霞擁窗扉自號爲雲居觀久而道成猛虎馴伏侍側後屍解蟬蛻焉李預餐玉王捷燒金感應錄後魏李預得古人餐玉法乃採訪藍田躬往攻掘得若環璧雜器形者大小百餘枚預乃椎七十枚爲屑食之及疾篤謂妻曰吾死體必當有異勿速殯令後人知餐服之妙時七月中旬長安毒熱預停之四宿未殮而體色不變其妻常氏以玉珠二枚含之口閉妻謂曰君自云餐玉有神驗何不受珠言訖啟齒納珠因噓其口都無穢氣舉殮屍不傾委澠水燕談江州王捷少商江淮間咸平中遇一人於南康逆旅衣道士服儀狀甚偉授捷黃金術仍付以神劒且戒之曰非遇人君不可妄泄後佯狂叫呼上饒市中配流嶺南逃歸京師撾登聞鼓自陳宋眞宗皇帝召與語悅之更名中正寓居中官劉承珪家數聞中正與人語聲如童子云我司命君也嘗以藥金銀獻上以助國世謂之燒金王先生賀瑒女筮秋夫鬼針南史賀瑒字伯祖道養工卜筮經遇工歌女子病死爲筮之曰此非死也天帝召之歌耳乃土塊加心上俄頃而蘇感應錄宋徐文伯東海人濮陽太守熙曾孫也好黃老隱居秦望山遇道士過求飲留一瓠瓢與之曰君子孫宜以道術救世當得二千石熙開之乃扁鵲鑑經一卷因精學之遂名震海內其後秋夫彌攻其術仕至社陽令嘗夜有鬼呻吟聲恓悽秋夫問何人頃答曰某東陽人患腰痛死爲鬼猶難忍請療之秋夫曰云何措法曰請爲芻人按穴針之秋夫如言乃爲灸針設祭埋之明日見一人來謝忽然不見當世伏其通靈慮度應鹿龜年辨禽賢己集盧度有道術少時阻淮水不得渡過心誓曰若得免死從今不復殺生須臾見兩楯流來接之得渡後隱居盧陵西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝壞我壁鹿應聲去屋前有池養魚皆名呼之次第來飲食而去翰府名談白龜年乃白居易之孫於嵩山遇李太白招之與語曰吾自水解之後放遁山水間因思故鄕西歸嵩峰中帝飛章上奏見辟掌牋奏於此今已百年矣近過潼關有詞曰曾宴桃源深洞一曲歌鸞舞鳳常記欲別時明月落花煙重如夢如夢和淚出門相送乃出書一卷遺之曰讀此可辨九天大地禽獸語言汝更修陰德可作地仙也上竈延頸老夫正心括異志郭上竈天禧中嘗傭於東京州橋滌器于茶肆有青巾布袍者神彩凛然疑其呂公也卽走拜于前曰際遇先生願爲僕厮先生曰若眞欲事我可受吾一劒郭唯唯延頸以俟引劒將擊郭大呼已失公矣郭後尸解視其棺敗絮而已廣記唐末有一老人携壺賣藥於益州得錢則散與貧者常謂人曰夫欲人之無病必先正其心心無亂求無狂思無嗜欲無迷惑則心無病而內之六腑雖有病不難治也老夫賣藥嘗以此告人矣一日詣錦江沐浴探囊取丹吞之遂化白鶴飛去金闕帝君玉仙聖母三洞珠囊云金闕帝君上相青童乘碧霞九雲流景雲輿飛青羽蓋上詣太上靈都宫朝三天靈錄之文也玉仙傳聖母生於炎帝之代推其鄕里卽武陽郡人也有絶世之容其親所配瑯琊家將以適矣聞鄰人曰瑯琊好惑之士也聖母聞之遂泣而辭親登一小舟恣泛於大溟任風所送至仙都山在高麗國中也其山上有峰曰玉仙峰中有洞曰玉仙洞下有溪曰玉仙溪聖母泊於此山守志固節後半年遇女華聖母口傳飛神入鼎之道中源主神之法丹火養神之術得之而成道玉仙號者蓋因山洞而賜名玉仙祠前有方池嘗取玉仙溪水貯之後人投紙以占災福張忠安車董京環堵晉逸史道士張忠永嘉之初隱于泰山服氣食芝穴地窟爲室弟子亦穴居其教以形不以言朝廷累召所賜不受上曰欲屈先生仕尚父可乎忠曰昔避地與鳥獸爲侣年衰志謝不堪展效乞還故山從之以安車送還諡安道先生又董京時至洛陽披髮而行逍遙吟詠嘗宿於社中乞索於市結網自覆或有所與金帛不肯受時太守就社與語曰方今堯舜之時胡爲懷道迷邦耶答曰萬物皆賤惟人爲貴動以九州爲狹靜以環堵爲大遂遁去不知所在沖素精思道全勤苦眞境錄精思院蓋沖素先生鄭元章所居先生常齋居危坐纖介不入南華所謂用志不分乃凝於神者其所以感動天上仙人時降芝軿屬雲霽月白之夕惟弟子闚𨵦得聽其論則世莫得聞也精思院在杭州洞霄宫神仙傳尹道全眞人隱於衡嶽感上眞降謂之曰白日昇騰者當有其材而後成其道汝受其一事而有沖舉之望斯乃勤苦所得爾宿分所值矣遂授以五嶽眞形圖取其山之向背泉液之所出金寶之所藏通而爲之圖告曰汝能自修奉而獲感應乃知文始之裔太和之族世有神仙矣言訖而去
