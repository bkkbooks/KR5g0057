front:
  text: 三洞羣仙録卷之十九設九
  hash: sha256:228dcca6ef1e0af845127786bceab195a44abe9e1f75eee24ce77023c0068779
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_SJB_019-320357c, image: sjb/32/320357c.png}
body:
  text: 正一道士陳葆光撰集德休魚饗子騫脯祭續仙傳曹德休常謂人曰若家有疾苦就求德休符藥不必惠以財帛但以江魚爲膾一盤并美酒一壼饗吾則疾自痊郷人欽之如神一日告人曰我捨此入天寳洞去然來年牛疫頗甚我留姓名與汝傳道牛疫之時以膾饗書其字帖牛角上自當無苦其後牛果大疫一境之内帖其字者免灾不帖者皆斃武夷山記玄靈老君華眞仙師遣弟子名屬仁乘雲駕鶴游歷此山人多呼爲控鶴仙人昔魏王名子騫與張湛孫綽等同在此山修道會夭亢旱魏王置酒脯祭仙人祈雨感控鶴仙人乘雲跨白馬從空中而下遂霈雨澤張湛等既獲見即獻詩一絶云武夷山上武夷君白馬垂鞭入紫雲空裏只聞三奠酒龍潭波上雨雰雰仙人得詩甚喜蘇林吐納先賢服餌神仙傳蘇林遇涓子告之曰欲作地上眞人必先服食當去三尸殺滅穀蟲不去三尸而服食者穀雖斷而蟲不死者徒絶五穀勤勞吐納而蟲生求不死不可得也遂授之以三元眞一之道乃曰非有仙籙者不得授此書祕密非人勿傳仙傳拾遣楊先賢歷訪名山周遊洞府從葛永璝得道因其化跡處築室居之逾年忽一夜見光明如晝羣仙降焉問所修之道先賢稽首曰糞壤之質見歲月易遷常恐奄謝志期度世耳羣仙憫之遂賜丹華服餌白日上昇通微清爽李根奇異續仙傳道士鄔通微不知何許人神氣清爽多遊名山人多識之或時不見莫知能測及丹成服食即於酒樓上飛昇去抱朴子李根許昌人能變化隱形入水火中人皆奇異之有女弟子竊根素書以觀得根記其學道之年日計已七百年矣或云根兩目方瞳按仙經云年八百歲者童子乃方根常與弟子云我雖未得與天地齊亦不爲下土之士矣弱翁黄犢自然丹哥西清詩話鍾弱翁傳帥平凉有方士通謁從牧童牽黄犢立庭下弱翁異之指牧童曰道人頗能賦此乎笑曰不煩我語是兒能之乃大書曰草鋪横野六七里笛弄晩風三四聲歸來飽飯黃昏後不脫蓑衣卧月明既去郡人見方士檐兩大甕長歌出郭迹之不見甕乃二口豈吕洞賔耶祕閣閑談池州鳳凰山道士趙自然夢陰眞君與栢葉一枝食之因而不食神氣異常爲詩曰嘗欲棲山島閑眠玉洞寒丹哥時引舞來去跨雲鸞或問何名丹哥曰鶴也允當愍虎君平牧鵝道學傳歷陽謝允當見餓虎閉在檻穽允當愍虎之窮開而出之虎伏地良久乃去幽閑鼔吹鵝羊山在長沙縣北二十里本名東華山亦謂之石寳山上有仙壇丹竈湘中别記云昔郡人成君平年十五兄使牧鵝羊忽遇一仙翁將入此山兄後尋至山中見君平因問牧鵝羊何在指白石曰此是也遂駈起隨兄去旬日却還山下復化爲石今猶存焉畢田詩云羽客何年此煉丹尚留空竈鎮孱顔雲中雞犬仙應遠山下鵝羊石髓頑湘渚幾因滄海變遼城無復令威還何年仙馭重來此盡遣飛昇上九關金訪蓬子針寄田婆神仙傳唐王處士者洛陽尉王琚之姪四郎也琚赴調入京過天津橋四郎布衣草履形貌山野琚初不之識四郎曰叔今赴選姪少物奉獻即出金五兩色如雞冠可訪金市張蓬子計之當領錢二百千某比居王屋小有洞今將家往峨嵋山琚訪之則已行矣金市果有蓬子出金示之驚喜此道者王四郎所化金也且無定價因如其數酬之傳奇許栖巖八蜀登危棧忽與馬俱墜于崖穴中因遇太一元君君曰子所乘馬乃吾洞中之龍也以作怒傷稼謫在人間貧荷子有仙骨故得值之子歸放之渭曲勿復駕也有一玉女曰龍子回日虢縣田婆針與寄少許來遂跨馬如飛食頃已達虢縣之莊詢訪田婆市針百枚繫于馬鬛放之渭濱果化爲龍去田婆者盖亦仙人也夏侯美睡禮和善歌仙傳拾遺夏侯隱者大中末遊茅山天台間常携布囊竹杖而已或露宿於壇中林下人覘之但見雲氣蓊鬱不見其身每登山渡水而閉目美睡同行者聞其鼻鼾之聲而步不蹉跌足無蹶礙至所止即覺時號爲睡仙眞誥傳禮和常服五星氣而得道禮和善歌歌則鳥獸飛聚而聽聲焉欽真力勤合靈睡嬾女仙傳唐楊欽眞本田家女也適王渭爲妻夫貧力田楊氏婦職甚謹夫族目之爲勤力新婦一日忽沐浴著新衣逝去是夜鄰人皆聞有天樂異香自西北來次日夜復聞音樂之聲異香酷烈縣令李邯聞之率衆來看則婦在床矣邯問去來之由荅曰向仙仗來迎至華山雲臺峯峯上有四女眞先在彼與語甚洽曰同生濁世共是凡身一旦翛然遂與塵隔今夕何夕歡會于斯宜各賦詩以道其意於是更相唱和欽眞詩曰人世徒紛擾其生似舜華誰言今夕裏俛首視煙霞欽眞後復仙去郡閣雅談吴合靈爲道士居南岳俗呼爲吴猱好睡經旬不食嘗言人若要閑即須嬾如勤即不閑也素不攻文忽作上昇歌云玉皇有詔登仙職龍吐雲兮鳳著力眼前驀地見樓臺異草奇花不可識我向大羅觀世界世界只如指掌大當時不爲上昇忙一時提向瀛洲賣劉遁同舟公垂共簡名賢詩話晉公舊有園在京師保康門外園内有仙游洞景最瀟洒道士劉遁作仙遊亭詩贈公云屢上仙遊亭上醉仙游洞裏杳無人他時鶴駕遊滄海同看蓬萊島上春公莫曉其詩洎南遷遁往見公於崖公方思其詩乃知遁異人也與之同泛舟海上而飲公曰今日之謫子之詩意也續元怪録故淮海節度李紳嘗見一老父曰年少識我否曰我唐若山也子非李紳乎對曰某姓李不名紳對曰子合名紳字公垂在仙籍矣今夕羅浮羣仙有會能隨我一遊乎乃袖出一簡若笏形縱横曳之覺長闊數尺宛若舟船父與紳俱登其中戒令閉目但覺風濤汹涌似泛江海逡巡俄抵一山樓殿參差蕭管寥亮端雅士十餘人來迎曰公垂果能來人世凡濁苦海非淺自非名繫仙籍何路得來曰子能留此乎紳曰身未立家不獲辭恐若黄初平貽憂於兄弟曰子既念歸雖仙録有名而俗緣尚重然美名崇䆠亦皆得矣宜勉之乃遣歸自是改名紳字公垂果登甲科歷任將相之重盧娘緑眉阮籍青眼杜陽編唐永貞年南海貢盧眉娘年十四眉緑且長故有是名眉娘幼而惠工巧無比能於一尺絹上綉靈寳經八卷字如粟粒而㸃畫分明又善作飛雲蓋以絲一絇分爲三段染成五色結爲金蓋其中有十洲三島臺殿麟鳳之像而執幢捧節童子亦不啻千數順宗歎其工謂之神人度爲道士歸南岳仍號逍遥晉阮籍字嗣宗爲步兵校尉不拘禮節能爲青白眼嘗於蘇門山遇孫登與商略終古及栖神導氣之術登不應籍因是長嘯而退至半嶺間有聲若鸞鳳之音響乎嵓谷乃登之嘯也昭武銀鼎士良玉版洞微志封昭武者餘杭酒徒也因乘舶船爲暴風漂至島上俄聞異香逺望有道士坐於西岸昭武急趍作禮道士坐石下有一銀鼎鼎面浮一大珠道士曰汝何來武對以窮困欲投新羅道士曰視君之面無外夷禄可却乘舟吾與好風送還明州昭武祈之曰生平爲酒所泥飲食微斟支體瘦瘠道士笑曰但飲此湯遂於鼎中以銀瓢取半瓢與飲之眞甘露液也又告以理生之計曰但販馬當自給因問先生姓曰我陰眞人也逡巡風起道士催登小舟又飄一夕日出已在明州矣唐逸史元和初萬年縣所由馬士良犯事王爽爲京尹嚴酷必殺之士良亡命太白山至於炭谷湫岸藏於大柳木下纔曉有五色雲自空降仙女在中水濱有金槌玉版連扣數下青蓮湧出每葉旋開開畢仙女取擘三四食之却乘雲而去士良見槌板尚在扣之少項復出士良食七八枚頓覺身輕郭憲噀酒斑孟漱墨賢己集郭憲武德七年爲光禄勲從駕南郊憲在位忽回向東北含酒三噀詔問其故對曰齊國失火故以此厭之後果然三洞珠囊班孟或云女子也能飛行終日又能坐虚空中與人語又能入地中去初時没足至胸漸漸但餘冠幘良久而盡没不見又能含墨著口中舒紙著前嚼墨漱之皆成字竟紙各有意義服丹年四百歳更少入大冶山去道榮虎坑龍威鳥跡感應録北齊由吾道榮少爲道士因遇南嶽仙人符水禁呪陰陽歷數天文藥性無不悉解嘗至遼陽有虎去馬止十餘歩人皆驚走道榮徐以杖劃地成大坑虎遽去矣仙傳拾遺龍威丈人隱居包山亡其姓氏吴王闔閭十二年觀兵於敵國途由包山山有洞穴吴王欲知其深淺請隱居窮究之遂秉燭晝夜行一百七十四日而還見金城玉宇有光如晝紫玉流黄間爲窓牖其城門榜曰天后别宫藻錦甚盛玉房中得素書一卷皆鳥跡篆籀之文歸以書奏吴王王後使賫其文以問孔子曰寡君昔遊包山有赤鳥𠾑此書於車前使下臣賫靈文奉謁願吿休戚孔子發函遽曰昔夏禹理水功畢乃遊於鍾山之阿得黃帝帝嚳等所受太上靈寳眞經藏一通於名山石磧中一通付於水神當有得道之士以獻於王若云赤鳥所𠾑丘未聞也崇嶽拜松姚光燔荻名賢小說道士吴崇嶽辟穀嘗登松梢禮拜福建轉運使周渭因請隨行抵于德化縣縣東有古松一株高八九十尺上有鶴巢乃命岳登之宛若猿猱容易直上出鶴巢之外端身飛歩手無攀緣就纖枝拜如平地其松枝柔軟隨步低昂了無損處渭贈詩云楮皮冠子布爲裳吞得丹霞壽最長混俗性靈常樂道出塵風格早休粮枕中經妙誰傳與肘後方新自寫將百尺松頭幾飛步鶴棲枝上禮虚皇感應録吴姚光善火術吴王積荻數千束使光坐其上又以數千束裹之因猛風燔之燔訖謂光已化爲燼而光端坐灰中振衣而起得一寳符伯威仙籍仙傳拾遣史得一者自言咸通中因秋雨浹旬山水泛溢一旦微霽見江濱一物隨水横流以杖引之得焉開視乃老君三部符也浮水中而不濕心甚異之收還家其夜有光彷彿二童隨之與語云我侍符童子也太上寳符久傳人間繕寫訛謬迨失宗旨文字既誤鬼神無所禀伏由是行之少効今此正文以付得道之子救民疾苦無不應驗後數年童子告白太上降駕太白山可往朝拜因入太白不還眞誥趙伯威少學邯鄲張先生得道晩在中岳授玉佩金璫經於苑丘林子今亦得道入華陽洞天主管仙籍并記學者之姓名焉漢兒劃地秦婦築城丹臺新録漢初有四五小兒路上劃地戲一兒歌曰著青裙入天門揖金母拜木公時人莫知之唯張子房知之乃往再拜此乃東王公之玉童也所謂金母者西王母也木公者東王公也仙人拜王公揖王母廣記唐開元中代州都督以五臺多客僧恐妖偽事起非住持者悉逐之客僧懼逐多竄山谷有法明者深入鴈門山幽澗之中有石洞容人出入涉水渡岸行二里至草屋中有婦人並衣草衣容色端麗見僧愕然問云汝是何輩僧曰我人也婦人笑曰寜有人形骸如此僧曰我事佛弟子佛須擯落鬚髮故爾僧問此何處婦云我是秦人隨蒙恬築長城被其苦乃逃至此食草根以得不死僧辭出它日備粮更去則迷不知其所矣伯庸鶴唳藏質雞鳴皇朝類苑王參政伯庸得疾既委頓是夕有靈鶴十餘隻空中嘹唳八月二十夜月甚明時其弟純臣差知亳州公吏來接皆以爲怪訝須臾公薨羣鶴遂散時人以爲伯庸當作仙官爾高道傳道士葉藏質字含象精於符術婺州牧爲邪物所撓諸請符至中路犯穢忽失之牧親造見案上有筒封簽甚固乃前請之符也因焚香致匣捧歸邪物遂絶牧表其賢懿宗優詔石門山居爲玉霄觀一日命酒召其友人語及平生事然後告以行日及期竊題於門曰雞嗚時去門人遂聞環佩雜蕭管聲于空中須臾雞唱視之已化年七十四矣三洞羣仙録卷之十九
