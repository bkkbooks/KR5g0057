body:
  text: 正一道士陳葆光撰集保言冥吏曼卿鬼仙北夢瑣言道士秦保言勤於焚修嘗白南嶽真君云上真何以須紙錢為有所未諭既而夜夢真君曰紙錢即冥吏所藉我又何須由是獄中益信之摭遺西蜀崔存訪道尋真於王屋西峯見石延年曼卿蘇舜欽子美二人對坐隔一小溪存再拜曰存脱棄利禄以求大道固有日矣今幸遇二仙於此溪水視之淺而測之深不得立侍左右何也又聞學士已作鬼仙乎蘇曰妄也純陽即仙純陰即鬼既為仙又為鬼乎二仙乃命青童取牋管作詩以授存存得詩俄見一翠鳥𠾑一書置二仙前蘇曰瀛洲君召吾二人乃飛踰山頂而去章令飛舉小直擢遷列仙傳主柱子不知何許人一日上宕山云此山有丹砂可得數百斤邑令章公聞之即時封山而丹砂自流出如火主柱子取丹砂與邑令餌之章既餌砂不五年身輕能飛舉遂與柱子俱飛去廣記韋小真母許氏守孀事舅姑以孝聞惟有此女十二歲聦慧無病而卒未殮復活云初聞召韋小真昇天見天上人皆衣錦綉引小真見韓司命君曰汝九世祖有功於國近擢為地下主者今遷地仙之品汝母有孝道已遷仙階而汝三世已生天小真自後奉道至長慶年上昇郭靚負擔黄齊挽船真誥郭靚少孤依栖無所隋鄭先生負擔經七年勤謹無懈怠先生憫其勞苦遂授以導引法壽至三百歲復遇赤松子授道法今在大有洞中為真人廣記黃齊者蜀之偏將也常好道行陰功有歲年矣於朝天嶺遇一老人顔色嬰孺肌膚如玉與之語曰子既好道五年之後當有大厄吾必相救勉思陰德無退前志其後牽下峽舟船覆溺至灘上如有相拯得及於岸視之乃所遇老人也尋失所在長房縮地女媧補天丹臺新録後漢費長房既遇仙翁欲求道而顧家人為憂翁乃斷一青竹與長房身齊使掛之舍後家人見即其形也以為縊死矣遂葬之長房隨入深山羣虎中留使獨處長房不恐又卧於空室以朽索引萬斤石於心上衆蛇來齧索斷長房亦不移翁曰子可教也復使食糞糞中有蟲甚長長房意惡之翁曰子幾得道恨此不成長房辭歸長房能縮地脉數千里奄在目前放之還舒也淮南子女媧氏鍊五色石以補蒼天斷鼇足以立四極殺黑龍以濟冀州積蘆灰以止淫水蒼天補四極正淫水涸冀州平後蟲死顓民生藍方温存初成慈憫青瑣藍方字元道亳州父老言自兒童時見先生狀貌迄今如一温厚接物小大皆得其歡心仁宗朝嘗見館於芳林園先生告去乃賜號曰南嶽養素先生時學士賈公昌朝贈公詩云聖澤濃沾隱逸身道裝宜用葛為巾祝融峯下醉明月湘水源頭釣紫鱗曾見海桃三結子不知卯豆幾回春他年我若功成去願作靈橋跪履人先生和曰近告明君乞得身不妨林下載紗巾滿斟野酒浮瓊蟻旋釣溪魚贈錦鱗元府烏雛飛後夜洞中龍子養長春君今儻若為同志續有壺天兩箇人一日先生沐浴乃奄然而逝至今往來湖湘間人或見之廣記茅濛字初成即東卿君之高祖也君性慈憫好行陰德周衰入幸山師鬼谷先生得其道乘龍上昇故童謡歌曰神仙學者茅初成乘龍上天入太清蓋謂此也馬明富盛同休貧窘真誥馬明馬罕欽事經寳有過君父恒使有心奴子二人一名白首一名平頭常侍直香火洒掃拂拭每有神光靈氣見於室宇明妻頗能通見云數有青衣玉女空中去來狀如飛鳥馬家遂致富盛資産巨萬年老命終明子洪洪弟真罕子智等猶共遵向末年事師乃弛廢之耳西陽雜俎秀才權同休元和間落第旅遊蘇湖間遇疾貧窘有走使者本村野人雇已一年矣秀才謂曰子貧迫若此无以寸進因持垢衣授之可以辦少酒肉子將會村老丐少道路資也雇者微笑曰此固不足辦某當營之乃斫一枯桑枝成數段扎聚於盤上噀之悉成牛肉復吸數瓶水傾之乃旨酒也村老皆醉飽獲束縑鏹物雇者乃辭去薛昌甕卧申屠瓶隱仙傳拾遺薛昌幽薊人好道訪奇天寳七年於洞天觀棲止累月忽有山翁攜大章陸一根形如巨龜文甲頭足一一周備與觀中道士曰此藥可切細令乾用米以麯糵醖酒熟半年外飲者登仙道士如其言醖造一日道士皆赴齋醮唯昌不出越三日道士歸見昌卧甕側耳鼻血流數日乃甦身輕目明勢欲飛舉雖山川巖壁不能隔礙後入大面山不知所之樹萱記申屠有涯放曠林泉常攜一瓶一日躍身入瓶中時號為瓶隱元泰龍軒公度鳳靷丹臺新録姚坦字元泰平陽人雅操遐標深根内植乃託影神郷遠期真隱遂遁幽巖日誦五千文遇許真人授以元白回黃之道行之雨不沾衣泥不污履目有神光如電簡王時駕龍軒以昇天又尹軌真人字公度太原人也絶粒行氣專修上道能變化無常或為道士或為儒生或為童孺或為長老或與羣真衆仙驂龍靷鳳策空駕虚雲馳電邁出有入無分形散影處處遊集云吾今已年一千三百歲所歷甚多非爾曹短札所能記録一日忽竦身入雲騰空冉冉而去但聞笙簫之聲唯餘器服緗素存焉始皇起臺黄帝置觀拾遺記始皇起雲明臺窮四方之珍木搜天下之工巧南得煙丘碧木酈水燃沙賁都朱泥雲岡素竹東得葱巒錦柏煙燧龍松寒河星柘岏雲之梓西得漏海浮金狼淵羽墾滌嶂霞桑沈塘員籌北得冥阜乾漆陰阪文梓褰流黑魄闇海香瓊珍異是集工人騰虚㳂木揮斤斧於空中子時起工午時已畢秦人謂之子午臺黃帝内傳王母飲帝以碧霞之漿赤精之果因授帝白玉像五軀曰此則元始天尊之真容也又授帝二儀本形圖還丹十九首帝乃作禮置於高觀之上親自供養后妃臣妾莫得覩之其觀上常有異色雲氣奇香聞數百歩時人謂之道觀道觀之號自此始也黃安舌耕和璞心筭列仙傳云黃安自云卑猥不獲處人間遂執鞭誦書劃地計之一夕地成裂時人謂黃安舌耕年八十色如童子仙傳拾遺邢和璞隱居瀛海間得神仙之道使人以心注念於物布筭而知之無不中者居嵩頴間著書三篇曰頴陽書有筭心旋空之訣廣成窈冥盧敖汗漫神仙傳廣成子者古之仙人也居崆峒之山石室之中黃帝膝行而前再拜請問治身之道廣成答曰至道之精窈窈冥冥至道之極昏昏默默無視無聽抱神以静形將自正必静必清無勞爾形無摇爾精乃可長生又盧敖見一士深目而結喉鳶肩而脩頸豊上而殺下据龜殻而食蛤蟹謂敖曰吾與汗漫期於九垓之外不可久留而去齊女玉鈎傳生木鑚女仙傳鈎翼夫人齊女也姓趙好清静病卧六年右手拳飲食少漢武帝時望氣者云東北有貴人氣推而得之召到姿色甚偉帝發其手即展而得玉鈎幸之生昭帝武帝尋害之殯尸不冷而香昭帝即位更葬之棺空但有絲履故名其宫曰鈎翼真誥昔有傅先生者少好道入焦山石室中積七年而太極真人接之與一木鑚令鑚一石盤厚五尺許告之曰穿此石透當得道其人心專晝夜鑚之積四十七年不替鑚盡石穿遂得神丹今為西嶽真人淮陽一老開皇九仙本傳前漢應曜隱於淮陽山中與四皓俱召曜獨不至時人詩曰南山四皓不如淮陽一老後漢應邵八代祖也仙傳拾遺開皇九仙者孔丘明楊元忠張法樞吴天印陳志空駱法通鄒武君謝幽巖周仙用鄧希元當漢楚交兵之際無栖芘之所各有修道之志避世入山契為兄弟同遊五嶽後居洪州西山皆得仙矣至隋開皇中鸞鶴儀衛會於玉笥山中九仙臺上徘徊終日一時昇天喜稱文始周號闈編丹臺新録尹喜初為函谷關令見一老人乘青牛薄軬車來喜頓首而前曰聖欲何之曰吾在關東田在關西時來採薪吾無道德勞子問訊老人再三辭喜不得乃曰子既知吾吾亦知子有信道之心遂授以道德喜道成德備號文始先生補無上真人真誥莊周師長桑公子授以微言謂之莊子也隱於抱犢山修煉著書服北育火丹白日昇天上補太極闈編郎軒集挼葉馬湘摸錢高道傳羅浮先生軒轅集居羅浮山人傳數百歲顔色不老髮長至地坐暗室則目光長數丈採藥巖谷長有毒龍猛獸衛護赴民家請齋者百餘處無不分身宣宗召入禁中問長生可致乎集曰絶聲色薄滋味哀樂一致德施無偏自然與天地合德日月齊明雖堯舜禹湯自可致況長生乎先生能以桐竹葉挼成錢神仙傳馬湘字自然有道術嘗於江南刺史馬植座上以酒盃盛土種瓜須臾引蔓花實食之甚美又能徧身摸青錢投井中呼之即出靈輿福地山圖洞天高道傳王靈輿者九江道士居五老峯夜有神人告曰得道者各有其地如植五穀於沙石之間則不能成既有飛仙之骨當得福地靈墟可以變化非其地則魔壊其功無由冀矣師曰可栖者何地曰朱陵之上峰紫蓋之鄰岫乃洞天福地也可以冲天師從之遂遷居衡山一紀功成天監中白日上昇眞誥山圖子者周哀王時大夫亦仙人也授張激子服九雲水法而激子修此道上補九宫丞今山圖子亦在洞天中與激子對局達靈復髭張果擊齒超化寺壁誌唐黃門内侍謁者仵達靈題云予自知命之年從鸞輿西幸當天寳丁亥十二月得青城丈人授眞元丹訣而意未曉屬駐蹕行在掌命頗煩及肅宗至德丁酉歳銜命禋於嵩丘復遇丈人始全决神水黃芽之道洎畢請告回覲宸扆乞骸歸田會南曹郎張公去非左史程公太虚皆以其故廬共製神室皇天眷祐丹鼎融光服餌浹辰肌容發爽凌虚不懾意愈通神自餌靈丹起至德丁酉迄今上乾符甲午歷春秋一百一十有八載更十二朝遂得還童復髭矣明皇雜録張果者明皇召見一日嘗賜堇斟飲之果遂舉三巵醺然有醉色顧謂左右曰此酒非佳味也即偃而卧食頃方寤忽鑒鏡視其齒皆班然燋黑遽取鐵如意擊其齒盡墮以藥傅齒又寢久之再引鑑視其齒已生堅然光瑩愈於前也雞師救病鱉靈導水戎幕閑談唐蜀川費雞師者目赤無黑善知將來事能與人禳救其術或疾病來告者雞師即抱一雞而往設祭於庭又取一石如雞卵大令病人握之乃罡步作氣嘘叱雞旋轉而死石亦四破則病者瘥矣因號雞師云仙傳拾遺鼈靈楚人也死棄其尸於江中泝流而上至汶山下蹷然而起隱於蜀山中以變化驅役鬼神之術聞於世時峽中山摧堰江不流杜宇苦之聞鱉靈有術使决金堂山瞿塘峽導水東注復舊所人得陸處宇遜位數百年遊天柱山遇天眞集焉遂昇天而去葛由刻木張辭剪紙列仙傳葛由蜀人周成王時常刻木爲羊賣一日騎羊入蜀王侯貴人迎之至綏山隨之者皆得一桃不還里人諺曰得綏山一桃雖不仙亦足豪廣記張辭有才學養氣絶食嗜酒耽棊嘗吟云争奈金烏何頭上飛不住紅鑪謾燒藥玉顔安可駐今年花發枝明年花滿樹不如且飲酒朝暮復朝暮時或以紙剪蝴蝶數千枚以氣吹之成列而飛拍手即下或一日剪一鶴以水噀之俄而飛翥辭曰爾先去我後來馬儉制邪劉根召鬼丹臺新録馬儉通詩禮年十七遇人得遁甲烏角鳥情緯候之訣善攝召萬靈制邪伏魔一旦感天神降與語曰法師宿有功德必得度世何須召役鬼神可祕其術絶其往來怡神抱一眞仙自降儉從之白日上昇神仙傳劉根能治病驅役潁川太守杜新聞之以爲妖妄因呼根至郡謂根曰君有何能而常惑衆根曰某能令人見鬼新曰今即試看若無鬼汝當見誅根曰鬼甚易見可借府君前筆硯新從之根書符作長嘯聲須臾廳南壁忽開數尺見有四五百人赤衣操刀劒從壊壁中入至墀下面縛府君父母而來泣曰汝何爲犯神仙尊官使我被縛困辱如此府君叩頭求乞放赦根戒敕遣之遂兔後一月府君與夫人郭氏皆卒陳長架屋嚴青挽舟抱朴子陳長居苧藇山已六百餘年山中人爲之架屋每四時祭祀之陳不飲不食顔如五六十人苧藇山方千里上有千餘家風俗與吴同又嚴青會稽人食貧販炭忽於塗中遇異人授以素書一卷青曰我不識字神人曰不須讀但置於静處可也青自後神通潜有人爲挽舟而入只見炭船自行後爲人治病即以所授之書到家其人自愈入小霍山得仙希夷堯舜洪崖巢由神仙傳陳摶字圖南號希夷先生時遇金甲神人指隱華山太宗皇帝召見問曰朕欲以堯舜之道治天下可乎對曰臣聞堯舜土階三尺茆茨不剪陛下若能如此正所謂今之堯舜也高道傳道士張氲號洪崖子隱豫章山開元中明皇召問朕何如堯舜先生何如許由對曰陛下道高堯舜臣德謝許由昔堯召由而由不至今陛下召臣而臣來上嘉之拜先生太常卿累遷至司徒皆不受乃曰陛下何惜一山一水令臣追迹巢由上許之居於西山巨崖乃先生舊隱之處也豫章記云隋開皇改爲洪州以先生所居山名而名之程戒二虎陶畫兩牛高道傳程太虚果州西充人幼好道年十五登所居之東山飄然有凌虚意尋有五色雲霞擁其身及長絶粒坐忘常有二虎隨侍出入師因名之曰善言善行乃撫其背而授以三歸之戒二虎跪伏以聽自後呼名則至隱居傳陶隱居先生居積金峯修眞誥梁武帝屢詔不起先生即畫兩牛以進一牛散放水草中一牛著金勒有人執之帝曰先生意效曳尾龜也不可致之許尋偃月杜拜庭秋列仙傳許碏遍遊名山所至處題字云尋偃月子到此忽作一詩云閬苑花前是醉郷誤翻王母九霞觴羣仙拍手嫌輕薄謫向人間作酒狂於酒樓乘雲而去高道傳杜光庭字賔聖號廣成先生唐末有狂道士晦名謁先生求寓泊之所先生雖諾之未嘗與之相見道士日貨藥於市得錢即沽酒飲之唯唱感庭秋時人呼爲感庭秋凡半年人亦不知其異一夕大醉唱聲愈高有窺之者見燈燭綵綉筵具器皿羅列甚盛青童侍立斟酒而唱窺者具以白先生先生乃款其户曰光庭量識膚淺不意上仙降鑒深爲罪戾願匍匐一拜光靈以消塵障道士曰何辱勤拳之若是當出奉見道士即時妝筵具及童子置於冠中啓户空室耳方朔窺䆫張平鑿井漢武帝故事七月七日上御承華殿有二青鳥來集殿前上問東方朔朔曰西王母欲來有頃母至時南䆫下有窺看帝驚問何人母曰是汝侍郎東方朔性滑稽我鄰家小兒也廣記唐刺史張士平中年夫婦俱雙瞽遂杜門醮謝以祈保佑愈久愈勤元和間忽遇一書生曰此疾不假藥餌但於福地鑿并得水洗之可也君從之開井取水洗眼即時明净夫婦作禮厚謝書生不受曰吾乃太白星官也以子抱疾不忘於道精勤無怠上帝遣我授汝道術以答修奉之勤金帛之遣非吾所好白至仙居李踐眞境廣記白幽求貞元中下第入海風飄雨馳維舟山下夜聞風擊木葉相摩如人誦詩之聲云玉幢亘碧虚此乃仙人居之句俄而見千餘人騎龍控鶴乘龜履魚而至以手指水如在月中行有呼水府使者白幽求而授以水府之牒幽求隨行忽至一島上望見人煙遂歸家無有存者云已數代矣仙傳拾遺李琳燕人也寳曆中與友人遊五臺山偶墮於風穴中見一人形如獅子引入洞中即以水令琳飲之且曰汝雖凡流得入吾洞府踐吾眞境亦有道分矣汝有希生之心今暫歸他日可復來飲此神漿亦可延年益壽矣昭王懷珠玄帝埋鼎仙傳拾遺昔黃帝時務成子遊寒山之嶺見黑蚌在高崖之上故知黑蚌能飛矣至燕昭王時其國獻於昭王昭王取珪璋之水洗其沙泥乃嘆曰自有日月以來見黑蚌生珠已八九十遇此蚌千歲一珠也王暑月常懷此珠體自輕凉號銷暑招凉珠眞誥大茅山有玄帝時銅鼎鼎可容四五斛在山獨高處入土八尺許上有盤石掩鼎上玄帝時命東海神使埋藏於此武丁被召少君言請仙傳拾遺成武丁桂陽人也年十三爲縣宰遣送物上州州牧周忻異之留爲文學主簿因被使自京還過長沙郡投郵舍不及遂宿野木下忽聞人有語云向長沙市藥平旦見二鶴君異之遂往市門伺候果見二老人君從之數里老人問子隨我何求耶曰聞君有濟生之術因來侍從耳老人顧笑於袖中出玉函看素書果有武丁姓名各出藥一粒與之因而得道一日謂弟曰七月七日牽牛詣織女吾被召還宫不得久留言訖而卒後葬太守使人發棺不復見尸但有青竹杖并舄而已神仙傳李少君嘗合丹丹未成謂武帝曰陛下不能絶奢侈逺聲色殺伐不止喜怒不除萬里有不歸之魂市朝有流血之鬼神丹大道未可得成也少君忽稱病是夕帝夢與少君俱上嵩山半道有使者乘龍持節從雲中下言太一請少君帝覺謂近臣曰少君將舍我去明日少君疾困帝自往視則已化矣帝曰故化去耳歛而失之三洞羣仙録卷之七
