body:
  text: 正一道士陳葆光撰集何侯灑酒道子潑墨緫仙記何侯堯時隱蒼梧山舜南狩止何侯家大帝五老來謁舜曰昇舉有期翌日五帝下迎舜白日昇天五帝以藥一器與何侯使投酒中一家三百餘口飲不竭以餘酒灑屋宇拔宅上昇位為太極真人今九嶷山有何侯廟在舜廟側小仙傳吴道子得神仙術畫妙入神唐太宗聞之詔入宫庭有粉墻數尋俾畫山水道子即命帳幕蒙芘其墻以墨漿潑於墻上復以幕覆之良久曰請陛下觀畫其山林草木人煙鳥獸無不具備上顧盻久之見巖石之下有一小洞道子指曰此洞多有神仙扣之必有應者於是以手擊之洞門岩開有童子在側道子曰洞中甚有佳致請陛下一觀道子乃躍入洞中以手招上上不敢入洞門復閉道子自此不知所在兼瓊酒星張魯米賊逸史章仇兼瓊尚書鎭西川嘗令左右搜訪道術之士有一鬻酒者酒勝其黨又不急於利賒貸甚衆每有紗帽杖藜四人來飲酒皆至數斗積債十餘石即併還之談諧笑謔酣暢而去或報章公公遂專令探伺自後月餘不至忽一日又來章乃潜駕往詣公服至前躍出再拜相顧徐起遂失四人所在時明皇好道章公奏其事詔召孫公問之公曰此太白酒星耳天師傳張魯字公期漢中南鄭二郡太守每行法治疾立復康愈每授法治病者令致米一斛遂積鉅萬魏王輔政謂之米賊遣將統兵來討時諸弟子見兵馬至驚懼走告師師以手板畫地河流湍急兵不得渡遂用水軍師又以手板畫空即九重峰嶺直接重霄兵不得前遂聞魏王遣使追謝就拜梁益二州刺史鎭南將軍封關中侯後飛昇歸真示書伯醜譚易湘山野録熙寧丙辰歲交賊寇邕郡倅唐著作子正盡室遇害唐桂州人治平中赴京調舉至全州中塗欲僦一僕乃遊袁州日所役舊奴也挈重擔勁若健羽雖鞭馬疾追長先百步之外恐他逸遂遣去其僕當日自全州行至唐州凡二千七百餘里日午已到留書祝驛吏曰候桂州唐秀才至即付之君後月餘方抵唐下馬於驛驛吏前曰君非唐秀才否一月前有人留一書在此因出書示之曰歸真子謹封唐因起封惟一詩曰袁山相見又之全不遇先生道未圓大抵有心求富貴到頭無分學神仙篋中靈藥宜頻施鼎内丹砂莫妄傳待得角龍為燕會好求黄壁卧林泉問其形貌乃全州黜僕及唐遇害當丙辰正合詩中所謂角龍也仙傳拾遺楊伯醜好讀易隱華山何妥嘗問易之所學曰太華下金天洞中我羲皇所教之易與大道元同理窮衆妙豈可與世儒常譚而測神仙之旨乎葛符上下鄭風南北丹臺新録葛仙翁嘗船行弟子見公箱中有十許符因問曰此符之驗盡何事可得見否公曰神符亦無所不為弟子欲願見之公乃取一符投水中水迅急符逐水而流下公曰如何客曰今凡人投之亦當爾復投一符即迎水逆上公曰如何客曰異矣復取一符投水中符亭亭不上不下須臾上符下下符上會中央三符同聚而不流鄭洪傳會稽記曰射的山南有白鶴山此鶴為仙人取箭漢太尉鄭洪採薪得一遺箭頃有人覓洪洪還之問何所欲洪識其神人也常患若耶溪載薪為難願旦南風暮北風後果然故若耶溪風至今猶然呼為鄭公風戴洋短陋李阿貧窮晉史戴洋字國流吴興長城人年十二病死五日而甦說死時天使其為酒藏吏授符籙結吏從旛麾將上蓬萊崑崙積石太室恒廬衡等諸山既而遣歸逢一老父謂之曰汝後當得道為貴人所識及長遂善風角妙占候卜數無風望好道術為人短陋神仙傳李阿蜀人常乞於成都而所得復以散貧窮夜去朝還人莫知其止宿後一日語人云予被召崑崙當往遂不復見劉寬長者夏啓明公真誥後漢劉寬靈帝時為太尉嘗坐客遣蒼頭市酒迂久大醉而還客不堪之駡曰畜産寬須臾遣人視之疑必自殺顧左右曰此人也駡畜産辱孰甚焉故吾懼其死也夫人欲試寬令恚伺當朝會麗服已訖使侍婢奉肉羹翻汙朝衣婢遽收之寬色不異乃徐言曰羹爛汝手其性度如此海内稱為長者闡幽微篇云夏啓文王邵公奭吴季札夏啓為東明公此四明公後並當昇仙階也主領四方鬼事李嬴蛟室思邈龍宫樹萱記李嬴遇神女遺以匹素云蛟室所織後遇胡人以三百萬易之云此龍頷小髯織成三十小劫方斷一綜續仙傳孫思邈見人殺蛇解衣而贖用藥以封投於草中去數月忽有人邀至一城郭若王者之居見一絳衣人相謝曰前者小兒蒙救孫潜問左右此何所答曰涇陽水府留飲問所須孫曰山居樂道故無所欲君取龍宫方三十首此方可以濟世救人孫歸歷試諸方救人不計數著千金方散龍宫方於其内唐高宗聞名除諫議不受後尸解空衣今為孫真人葛期致雨趙炳呼風神仙傳黄盧子姓葛名期治病千里寄姓名為治治皆愈年二百八十歲禁水水為逆流力舉千斤行及走馬頭上常有五色光氣高丈餘天大旱時到淵中召龍出使催促昇天便雨數日一旦乘龍而去皆與親辭别遂不復還緫仙記趙炳字公阿東陽人曾遠行遇舊交炳乃酌東流水為酒削桑皮為餔皆極醉飽曾至河欲渡岸傍求船船人不應炳乃鋪蓋水上而坐呼風亂流而濟悉無沾濕時人神異之阮丘貨葱文賔餌菊列仙傳黄阮丘者睦山道士也衣裘披髮耳長六七寸口中無齒日行四五百里每止於山上種葱貨藥以度世百有餘年人皆不識之及朱璜指出方知其神人候之已不見矣又文賔者太丘人也賣草履為業一日棄妻入山餌菊不出妻老入山尋夫見賔更少亦不肯下山賔曰汝亦好道遂令妻餌菊養氣夫妻俱得道謝敷少微李至亢宿晉逸史謝敷字慶緒會稽人也入太白山十餘年鎭軍郄愔召為主簿臺召博士皆不就初月犯少微少微一名處士星占者以隱士當之譙國戴逵有美才人或憂之既而敷死故會稽人士以嘲吴人云吴中高士便是求死不得死玉壺清話李至南宫嘗作亢宿賦其賦序曰子少多疾羸不勝衣庚寅歲忽夢遊一道宫金碧明焕一巨殿一寶牀巋然於中一金龍盤于牀上碧髯金鬛光射天地旁有緑鬢道士轉盻若嵓電謂予曰此亢宿宫也大象無停輪宜速拜之汝將事此龍積疾亦消子將拜龍輒先拜至道初太宗皇帝立真宗皇帝為皇太子命公與李亢相並為賓客太宗皇帝戒真宗二臣皆宿儒重德不可輕待吾選正人輔導於汝宗基國本吾無慮矣真宗恭禀皇訓見必先拜符亢宫之兆也玉畫瓦龜黄折草鹿酉陽雜俎王瓊有道術取一瓦片畫作龜甲懷之少頃取出置地則成真龜循行庭下經數日成瓦西山記黄真君名仁賢字紫庭一日受玉皇詔上昇而二弟尚在獵所紫庭遽往召之乃曰我等受性遊逸不堪作仙但願舉家昇騰我等未欲去世亦恐捕鹿冥數未足致此迷執紫庭以其分然乃付地仙之術教其修化復折草化鹿止其妄心二弟後隱於西山觀香脫網許映解束真誥王觀香靈王之女喬之妹也得喬飛解脫網之道與喬入山積三十九年道成授書為紫青宫妃主領東宫丹臺新録許映長史之兄也映絶志山林勤心味道遇王世龍受解束之道修返行之法服玉液朝腦精二三年中面有光華還顔反少但恨其所禀不饒不得其高品之通耳司命勑吾舉之使奏聞上宫移名東渚立為地仙周驅邪魅劉役鬼神西山記周真君諱廣字惠常入蜀得驅邪逐魅之術以拯救疾苦聞許真君在旌陽以符呪療疾遠近赴遡乃自蜀雲臺山至旌陽求見願事門下許君從之盡得其妙要後從許君上昇神仙傳劉根漢武帝時棄官學道入嵩山石室中廟掾王珍因請問根學仙時本末根曰吾昔入山精思無所不到後於華陰山見一人乗白鹿車從者十餘人左右玉女執采旌之節余再拜稽首求乞一言神人告曰爾聞有韓衆否答曰實聞之神人曰我是也遂授以道要夫道有昇天躡雲者有遊行五嶽者有不死者有尸解者藥之上者有九轉還丹太一金液服之皆立登天不積日月矣其次有雲母雄黄之屬雖不即乗雲駕龍亦可役使鬼神變化長生其次草木諸藥能治百病補虛駐顔斷穀益氣不能使人不死也李臻晦迹張皓登真高道傳李臻家甚貧一日有道士張齊物謁臻求寓泊之地臻待之甚厚張每醉或駕詈嘔汙卧具奴僕皆惡之而臻未嘗介意張因謂臻曰蒙君厚顧如此今别去能相送數里乎遂與之偕行張曰余周遊人間五十年未嘗見仁厚如君者遂以黄白術授臻辭以命薄不敢受張茫然自失曰君之道非某所及也於是抽簪引以為劒乃劃地隨手而裂曰自此為别乃投身入地而没臻異之張皓漢永初中嘗詔逸人為道士皓年二十歲與其選一日封衡忽至皓望風伏膺求啓未悟衡因觀其心遣涉于深淵則遇鮫鯨迫之而貌不變誘之以色試之以財而心不動衡曰可教也於是付青腰紫書金根上經及神丹半兩而誡之曰勤則得之替則失之皓俯伏受命遂入赤城山服丹行道至魏太初登真安妃貴客孫登奇人真誥興寧二年紫微夫人與安妃同降楊真人室紫微曰今日有貴客來相詣安妃神女乃李夫人之女昔往龜山學上清道成受太上書補為九華真妃賜姓安氏以遊行於太清也抱朴子云孫登奇人也無家屬每於山間穴地而處冬則單衣大寒披髮自覆其身而真誥亦云孫登獨弦而成八音真奇士道者㯶菷先生布巾茅亭記雍法志嘗供養一石老君每誦天蓬呪不輟一夕夢神人於石像前取一㯶帚與之曰但有患者以菷掃之言訖而覺自後有疾者來以菷拂之應手而愈時人為頌曰雍道者掃盲能視拂跛能履患者雲集丹臺新録軒轅集居羅浮山自號羅浮先生人傳數百歲每入山採藥而龍虎隨侍而行師能分形化影無所不至每出入持一市巾見有疾病以市拂之應時而愈後不知所在天台劉阮合浦元柳神仙傳劉晨阮肇嘗往天台山採藥迷失道路因過溪見二女子顔色殊絶邀至家設甘酒下胡麻飯山羊脯食之甚美館于山中半年許洎歸郷邑零落已七百年矣傳奇元和中有元徹柳實居于衡山欲越海艤舟合浦忽颶風飄入大海莫知所適俄至孤島而風止二子登岸忽見雙鬟女子二人因叩頭求哀乞返人世二女憫之乃引謁南溟夫人告以姓名夫人笑曰昔有劉阮今有元柳豈非天也命二女送客以玉壺一枚贈之題詩曰來從一葉舟中來去向百花橋上去若到人間扣玉壺鴛鴦自解分明語俄有橋長數百步欄檻上皆有異花二子登橋遂抵合浦回視已無橋矣將歸衡山中塗以手扣玉壺果有鴛鴦語曰當欲飲食前行自遇耳忽道左有盤餚飲食豐備二子食之不飢後遇一叟曰太極先生以壺告之先生曰吾貯玉液壺也亡來已久後二子隨叟隱祝融峰疑自此得道也少君眉目子榮鼻口神仙傳李少君齊人也聞漢武帝好神仙少君以神方干武帝云丹砂可作黄金服之能昇天時見武帝御座有銅器曰此齊威公之器也帝驗其刻鏤之文果是乃知少君數百歲肌膚光澤其眉目口齒如童子焉丹臺新録趙瞿字子榮時患癩疾垂死自厭入山以身投虎狼不歸忽遇異人授以服食法而疾除身體輕强年一百七十歲有少容臨卧時見二美女出入口鼻之間耳聞琴瑟之聲在人間三百餘年色如童子真多朝元可居占斗列仙傳李真多者神仙李脫之妹也隨兄修煉而兄授之以朝元之要行僅百年狀如二十許遇太上降授以飛昇之道今蜀中有真多治是也高道傳道士任可居者不知何許人年四十木訥愿慤負囊事道士向道榮道榮憐其志以鎭元策靈寳訣付之戒曰十八年後方可以示人災福之驗勿窺榮利無妄傳授此道得之者神仙泄之者夭枉可居自後漸言人休咎或為人禳醮每占先令每人齋戒向壁列斗魁之像坐其前則禍福吉凶歷歷如見李泌潑蒜叔茂種韭鄴侯家傳李泌少時身極輕能於屏風上立有異人云此兒十五必昇騰父母惡之忽聞空中異香作蒜汁潑之恐其飛騰也既長辟穀每道引骨節珊然人謂之鏁子骨嘗作歌曰天覆吾地載吾天地生吾有意無不然絶粒昇天衢不然鳴珂遊帝都焉能不貴復不去空作昂藏一丈夫真誥秦時巴陵侯姜叔茂來住句曲山下種五果并五辛菜常賣以市丹砂而用之今山間猶有韭薤即其遺種耶秦孝王時封侯今名此地為姜巴者是矣龍君橘杜漁父杏壇仙傳拾遺柳毅家于江湘儀鳳中下第將還郷里其故人客寓涇陽者往别之未至六七里見美婦人牧羊於野心甚易之問其故云洞庭龍君小女也嫁于涇川小龍為夫所薄愬於舅姑舅愛其子黜之以至于此因託毅寓書于洞庭之北有巨橘謂之橘社郷里祠之至其所以物擊木三五聲書可達矣毅如其言有武夫出波間引毅入波中其宫闕如王者之居於是留毅宫中歡宴累日既還贈遺珍怪不可名述南華真經孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子絃歌鼓琴奏曲未半有漁父者下船而來鬢眉交白披髮揄袂行原以上距陸而上左手據膝右手持頤以聽曲終張澥飲水伯陽餌丹仙傳拾遺張澥武陵人幼而好學常注念於桃源觀願遇靈仙以希度世亦髣髴通感祕而不言乾符中鄭洿出牧武陵因述詞文虔誠禱祝以澥牙將之中素勤道法令齎其詞致齋法事未畢有仙樂五雲之異良久垂一瑠璃瓶自空而下澥捧接之及一瓶水耳盡飲之甘美無比忽然騰躍昇天而去神仙傳魏伯陽入山作神丹將弟子三人丹成知弟子心未盡乃試之曰丹雖成當試之以犬犬飛者可服之若犬死不可服也乃以丹餌犬犬食即死伯陽曰吾輩違世俗委家入山不得仙道亦恥歸死之與生吾當服之丹入口又死徐二弟子相顧曰作丹以求長生今服却死何如不服乃出山營棺木二人去後伯陽即起與服丹弟子姓虞及白犬而出逢其入山伐薪人作手書與郷里寄二弟子二弟爾時乃醒悔恨而已騾客排闥胡琮啓關神仙傳茅山黄尊師學行甚高開講之次衆方雲集忽有一人排闥而呼曰道士奴天正熱聚衆何為何不入深山學道敢漫語耶師不對良久色稍和曰豈非要錢修造乎可盡取破釜雜鐵來師如其旨即命掘地為鑪以熾火銷鎔取少藥攪之少頃去火已成白金矣師感謝笑而出門不知所之後有人見於京師腰插一鞭逐一騾其去如飛或目之為騾客搜神覽江州太平觀道正胡用琮雙目失明罷職嘗令人引行觀中至門時天大雪人言有貧者口𠾑一筯坐堦砌上貨墨一金一寸人稀售之琮問其故曰今日大雪不能入城遂憩此而人少顧者琮憫焉丐之五十金日以為常忽一日叩門告辭關揵不開相隔而語曰我贈君墨一寸請自保之隨意而用若有患磨服之不復有苦琮謝之問其姓曰我賣墨牌榜即姓氏也乃置墨而去漸聞聲遠啓關無及矣琮因磨墨飲之即覺兩目明徹或曰以筯界口乃吕字疑其洞賔也沈彬石槨袁玘銅棺賈氏録談沈彬郎中少好道將卒戒其子云吾所居堂中正是吉地即葬之子孫不敢違既兆其穴開之見石槨一所甚寬廣及有青石蓮燈三枚鎸刻甚妙又有石記云開成二年開雖開亦不埋漆燈猶未照留待沈彬來後人見棲於西山天寳洞袁府君祠堂記云府君後漢人也按北齊修文御覽云陽羡初立縣時會稽袁玘生有神異而君始為令於此逆知水旱自言死當為神或寢息繼日夢與神宴會一旦無疾暴亡殯後風雨晦冥忽失柩所在有民夜聞荆南山若數千人聲晨往視之而柩在焉亟抵縣白之吏民馳至柩已神藏止見石壇石家而已於是改荆南山為君山至今俗呼為銅棺山以謂府君亡時天降銅棺如王喬為葉令天降玉棺類也紫雲乘風黄梅墮井紀聞録唐開元二十四年春二月駕在東京以李適之為河南尹其日大風有女冠乘風至玉真觀集于鍾樓人觀者如堵以聞於尹尹率略人也怒其聚衆袒而笞之而乘風者既不哀祈亦無傷損顔色不變適之大駭方禮謁奏聞勑召入内殿訪其故乃蒲州紫雲觀女道士也辟穀久輕因風遂飛至此後因大風復飛去不返廣異記黄梅縣女道士張連翹年八九歲常持瓶汲水忽見井中有蓮花如小盤漸漸出井口往取便縮不取又出如是數四遂墮井家人怪久不還往視見連翹立井水上自後不食父母命出家為道士年十八晝日於觀中獨坐見天上雨錢又雨黄藥吞二粒覺神情倍於常日魯聦致雷王向分影續仙傳葉千韶字魯聦有道術嘗遇歲旱人請祈禱師即焚香啓祝須臾降雨人有請致雷者以足擦地便鳴從地底轆轆聲一日於城市忽驅叱以振威人詰之曰我見某處火灾故救之耳驗之信然列仙傳王向生而秀異日望終南山高峰謂父母曰兒長大必居此山人甚器之既冠不願仕以坐忘遺照為事遇神仙孟先生授以道法能變化分形化影謝雲一川王濤萬頃集仙録果州謝自然絶粒多言道家事詞氣高異刺史韓佾至郡疑其妄延入州閉之累月率長幼開籥出之膚體儼然佾即使女自明師事之又於大方山置壇請道士程太虛具三洞籙遷自然居於州郭正元九年刺史李堅致任自然告云居城郭非便願依泉石堅即築室於金泉山一日詣州與李堅别即於金泉山白日上昇士女數千人咸共瞻仰須臾五色雲遮亘一川墨客揮犀王平甫熙寧癸丑歲直宿崇文館夢有人邀之至海上見中央宫殿甚盛其中作樂笙簫鼓吹之伎甚衆題其宫曰靈芝宫平甫欲與俱往有人在宫側隔水謂曰時未至且令去他日當迎之至此恍然夢覺時禁中已鍾鳴矣為詩曰萬頃波濤木葉飛笙簫宫殿號靈芝揮毫不似人間世長樂鍾聲夢斷時秀川鐵扇觀福金餅野人閑話祠部員外郎彭曉字秀川自號真一子常謂人曰我籛鏗之後世有得道者余雖披朱紫食禄利未嘗懈怠於修煉去作一代之高人終不為下鬼者矣宰金堂縣則恒騎一白牛於昌利山往來似有會真之所往往有白鶴飛鳴前後曉注陰符經解參同契每篆符謂之鐵扇子有疾者餌之輙愈集仙録黄觀福家貧每以栢葉為香焚之食栢不嗜五穀既笄欲嫁之忽謂父母曰門前井中極有異物往看之水果洶湧乃自投水中良久不出漉之得一古像天尊狀貌與女無異水即澄静便以木像置路側號泣而歸其母時來視之懷念不已忽有綵雲仙樂導衛甚多與女子三人下其庭中為父母曰女本上清仙人也有小過謫在人間年限既畢復歸天上無致憂念也又曰此今年疾疫死者甚多移家益州以避凶年即留金數餅昇天而去三洞羣仙録卷之十二
