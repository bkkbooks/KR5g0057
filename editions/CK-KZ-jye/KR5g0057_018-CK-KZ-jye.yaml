body:
  text: 眞誥昔高辛時有仙人展上公者於茅山伏龍地植李彌滿其地展公今爲九宫內右司保其常向人說昔住華陽下食白李味甚美憶之未久而忽已三千年矣陸生掘瓮屈氏埋錢廣記盧山人者有道術一日過復州界維舟於陸秀才莊門或語盧山人非常人也陸乃謁之以決休咎盧曰君今年不動憂旦夕禍作君所居堂後有錢一甒覆以板非君有也錢主今始三嵗君愼勿用一錢用必成禍能從吾戒乎陸矍然謝之及盧生去水波未定陸笑謂其妻曰盧生言如是吾更何求乎乃命家童掘地深數尺果遇板徹之有巨瓮散錢滿焉陸喜其妻亦裙運紉草貫之將及一萬兒女忽暴頭痛不可忍陸曰豈盧生言將驗乎因奔馬追及且謝違戒盧生怒曰君用之必禍骨肉與利輕重自度也棹舟去之不顧陸馳歸醮而瘞焉眞誥云良常山漢時其山下有屈氏家大富財有巨億埋銅器於此于今在也亦有錢錢在西北小山上向也賢安紫㮈伯兒紅蓮本傳南魏夫人名華存字賢安季冬夜半太極眞人降夫人之室設酒餚陳元雲紫㮈神仙傳拾遺張伯兒西晉時修道於蜀石斛山精思感神仙忽降謂之曰此山有長生夜光之芝得食一枚白日沖天其芝生於水側夜視如紅蓮者是也苦求數年得而食之能飛行徹視後乘赤虎而去莫知其所歸舜鸚鵡文祥杜鵑幽恠錄柳歸舜自巴陵泛舟遇風至君山登岸行數里有鸚鵡數千相呼姓字曰柳十二遭風得臻異境所謂因病致妍耳忽有二道士曰君舡風便何不急回授一尺綺曰以此掩眼卽去矣歸舜忽飛達舟所續仙傳商文祥自號七七周寶鎭浙西遇之甚厚寶謂曰鶴林寺杜鵑花天下稱奇嘗聞汝醉歌云解造逡巡酒能開頃刻花子能開此花赴重九乎商曰諾乃前一日往鶴林寺宿中夜有女子來語曰妾爲上蒼所命下司此花此花亦非久歸閬苑矣今爲道者開之至重九日其花果爛熳後遭兵火信歸閬苑矣筠卿三笛太眞一絃廣異記吕筠卿月夜泊君山飲酒吹笛忽一漁舟來相竝有老人持一笛大如合拱示吕曰此天樂也不可吹次出一笛如世所用曰此洞府仙樂也又一小者如筆管曰此人間笛也遂吹其小者一兩聲波濤洶涌又三五聲舟楫掀舞吕大恐老人止笛吟曰湘中老人讀黃老手援紫䉪坐碧草春至不知湘水深日暮忘却巴陵道抱朴子太眞乃西王母之女也與東嶽夫人往來於岱山重嵓深隱人所不到去地千餘丈中有玉几金寶之物每彈一絃之琴則百鳥翔集鼓舞而至崔君破鏁零子發匱宣室志犍爲郡東十餘里深嵓中有一觀有顏道士居之有石函三尺緘鎖甚固相傳尹眞人上昇時以石品付門弟子戒約愼不得啟啟之必有大禍有崔守者至郡聞之命破其鏁開函視之但有符籙而已崔忽暴卒三日而悟曰吾爲冥官所攝何爲開眞人石函今上帝令削吾壽祿又奪五任官今獨有二年在矣崔果得二年乃卒丹臺新錄范零子少好仙道如此積年後遇司馬季主季主將入常山中積七年石室中東北角有石牖季主出行則語之曰愼勿開之如此數數非一零子忽發視之下見其家父母大小近而不遠零子悲思季主還乃遣歸後復取之使守一銅匱季主出則叮嚀勿發零子復發之如前見其家季主遣之遂不得道綠華絶整少元端麗眞誥萼綠華者自云是南山人不知是何仙也女子年可二十上下青衣顏色絶整以升平三年十一月十日夜降羊權家贈詩一篇并致火浣布手巾金玉條脫各一枚訪問此人曰是九嶷山得道女羅郁也此女已九百嵗矣廣記崔少元者唐汾洲剌史崔恭之小女也其母夢神人絳綃衣駕虬龍持紫函授於碧雲之際乃孕十四月而生少元旣生而異香襲人紺髮覆目耳璫及頤端麗殊絶昔居無欲天爲玉皇左侍書耳邱公鶴跡方平蟬蛻神仙傳浮邱公昔接王喬遊王屋山歇鶴於路王屋山有憩鶴臺臺上鶴跡存焉有浮丘公隱處今南峰號爲南嶺是也列仙傳道士王遠知字方平舉賢良方正累遷中散明天文隱居山林至漢帝累召不出令郡守辟詣京師而方平閉口不言謂弟子曰吾數將盡明日當行及期解化無尸如蟬蛻耳蒯京練精籛鏗閉氣修眞祕訣云道人蒯京年一百七十八甚丁壯朝朝服玉泉琢齒玉泉者口中津液也朝旦未起早漱津令滿口吞之琢齒二七過名曰練精神仙傳籛鏗卽彭祖也有道引術每有疾則閉氣以攻所患其氣雲行體中下達指末尋卽體和嘗云上士別牀中士異被下士服藥服藥百褁不如獨卧後人集其採納之術爲彭祖經行於世脈望何諷㹻子袁晁原化記唐末書生何諷嘗買得古書一卷讀之卷中得髮捲䂓四寸如環無端斷絶處兩頭滴水升餘燒之作髮氣諷常言於道者道者曰吁君固俗骨遇此不能羽化命也據仙經蠧魚三食神仙字則化爲此物名曰脈望夜以䂓當天中星星使立降可求還丹取此水和而服之卽換骨上昇因取古書閱之數處蠹漏尋義讀之皆神仙字諷方歎伏廣異記唐廣德二年臨海縣賊袁晁寇永嘉其舡遇風飄去數千里遙望一山青翠森然有城壁五色照耀囘妃就泊見精舍無人房中唯有胡㹻子二十餘枚及蜀錦黃金器物甚多賊旣不見人乃競取物忽有一婦人從金城中出謂曰汝非袁晁黨耶何得至此此器預爾何事輙然取之回視㹻子汝謂此爲狗乎非也是龍耳宜速還之賊等各送物歸還因問此是何處曰此是鑑湖慈心仙人修道處也陶侃鶴弔道合蝗消賢已集陶侃居母憂嘗有二客來弔不哭而退化爲䨥鶴沖天而去時人異之高道傳道士劉道合遇神人告之曰聞子好道志節不屈以盟威攝召符與之道合授而吞之自是道法所施無不驗高宗將封泰山雨不止帝令道合禳祝俄霽得寵賜輙散貧乏洛陽苦飛蝗道合以符示官吏俾散帖境內則蝗立消滅岐暉返室慧虛渡橋高道傳道士岐暉事蘇法師得三洞法卧斗之術師行之厯年之久湛然自得嘗以仙經云欲爲仙客入太白於是擇門人志道者俱往旣至而返則室中嘗有神仙談笑廣記慧虛卽天台國清寺之僧也時與同侣遊行至一石橋慧虛渡過徑上石壁見一老人問曰世傳過橋見羅漢不知羅漢何在老人曰此處乃神仙之福地天帝之下府金庭不死之鄕桐栢上眞王君主之列仙三萬人上眞三百太上一年三降此宫較定天下學道之人功行非羅漢所居也僧曰神仙可學否老人曰積功累行白日昇天遂引數步老人不見忽在國清寺前慧虛自後易道家服好丹藥修鍊終南山遇老人得丹服乃獲昇舉人云老人乃張果老耳聶遇彭蔡謝會梅蕭高道傳聶師道居南嶽招眞觀一日入山尋蔡眞人行抵暮見一樵者問之子何往聞蔡眞人隱此願一禮謁樵曰今暮矣不可到前有人家可宿師前行見一草舍有一農者問子何往曰尋蔡眞人農者曰前所見樵者乃蔡眞人也師歎曰遇仙聖而不識命耶農者留宿遂就寢日高主人未興師乃潜行逢一老人邀坐石上問何往具前以對老人曰夜宿農舍卽眞人之子也老人曰子道氣甚濃但仙骨未就折草與食舉目而老人不見歸以告道眾眾曰子一入山逢三仙老人者必彭眞人也旣見蔡眞人父子又見彭眞人豈非修眞之至者續仙傳謝修通詣衡山感神人告之曰廬陵玉笥山乃司命之別府宜往彼修鍊修通從之一日深入溪源忽遇一大舘舍見一青童出問子非謝修通乎蕭梅二眞人待子久矣卽引見二眞人修通再拜曰塵世螻蟻貪慕生道枯骨重生獲期元會眞人乃賜松葉并嘉禾五穗與食修通後得道尸解天活無恙常摐有疾高道傳陶天活者南安人居海濱海水忽溢家人悉驚走避難天活始生其母挈去不能得舉家皆泣之洎水落而歸其子在桑之交枝無恙因名之曰天活及長慧悟而眞氣內足自唐憲穆恭文四宗朝充內供奉道士時公卿大夫無不欽尚後歸海濱不復出談苑常摐有疾老子問曰先生疾甚無遺教以語弟子乎摐曰過故鄕而下車子知之乎老子曰非謂其不忘故耶摐曰嘻是已過喬木而趍子知之乎老子曰非謂其敬老耶摐曰是矣張口曰吾舌存乎曰然吾齒存乎曰亡舌存以柔齒亡以剛摐曰是已天下之事已盡矣章僕金硯謝仙鐵筆廣記吳郡蔣生隱居四明好鍊丹藥積年不成一日於貧子中雇得一僕名章全素所談神丹之事蔣叱之曰汝傭人無妄言章就出一瓢子取藥一粒謂蔣曰此丹藥能化土爲金借先生之石硯以傳之可乎蔣未之信是夕章忽卒未殮已不見尸唯衣帶存焉而石硯已化紫金矣摭遺何仙姑居永州零陵邑滕子京謫守岳陽一夕大雷雨旣霽華容西峰石壁上有三字存焉曰謝仙火字體怪異公命模字詢之皆莫有知者或曰零陵何仙姑必知之乃遣使往問之仙姑曰此雷部中一鬼耳兄弟二人好以鐵筆書字其人長三尺公遣人往西峰騐之果然張寬對星善勝吞日六帖漢武時有女子浴於渭水中乳長七尺上怪其異遣問之曰第七車者知我所來時蜀人張寬爲侍中寬對曰天星主祭祀也齋戒不潔則女人星現眞武經昔善勝皇后夢吞日光而生眞武生而神靈長而勇猛不統王位惟務修行輔助玉帝誓斷天下妖魔救護羣品日夜於王宫中發此誓願父王不能禁制遂捨家辭父母入武當山中修道四十二年功成果滿白日登天屈原見斥賈誼被黜拾遺記屈原以忠見斥隱於沅湘披蓁茹草混同禽獸不交世務採栢實以和桂骨用養心神被王逼逐乃赴清冷之水楚人思慕謂之水仙其神遊於天洞精靈降於湘浦楚人爲立祠至漢末猶在其山中有靈洞採藥之人入之迥然天清霞輝花芳柳暗丹樓瓊宇宫殿異常眾女霓裳冰顏艷質與世殊別飲以瓊漿贈以丹醴之訣遂絶饑渴洎歸里邑各非故鄕鄰尋得九代孫問之云遠祖入洞庭山採藥不還今經三百年也眞誥西明都禁郎賈誼昔爲治馬融事不當被黜守泰山泰山君近請爲司馬已被可少君石像太眞金釵拾遺記漢武帝詔李少君謂曰朕思李夫人可得見乎君曰可遙見不可同於𡺨山屋闇海有潜英之石其色青輕如羽毛寒盛則石溫暑盛則石冷刻之爲像不異眞人使此石像往則眞人至矣帝後得石卽命工圖刻作夫人形像刻成乃置於輕紗幕裏宛若生時帝大悅仙傳拾遺楊幽通本名什伍幼遇道士教以考召之術明皇幸蜀馬嵬之後屬念妃子不已乃召什伍至行朝上問其事對曰雖天上地下冥寞之中鬼神之內皆可厯而求之上卽命什伍遍加求訪然莫知其所後於蓬萊山南宫西廡有羣仙所居上元女仙張太眞卽貴妃也什伍往見之曰我太上侍女隸上元宫聖上卽太陽朱宫眞人偶以宿綠世念頗重謫於人間此後一紀自當相見乃取開元中所賜金釵鈿合各半玉龜子寄以爲信聖上見此自當省憶言訖流涕而別什伍以此物進之上澘然良久元子奉戒季偉長齋眞誥元子少好道遵奉戒法至心苦行日中菜食鍊形守精不接外物州府辟聘一無降就或遊山林屏棄風塵志願憑子晉於緱岑侣陵陽於步元故改名爲元子自字爲延期矣登眞隱訣云季偉昔長齋三年謁誠單思乃能服日月光芒之氣於是神光映身也曾子納屨何娘織鞋南華眞經云曾子居衛緼袍無表顏色腫噲手足胼胝三日不舉火十年不製衣正冠而纓絶捉衿而肘見納屨而踵決曳蹤而歌商頌其聲滿天地若出金石天子不得臣諸侯不得友故養志者忘形養形者忘利致道者忘心矣廣記廣州何二娘者以織鞋爲業年二十與母居素不修仙術忽謂曰住此悶意欲行遊後一日便飛去上羅浮山亦往來蕭寺山北循州去南海四百里有楊梅木大數十圍何氏每採其實及齋而返開元中勑令遣使召至途中使者悅其色而未言忽云使者有此心不可留矣言訖湧身而去不知所之閞卒抱石江叟遇槐見聞錄鄂州黃鶴樓下有石光徹名曰石照其石世傳以爲仙人洞也有守閞老卒每晨起必拜洞下一夕月如畫見三道人自洞中出吟笑久之將復入洞卒卽從之道士曰汝何人耶卒具言其所以且乞富貴道士曰此洞間石速抱一塊去卒持而出明視石乃金也傳記有江叟者善吹笛能作龍吟後適閿鄕至盤豆館道傍大槐下醉寢夜見一人數丈曰荆山舘中一郎來看大兄便聞槐上有人下來與語及明至荆山舘中見庭槐十圍疑附神物乃曰某好道不逢師木神有靈乞與指教神曰但入荆山求鮑仙姑必獲度世叟入山果遇仙師曰子有琴高之相矣今贈子美玉笛吹三年可致洞中龍持水丹來吞之便爲水仙叟後三年岳陽寺樓吹笛果有龍化爲人持丹而來餌之遂變童顏入水不濡古忘宦情韓謹臣節神仙傳古元之因飲酒而卒三日再生云遊和神國異花珍菓四時不凋田疇盡長大瓠瓠中實皆五穀甘香珍美非中國稻粱之比四時之氣常熙熙和淑如二三月國人日擕遊覽之歌詠陶然暮夜而散元之旣蘇踈放人事都忘宦情遊行山水自號知和子後不知所終神仙感遇傳唐宰相韓滉廉問浙西强悍自負常有不軌之志有適客李順者泊舟於京口夜恩燈斷忽飄至一山下上岸尋求行五六里見宫闕華麗有烏巾岸幘者語之曰欲寓金陵韓公一書無辭勞也因問此何處也答曰此東海廣桑山是魯公宣父仲尼得道爲眞官理於此山韓公卽仲由也性强自恃夫子恐其掇刑綱致書以諭之順得書卽還舟中逡巡則達舊所旣而投所得之書公發書視之古文九字了不可識乃拘縶順以爲妖妄有一客厖眉古服言善識古文公出書示之客曰此孔子書乃夏禹科斗文也文曰告韓滉謹臣節勿妄動公異之韓自是拱默克保終始巽二起風葛三避雪幽怪錄晉州剌史蕭至忠將以臘日畋游有樵者於霍山見一長人俄有虎兕鹿豕狐兔駢匝長人曰余元冥使者奉北帝命臘日蕭使君獵汝等若干合鷹死若干合箭死有老麋屈膝求救使者曰東谷嚴四善謀群獸從行薪者隨覘之茆堂中有黃冠一人老麋哀請黃冠曰若令滕六降雪巽二起風則蕭使者不復獵矣薪者回未明風雪彌日蕭使君不出廣記崔希眞善攻畫好修養一日大雪中見一老人蓑衣避雪門下崔邀之家與老人同入至幃幄前老人顧望倏忽不見覓之無蹤遂歸幃中有畫松木一株仙人藥笈在下崔未之曉請問李含光先生先生曰此葛仙公第三子之所畫也意謂得道者壽若松栢之謂也抱一嘯傲盧鴻磬折武仙童碑云抱一嘯傲昇平輕欺富貴扶踈丹桂難藏明月之光峭絶青山莫滯白雲之跡言之不足道在其中詞多不錄又詩一首云聖主搜羅物外人總求金闕見虚眞餘余不願彰名姓別得田元道可親仙童昔持此書與茅山朱自英先生先生得書而使者忽不見疑卽仙童自至也仙童姓武名抱一人呼爲武仙童北夢𤨏言明皇召嵩山隱士盧鴻三詔乃至及謁見不拜但磬折而已問其故鴻對曰老子云禮者忠信之薄可不足依山臣鴻敢以忠信奉見帝異之潘老餚饌玉仙麯蘖原化記唐崧山少林寺元和間嘗因風雨後有一老人策杖叩門求宿寺人以閉門訖指寺外空屋令宿亦無床蓆入更後僧人見寺外燈火怪而問之見其屋內設茵幕華盛陳列餚饌老人飲噉自若及曉老人睡起漱盥訖取床蓆帳幕內葫蘆中空屋如故問其姓名云姓潘氏從南嶽北游太原後時有見之者青𤨏太原府助教張世甯暴疾將終吟曰翠羽旌幢仙子宅紫雲樓閣玉皇家人間風物易分散回首武陵空落花旣卒神降其妹曰我籍係上天第十八洞玉仙人也因會瑤池考視塵中地仙功行簿聞人間麯糵香徘徊不進遂犯後至之罰西王母啟其事爲我有人間酒分宜謫償之寓迹浮生今還本籍因歌曰休休休偷得休時便好休歡喜寃家無對頭仙宗赤鯉公遠白魚高道傳傅仙宗隱資陽山明皇召見時利州江舡多溺津人告苦師投符於江翌日果有二鯉魚死於灘上肚上有丹書字云赤鯉赤鯉生於河水不避仙官宜得其死剌史奏聞詔立生祠於江側又羅公遠在唐時已數百嵗乍老乍少人莫識之時太守醼屬吏于郡之園亭士庶競至忽一白衣來有一小童叱之曰汝擅離本處白衣人去吏執小童以白太守問名答曰羅公遠適見龍王爲公逐之剌史未之信曰可見本形否曰不難遂穿一穴以水引之一白魚隨流而躍青烟如線頃之黑氣橫天雷電而雨化白龍飛去赤須墮髮紫霞生鬚神仙傳赤須子者豐人云秦穆公時主魚吏也食松實天門冬齒落復生髮墮更出後去上吳山七十餘年莫知所之酉陽雜爼東陵聖母廟主女道士康紫霞自言少時夢中被人錄於一處言天符令攝將軍巡南嶽遂以金鎻甲令騎導從千餘人馬蹀向南去須臾至嶽神拜迎馬前夢中如有處分嶽中峰蠻溪谷無不厯也恍惚而返鷄鳴驚覺自是生鬚數十莖鮑靚兄弟積薪婦姑眞誥司命君曰女眞鮑靚其七世祖李湛張慮本在渭橋爲客舍積行陰德好道希生故令福逮於靚使人易世變鍊更生合爲兄弟根胄雖異德廕者同故當生氏族今在洞天中仙矣廣異記翰林棋者王積薪從明皇西幸蜀宿深溪之家有婦姑止給水火纔暝闔戶積薪夜聞如謂婦曰良宵無以爲適與子圍棊可乎堂內無燭婦姑各在東西室婦曰起東五南九置子矣姑曰東五南十二置子矣婦又曰起西九南十置子矣姑曰夜及四更其下止三十六姑曰子已北矣吾止勝五枰耳達明請問於姥姥顧婦曰是子可教以常勢耳婦乃指示攻守殺奪救應防拒之法甚略姥曰止此已無敵於人間矣積薪行去數步回顧已失向室廬矣周寶改葬騎生結廬稽神錄周寶爲浙西節度使治城隍至鶴林門得古冢棺櫝
