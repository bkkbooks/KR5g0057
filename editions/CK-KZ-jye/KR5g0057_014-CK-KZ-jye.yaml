body:
  text: 醫護將士不可殺之䇿不從俄見吉卒後葬之失尸所在眞境錄法師朱君緒字法滿居玉清觀卽解紛異俗尚行全眞閉戶閑庭下帷虛室器宇宏雅泰定發乎天光情性淵默雷聲洊乎江表爰以玉清本觀地迫諠煩天柱古壇境遠閑靜乃拂衣不駐策杖攸往數年之間諸業未就忽寢微疾一朝倐起命水澡浴具冠服焚香端坐語弟子曰吾於彭殤存亡齊之久矣然道妙寂寂感者通焉神理冥冥契者昭焉吾言之矣汝知之矣經法戒行爾其勉諸言訖奄然而逝清虛小有寒華大茅王氏神仙傳王褒字子登鹿巾披褐徧遊名山精感昊穹夜半忽聞林中人馬之聲簫皷亂音須臾千乘萬騎浮空而至神人乘三雲之輦手把虎符停駕而告言曰子玄錄上清金書東華名編清虛位登小有必當掌括寶籍爲天王之任耳茅山記孫寒華卽吳帝之孫女於茅山修道道成沖虛而去因號其山爲華姥山眞誥曰寒華乃神仙杜契之弟子行元白法而得少容今在大茅之間時或出入有見之者王錫甘露田生神膠總仙祕錄眞人王錫嘗因大疫入息山採藥散施活人無數忽遇一道士謂曰子有風骨而又積德多矣因授以飡風飲露之術一日天降甘露於所居之側竹木枝葉上眞人得以飲之遂昇天仙傳拾遺田先生隱於鄱亭作小學時饒守齊推有女嫁李生者數月而孕李生赴舉長安其婦將產忽爲鬼所害而卒李生下第歸饒於野中見其妻訴鬼所害之事曰可於鄱亭告田先生或可再生李如其言卽往村學見先生哀祈之先生曰但屋舍已壞矣先生卽從舍出乃呼地界而問曰剌史女因產爲鬼所殺屋舍已壞如何一吏曰只追李妻魂魄合爲一體以神膠塗之卽生矣李妻乃活遂失先生所在遐周詩讖忠恕字嘲高道傳李遐周有道術開元中召入禁掖久之天寶末一旦遁去但於所居壁上題詩讖祿山僣竊及幸蜀之事人莫能曉而後皆有所驗其末篇云燕市人皆去函關馬不歸若逢山下鬼環上繫羅衣燕市人皆去者假幽薊之眾而起也函關馬不歸者哥輸翰潼關之敗疋馬不還也若逢山下鬼者卽嵬字馬嵬驛名也環上繫羅衣者貴妃小字玉環馬嵬時高力士以羅巾縊之其所先見皆此類也玉壺清話郭忠恕惟縱無檢多突忤於人聶崇義建隆初拜學官河洛之師儒也趙翰王嘗拜之郭使酒詠其姓玩之曰近貴全爲聵攀龍卽是聾雖然三箇耳其奈不成聰崇義應聲反以忠恕二字解其嘲曰勿笑有三耳全勝蓄二心郭大慚終以此敗後坐謗時政擅質官物流登州中途卒藁葬於官道之傍他日親友殮葬發土視之若蟬蛻殆非區中之物也脫空王老詐死馬郊神仙有王老者莫知年嵗自言姓王不知何許人或示死於此卽生於彼屢於人間蟬蛻時人謂之脫空王老江淮異人錄司馬郊一名疑躡履而行一日可千里性麄暴人無敢近之者能詐死以至青腫臭腐俄而復活嘗止宣城逆旅召主人與飲因而凌辱而更繫之旣而互相搏擊郊忽掊地視之已死體冷色變一市皆聚觀乃召鄕里縛其主人將送於官時已向夕欲明旦乃行至夜復聞店中喧然曰失司馬尊師矣而人方悟郊詐死也文侯布穀郭璞散豆高道傳道士牛文侯性識頴拔學洞古今多誨人爲善每冬凜則布穀于地使禽虫有所食陰功密惠大以及於人小以及於物脩身積德久而愈篤方術傳郭璞至廬江太守胡孟康家將趣裝去之愛主人婢無由而得乃取小豆三升繞主人宅散之主人晨見赤衣人數千圍其家就視則滅其惡之請璞爲卦璞曰君家不宜存此婢可於東南二十里賣之愼勿爭價則此妖可除主人從之璞陰令人買此婢復爲符投於井中數千赤衣人皆反縛一一自投于井主人大悅王纂飛章張殖易奏王氏神仙傳王纂當晉室擾攘之時憫斯民之苦每夜飛章以告上帝俄感太上自空而下告之曰子憫生民形于章奏吾得鑒聽于子遂命侍童取三五齋訣授於纂曰勉而行之眞仙可冀廣記張殖者彭州道江人遇道士姜眞辨授以六丁駈役之術大厯中西川節度使崔甯常有密切之事差人走馬入奏發已三日忽於案上文籍中見所奏淨本猶在其函中所封乃表草耳計人馬之力不可復追憂惶不已莫知爲計知殖有術召而語之殖曰此奏可易不足憂耳乃炷香一爐以所寫淨表置香烟上忽然飛去食頃得所封草墜於殖前及使回問之並不知覺進表之時封印如舊崔公深異之師皇龍針崔煒蛇炙列仙傳馬師皇卽黃帝馬醫也識馬生死之診治之無不愈者忽見一龍下向之垂耳張口師皇曰此龍有疾知我能治遂取針以針其脣其龍乃去後數年數數有龍見負師皇去廣記崔煒於正元間遇一老嫗自稱鮑姑授艾少許云每遇疣贅不過一炷言訖不見煒莫之曉一夕忽墮於枯井中無計而出旁見一白蛇蟠屈數丈煒視其脣亦有疣偶因野燒延火飄入井中煒取火依鮑姑之言以灸之其疣應手而墜煒知龍也遂跨其背而蛇身光燭相照昇騰行至一洞中見一青衣童子曰玉京子也已送崔君來煒至問童子鮑姑何人曰鮑靚女葛洪之妻也多行灸道於南海煒方駭之又問玉京子何人曰安期生常跨斯龍朝玉京號玉京子也賀乞鑑湖葛求句漏高道傳賀知章字季具越州永興人性曠夷初擢進士第累遷賓客授秘書監晚節尤誕放天寶初病夢遊帝居數日寤乃請為道士還鄕里詔許宅為千秋觀又乞官湖為放生池又詔賜鑑湖剡川一曲既行帝賜詩寵行人比之為二疏神仙傳葛洪字稚川本姓諸葛遠祖征江漢次丹陽之句容因止而嘆曰獨我在此何諸之有遂去諸字葛姓之興始於此也究覽典籍尤好神仙親友薦洪才器宜長國史選為散騎常侍洪固辭不受加以年老欲合丹藥聞交趾出丹砂乃求為句漏令遂將子姪俱行焉公昉仙酒法先神燈摭遺唐公昉興元府人興元有斗山觀自平川內聳出一山四面壁立其上方如斗底故以名之薜蘿杉栢景象奇妙昔公昉飲李八百仙酒舉家拔宅上昇故後人題云霞盃欲舉醉陶陶不覺全家住絳霄㳂宅只知雞犬在上天誰信路岐遙三清寥廓抛塵夢八景雲霓事早朝惟有故林蒼栢在露華烟靄鎖驚飈今有故基存焉丹臺新錄彭宗字法先嘗服業於杜沖眞人栖眞味道精貫人神一日夜間行道有神燈數枝浮空映席凝輝流耀人皆異之君賢易姓拱壽塗名馬君內傳馬明生本姓和字君賢少爲縣吏捕賊爲賊所傷當時殆死忽道傍見一女人年可十六七衣服奇麗姿容絶世行步於其間明生知是神仙因叩頭乞治女人卽與藥一粒大如小豆與服之於是卽愈明生乃棄職易姓名隨神女還岱宗神女知其可教乃令安期生授金液丹方明生後服丹上昇括異志范公仲淹倅陳州時郡守母病召道士奏章公笑曰庸人安能達章帝所耶道士秉簡伏壇終夜不動試捫其𩪍則僵矣五更手足微動良久謂守曰夫人壽有六年所苦勿慮守問今夕拜章何其久也曰方出天門遇放明年進士春牓觀者駢道以故稽留公問狀元何姓曰姓王二名下一字墨塗旁注一字遠不可辨旣而郡守母病愈明春狀元乃王拱壽御筆改爲拱辰公始歎道士之通神鬼谷犬履山陰鵝經仙傳拾遺鬼谷晉平公時人隱居嵩陽鬼谷因以爲號先生姓王名誗蘇秦張儀從之學縱橫術智謀相傾奪不可化以至道臨別去先生與一隻履化爲犬以引二子卽日到秦矣先生在人間數百嵗後不知所之眞誥注王逸少卽王廙兄曠之子有風味善書後爲會稽太守永和十一年去郡不復仕先與許先生周旋頗亦慕道又晉書羲之愛鵝時山陰道士好養鵝羲之往觀焉意甚悅因求市之道士云爲我寫黃庭舉羣相贈耳羲之欣然寫畢籠鵝而歸偓佺松實永璝茯苓列仙傳偓佺槐山採藥人也好食松實形體生毛行走如飛年三百嵗劉向爲之頌曰偓佺餌松體逸眸方足躡鸞鳳走超騰驤仙傳拾遺葛永璝常居蜀之上清山志希度世巨松之下時有夜光因得茯苓其狀如人形鍊而食之能飛行變化丹成服之白日昇天因號上清山爲葛璝山天師鬼降眞君牛鬬高道傳天師張道陵昔成都與鬼戰奪二十四獄俱爲福庭降二十八宿以通正氣時有鬼帥尚居青城山下爲人鬼貿易之所謂之鬼市天師至則化爲寶座以居之兵固不能刄火亦不能焚於是鬼帥降焉西山記許眞人遜還豫章周覽城邑忽遇一美少年自稱姓愼來謁禮貌勤厚詞語辨捷欲少留之遽告去眞君謂門人曰此非人乃蜃精耳得非聞吾有除害之意來見試耶若不誅之終爲大患遂乘高迹其所之乃往江滸化爲黃牛戲龍沙上眞人遂剪紙化黑牛往鬬之令弟子施岑持劒至其所且戒之曰俟牛鬥酣卽以劒揮其黃者施君如命一揮中其左股遂奔入城西門外橫泉井中而黑牛復化爲紙矣王授琵琶集獻荳蔻祕閤閑談王保義爲荆南高從誨行軍司馬生女不食葷血五嵗能誦黃庭經及長夢流水登山見金銀宫闕云是方丈山女仙數十人曰麻姑相結姊妹授以琵琶數曲自是數夜一遇嵗餘得百餘曲其尤妙者有獨指商以一指彈一曲後夢麻姑曰卽當相邀明日庭中有雲鶴音樂奄然而卒高道傳道士軒轅集居羅浮山宣宗嘗召入內時京師素無豆蔻荔枝花上因語及俄頃二花皆至枝葉芳茂如裁剪者道源推步虛中章奏本傳邱濬字道源能通陰陽太極數早嵗欲遊華陽洞天求爲句容令任滿以詩寄茅山道友云鳴鳳相邀覽德輝松蘿從此與心違孤峯萬仞月正照古屋數間人未歸欲助唐虞開有道深慚茅許勸忘機明朝又引輕帆去紫木年年空自肥濬嘗語家人曰吾壽終九九一日朝起盥沐罷索筆作春草詩一章詩畢端坐而逝是年八十一及殮空然眾謂尸解池守光祿滕公甫元發記其事葬於九華後數年有黃衣急足持濬書抵於滁陽家人啟封黃衣忽不知所在書中云吾本預仙籍以推步象數謫爲泰山主宰獨異志唐正元中丹陽令王瓊三年調集皆黜落甚惋憤乃詣茅山道士葉虛中求奏章以問吉凶虛中爲奏其章隨香烟飛上縹緲不見食頃復墜地有朱書批其末云受金百兩折祿三年枉殺二人死後處分後一嵗瓊無疾暴終可交酒斟文祥栗嗅續仙傳王可交秀州華亭人以耕釣爲業一日鼓枻江行忽見一綵畫花舫中有道士七人呼可交姓名可交驚異有侍從𩮀角者引交上舡七人面前各有青玉盤酒器果實瑩徹一人曰好骨相今生於凡賤間已多破矣一人曰與酒喫侍者瀉酒鐏中酒再三斟不出一人曰與栗其栗青光如棗長二寸許肉脆而甘命一黃衣人送之瞑目間忽坐於天台山瀑布寺前離家已半年矣雲笈七籤殷文祥名道筌自號七七嘗預官僚公宴一日有酒倡優者侮之七七語主人曰以二栗爲令可乎眾皆忻然乃以栗巡行嗅之皆聞異香惟佐酒笑七七者二人嗅之化作石綴於鼻掣不落但言穢氣不可堪二人共起狂舞花鈿委地相次悲啼粉黛交下優伶輩一時亂舞鼓藥自作聲頗合節奏曲止而舞不已一席之人笑皆絶倒主人祈謝之有頃石自鼻落及花鈿粉黛悉如舊焉元女華幄太眞霓裳拾遺記燕昭王時廣延國來獻二女一名旋波二名捉琰王好神仙之道故二女託形下降並玉質凝膚體輕氣馥王處以單綃華幄飲以珉𤧋之膏二女皆善舞其所至之處香風歘起徘徊翔轉殆不自支王以纓拂之皆舞容冶妖麗綺靡鸞翔王復以袖麾之舞者皆止王知其神異乃處以崇霞之臺及設麟文之席散荼毒之香香出波弋國逸史天寶初中秋夜羅公遠曰陛下能從臣月中遊乎取桂枝擲空爲大橋色如白金上行至月宫女仙數百素衣飄然舞於廣庭上問何曲曰霓裳羽衣也又天寶四載册太眞宫女眞楊氏爲貴妃后服進見之日奏霓裳羽衣曲劉禹錫詩云開元天子萬事足惟恨當時光景促三鄕陌上望仙山歸作霓裳羽衣曲仙心從此在瑤池三清八景相追隨天上忽乘白雲去世間空有秋風詞太子服液長胡獻霜丹臺新錄釋道微竺法蘭問葛仙翁曰道起無先無後不可稱論不審老子太子孰爲先後公答曰微乎子之所問乃合正眞道素無先無後無左無右存亡高下貴賤無形無像所以字之曰道不可稱言也太子生老子後前世有功德得服太上金液一升身若紫金光聚故號金仙氏爾眞誥北戎長胡大王獻帝舜以白琅之霜十轉紫華服之使人長生飛仙與天地相傾舜卽服之陟方死葬蒼梧之野葢龍奏靈阿鳳鼓雲池而猶尸解託死欲斷生死之情示民有終始之限耳隱仙白石盧生黃粮神仙傳白石先生不肯修昇仙之法但取不死而已不失人間之樂彭祖問之答曰天上多至尊相奉苦於人間時呼爲隱仙枕中記開元中道者吕公經邯鄲道上邸舍中有邑少年盧生同止於邸主人方蒸黃粮共待其熟盧不覺長嘆翁問之具言生世困厄翁取囊中枕以授盧曰枕此當榮適如願生俛首但記身入枕穴中遂至其家未幾登高第厯臺閣出入將相五十年子孫皆列顯仕榮盛無比上䟽曰臣年逾八十位厯三台空負深恩永辭聖代其夕卒盧生欠伸而寤吕翁在旁黃粮尚未熟生謝曰此先生所以窒吾欲也敢不受教再拜而去魯公尸解顏回坐忘紀異錄眞卿問罪李希烈內外知公不還親族餞於長樂坡公醉跳躑前楹曰吾早遇道士陶八八受刀圭碧霞丹至今不衰又曰七十有厄卽吉他日待我於羅浮山得非今日之厄乎公至太梁希烈命縊殺之瘞於城南希烈敗家人啟柩見狀貌如生遍身金色爪甲出手背鬚髮長數尺歸葬偃師北山後有商人至於羅浮山有二道士圍棊一曰何人至此對曰小客洛陽人道士笑曰幸寄一書達吾家遣童取紙筆作書至北山顏家子孫得書大驚曰先太師親翰也發塚開棺已空矣丹臺新錄顏回爲明泉侍郎三天司直嘗謂仲尼曰回益矣回坐忘矣仲尼蹵然曰何謂坐忘隳肢體黜聰明離形去智同於大通此之謂坐忘仲尼曰同則無好也化則無常也而果其賢乎丘請從其後也見莊子趙高懷雀陶淡養鹿拾遺記秦王子嬰沉趙高於井七日不死以鑊湯煮七日不沸乃戮之獄吏曰高初囚時懷中有一青圓大如雀卵方士云高先世受韓眾丹法冬卧堅冰夏卧爐上不覺寒熱高死一青雀從屍中飛入雲中九轉之騐也晉隱逸陶淡字處靜太尉侃之孫也淡幼孤好導養之術謂仙道可期年十五六便服氣絶穀不婚娶家累千金僮客百數淡終日端拱曾不營問頗好讀書善卜筮於長沙臨湘山中結廬居之養一白鹿以自偶親故有候之者輙移渡澗水莫得近之州舉秀才淡聞遂轉逃羅縣埤山中終身不反莫知所終王母瑤池老君玉局列子周穆王昇崑崙之邱以觀黃帝之宫而封之以貽後世遂賓于西王母觴於瑤池之上又穆天子傳吉日甲子天子執白珪玄璧見西王母獻錦組百純白組三百純西王母再拜受之觴於瑤池之上西王母爲謠曰白雲在天山陵自出道理脩遠山川間之將子無死尚能復來天子答曰子歸東土和治諸夏萬民平均吾顧見汝天師傳永壽元年老君降蜀都地神湧出一玉局座於是老君昇玉局坐授與天師南北二斗經訣令天師普濟眾生以救下民梁妻更衣袁女改服漢隱逸傳梁鴻同縣孟氏有女狀醜而黑力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而娉之及嫁始以裝飾入門鴻曰吾欲裘褐之人可與俱隱深山者爾令乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志爾妾自有隱居之服乃更爲椎髻著布衣操作而前鴻大喜曰此眞梁鴻妻也能奉我矣後共入霸陵山中眞誥張激子者亦少名發袁隗歎其高操妻以女女服飾奢麗激子不顧婦改服乃成室家也入剡山遇山圖公子周襄王時大夫仙人也授激子以九雲水强梁棟柱法激子脩此得道子雲養神昭素寡欲眞境錄夏侯天師名子雲親植芝蘭於藥圃自言古聖以上藥養神中藥養性下藥遣病可使人神靈可使人性明可使人病愈故常施藥於鄽市皆隨人淺深而遇之其藥圃詩云綠葉紅英遍仙經自討論偶移嵓下菊鋤斷白雲根師羽化一日有樵者窺圃中見師鞭乘一獸似虎非虎不可識入東山去其疾如風矣玉壺清話王昭素酸棗縣人學古純直行高於世市物隨所索價償其直李穆薦於太宗召至便殿年七十七顏如渥丹目若點漆鰥居絶欲四十年家無女侍賜國子博士致仕留禁中月餘詢治世養身之術昭素曰治世莫若愛民養身無如寡欲此外無他上愛其語書屏几中年八十九終麻姑鳥爪羲皇蛇身集仙錄云麻姑孝明帝時與神仙王遠降於蔡經家將至一時頃聞蕭鼓人馬之聲姑年十八九許於頂中作髻餘髮垂之至腰其衣有文章而非錦綺皆世所無姑爪如鳥爪蔡經見之心中默念言背大痒時得此爪以爬背當佳遠已知經心念使牽經鞭之拾遺記禹鑿龍門之山亦謂之龍門至一空巖深數十里幽暗不可復行禹乃負火而行有獸狀如豕衘夜明之珠其光如燭又有青犬行吠於前禹計可十里迷於書夜旣覺漸明見向者豕犬變爲人形又見一神蛇身人面禹因語神卽示禹八卦之圖列於金板之上又有八神侍側禹曰華胥生聖子是汝邪答曰華胥是九河神女以生余也乃探玉簡授禹長一尺二寸以合十二時數使度量天地禹卽執持此簡以治定水土蛇身之神卽羲皇也成子五石葛起千斤仙傳拾遺崔成子者修五石雲腴之道於岯山洞室中服之十年解神而去藏形於洞中有遊者見其形骨不散而芳香逾甚細視藏有五物白如雞子因探取而歸忽自震懼已失五石所在明日却入洞中見成子踞坐室內奮髯而言曰道在積功累行德及含識地司所舉名簡帝君然後神丹可成眞師可遇子無毫分之善懷殘毒之行竊我雲腴神薤之藥而欲度世不亦難乎此固神明所貴吾以愍物爲心不欲加罪恐山神不赦爾可速去自是尋獲惡疾嵗餘成子夜降其家教以洗心悔過之訣所疾復愈枹朴子葛起力舉千斤頭有五色之氣高丈餘一日乘龍上昇自在掬水劉政興雲野人閑話利州鄽中有一人被髮跣足衣布短襦人與語縱答皆說天上事人多不曉會夜則於神廟中立睡盛暑凝嚴則莫我知也人謂之天自在州之南門外有市則商賈交易之所也人甚闐咽一夕火起亘天燒熱屋宇城內人皆登高望之見天自在吁嘆獨語云此方之人縱意奢淫莫知善道爲惡旣久天將殺之遂以手掬堦前石盆中水望空澆灑逡巡有黑氣自廟門出變爲大雨盡滅其火天自在遂潜遁去神仙傳劉政有道術能以一人作千人千人作萬人又能噓水興雲聚壤成山刺地成淵李竦閑客龜蒙散人指元圖序李竦自稱三仙門弟子天下都閑客嘗作指元序云欲叩玄關須憑匠手不遇眞仙難曉大道僕遊江南於南京應天遇華陰施眞人肩吾希聖者青巾紫履皂帶寬衣光
