front:
  text: 尊師何何先生僕僕
  hash: sha256:ba1f66d7fdacd53795122ad133868ce5efdd576e10e29331406a955f99d6f4af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_CK-KZ_02p046b, image: JY296/CK-KZ_JY296_02p046b.png}
body:
  text: 神仙傳衡山有一道士不示姓名或問其姓則曰何問其名則曰何時人因呼爲何何尊師或問師無言何以開悟後人曰知不知上不知知病誰能鑿混沌之竅而達自然之理邪遂杖藜入山而虎豹隨之司馬先生曰此可謂才全而德不形者也後尸解雷震尸遂不見廣記僕僕先生不知何許人自云姓僕時人因號僕僕先生寓光州黃土山卽三十餘年餌杏丹飲食如常人貨藥爲業人皆不識之時王弁遇之而授弁以杏丹之訣先生卽時昇雲天太守李休光聞之以爲不祥先生復降休光之府休光曰若仙當往去而復來妖也先生曰麻姑茅君皆問道於我子以爲妖何也休光叱左右執之卽時龍虎君見於前而先生上昇煙雲四合雷電震動觀者奔走休光謝罪明皇詔立宮觀至今存焉侯觀三松蘇菴兩竹高道傳道士侯楷字法光京兆人也魏正始中爲道士授天文袐訣晨夕之奉久而愈勤卜居於寒谷行三奔術誦大洞經及三皇內文劾召之法其居有清泉環流三松偃覆洒然幽寂是爲栖眞之所遂號三松觀郴江集蘇眞君耽母年百餘嵗無疾奄然而逝鄕人爲立封木以禮歛葬是日郡東北隅牛脾山上有紫雲覆木瀰漫不散又若有白馬一疋擊於林間遂聞山嶺上有號哭之聲皆云蘇君歸持母服鄕人竟往卽之其草菴前哭泣之所基址平坦有竹兩株無風自摇掃其地終年常淨三年之後無復哭聲白馬亦不復見矣胡倣斸金雍伯種玉神仙傳唐陳休復號七子貞元中來居褒城耕農採樵與常無異多變化之術好事少年五七人求學其術勤勤不已語未終忽暴卒須臾臰敗眾皆驚走莫敢回視自此少年不敢干之昌明胡倣常師事之將赴任留錢五千爲休復市酒笑而不取曰吾金玉甚多恨不能用爾以鋤授倣使之斸地不二三寸金玉錢貨隨斸而出曰人間之物固若是但世人賦分有定不合多取若用之豈有限約乎廣記楊雍伯事親以孝聞及父母死葬於高山雍伯廬於墓側晝夜號慟甘泉湧出以濟行人忽有一飲馬者來將白石一升與雍伯曰種之當生美玉果生白璧長二尺許不計其數一日出遊偶至海上遇羣仙曰此種玉雍伯也一仙曰汝有孝行神眞所感此宮卽汝他日所居也雍伯歸數年夫婦俱上昇今者所居之宅號玉田坊道成跨騾敬之射鹿郴江集慶厯中有處士遊東嶽謁主簿郭及甫旣坐視其剌字乃羅道成詢其鄕里曰郴州人也及甫留飲處士曰久思東州之遊前日到泰山已遊厯遍也旦夕回南方乃借紙筆爲詩曰因思靈秀偶來遊碧玉寒堆萬疊秋直上太平高處望根盤連接十餘州復自和云水雲蹤跡日閑遊夏谷陰寒冷勝秋猿鳥性情猶戀舊翻身却去海邊州及甫見詩不勝嘆美旣去及甫遣人送之至邸又爲一詩付史曰白騾代步若奔雲閑人所至留詩跡欲知名姓問源流請看郴陽山下石後詢郴人地有白騾眞君觀因得道跨白騾行石壁上其騾迹至今存焉西山記許眞君名遜字敬之世爲許昌人後徙豫章遜生而頴悟姿容秀偉少不羈喜畋獵嘗射一鹿子墮地母以舌舐之未已而死因感悟毁棄弓矢刻意讀書弱冠旁通經史善音律天文地理五行䜟記之書悉皆極致尤慕神仙之道後拔宅上昇廖扶北郭王續東皋本傳後漢廖扶絶志世外專精經典尤明天文讖緯風角推步之術公府辟召皆不應時人號爲北郭先生唐隱逸傳王績字無功授揚州六合縣丞棄官還鄕里績河渚中先有田數十頃鄰渚有隱士仲長子先服食養性績重其眞素願與相近乃結廬河渚以琴酒自樂故時人號爲東皋子董奉食粟曼倩偷桃神仙傳董奉字君異候官人也居廬山不田作爲人治病亦不取錢物但使人重病得愈者爲栽杏五株輕病得愈者載杏一株如此數年杏有萬株鬱然成林羣蟲戲其下常無生草有如耘除也於是杏子大熟奉嘗語人曰欲買杏者不須來報之但徑自往取之一器穀便得一器杏嘗有穀往少而多取杏者卽有虎號嘯而逐之所得之穀救賑貧乏供給行旅歳消三百斛而所餘猶多一旦昇天去漢武內傳武帝忽見青衣女子曰七月七日王母暫來帝問東方朔此何人朔曰西王母紫蘭室女傳命往來至日帝盛服立階下夜聞空中有簫鼓聲王母乘紫雲車駕九色班龍別有天仙皆長一丈王母上殿自設精饌以柈盛桃七枚帝食之甚美母曰此桃三千嵗一實方朔曾三來偷桃矣山甫玄髮姚泓綠毛抱朴子伯仙甫居華山精思不食二百餘年玄髮不老後以其術授之於女子色如桃花有一老翁鬚眉皓白而來女子笞之怪而問之女曰此是妾兒不肯用山甫之法致令衰老故杖之耳唐記唐時有一僧居於南嶽夜見一物綠毛覆體直至座前僧曰貧僧禪居不撓生靈鬼神有知無相惱也其物曰子知有晉宋乎僧曰自晉至唐四百年矣其物曰師知有姚泓乎僧曰吾聞泓已死矣其物曰我泓也其時示之以死脫身逃遁遊行福地唯飡柏葉遍身生毛王母擊節子登彈璈集仙錄九微元君龜山王母三元夫人洎諸眞人仙眾至降於小有清虚上宮絳房之中夫人與王君爲賔主各命侍女陳曲成之鈞九虚合節八音靈粲王母擊節而歌漢武內傳王母命侍女王子登彈八琅之璈董雙成吹雲和之笛許飛瓊鼓靈虚之簧安法嬰歌玄靈之曲人間長史山中宰相眞誥長史姓許諱謐字思玄肇七代孫也君博學高第初爲餘姚令累遷尚書護國長史密修上道眞仙屢降而眞妃授書云玉醴金漿交生神梨方文火棗當與山中許道士不與人間許長史又陶宏景字通明擢進士第遷侍讀年三十有七無意於仕乃曰仲尼曰隱居以求其志行義以達其道我今義達無復其方請從求志之業遂自稱爲華陽隱居脫朝服掛於神虎門襲鹿巾衣道服入華陽居積金峰修眞誥梁武帝累召不至或有所議遣使就問時人號曰山中宰相法進帝前奉仙天上王氏神仙傳王法進幼而好道一日忽遇二仙童告之曰汝有仙骨不忘於道上帝敕我來迎汝授事於天上不覺隨二仙凌虚至於帝前而帝告之曰人處三才之中不易得也付謝罪科一卷汝下諭生民亦汝之功也天寶中白日上昇天又王奉仙宣民女也幼時遇青衣童子十餘人與之遊戲言笑自夜達旦父母疑爲妖詰之奉仙曰女所遇者道也所見者上仙也初刻天上見天人羅列一仙人云汝有仙骨五十年後當復來此然百穀之實傷人眞氣奉仙自後絶食嘗謂人曰其所見天上神仙與道家之流無異遂畫天人朝會圖號混天圖元一蹙壺長房投杖丹臺新錄謝元一號壺公卽孔子三千弟子之數也常懸一空壺市肆貨藥日入之後公輙蹙入壺中舉市無人見者惟費長房於樓上見之往拜焉以師事之又汝南費長房爲市掾時遇壺公公知其篤信語長房曰我蹙入壺時卿便効我自當得入旣入壺之後不復見壺但見瓊樓金闕物象妍秀玉童玉女俠侍公語長房曰我仙人也君好道否長房哀懇授以劾鬼治病之術但不得仙道耳又以一竹杖與之騎此到家訖以杖投葛陂中長房如其言投於陂中遂化龍去緱山王喬磻溪呂尚神仙傳王喬字子晉遇浮丘公得仙友人桓良遇子晉於緱山之上謂良曰七月七日我當昇天可與故人會別也至是與故人羣官登山見子晉棄所乘馬於澗下昇天而去是時羣官拜別回見所乘馬亦飛空而去今名爲拜馬澗焉又呂尚冀州人幼而智慧預知存亡避紂之亂隱於遼東二十餘年西適周匿磻溪垂釣三年不獲一魚比閭問曰可已矣尚曰非汝所知而獲魚於腹中得兵軫之書或云玉鈐文王夢得聖人聞尚之賢載歸同治於周功成告亡開棺無尸惟有玉鈐六篇在棺中石子東府廣利南宮眞誥大茅君曰昔有白石子以石爲精故世號白石先生此至人也今補爲東府右仙卿入山斷穀煑石食之煑白石自有方乃石生所造也又中茅君曰韓太華者安國之妹也漢將軍李廣利之婦也廣利在世有功及物今在南宮受化紫陽役使魯連飛沖天蓬呪序鄧紫陽入麻姑山日夜誦天蓬神呪感金甲神人與語曰吾是北方六天使者緣子念誦靈文帝君已署子之功矣遂今降黑篆神符眞形上有神仙之術中有役使鬼神下有救療疾病子宜祕之後當爲王者師次日果於石室中得其眞形符篆行持有驗王氏神仙傳王魯連乃神仙王剛之女也得父之道入陸渾之山不出後遇太一眞人授以飛沖之法修之白日昇天郭文馴虎瞿君駕龍仙傳拾遺郭文字文舉洛陽人居大壁巖一旦有虎張口至前若有所告文舉以手探虎口中得骨去之明旦虎銜一死鹿致石室之外自後虎常馴擾於左右亦可撫而狎之文舉出山虎亦隨焉雖在城市眾人之中虎俛首隨行不敢肆暴如羊犬耳或負書册鹽米歸山晉帝聞之詔詣闕下問先生馴虎有術耶對曰自然耳人無害獸之心獸無傷人之意何必有術撫我則后虎猶民也虐我則讎民猶虎也亦何異哉帝高其言拜官不就隱鼇亭山又瞿君者南安人也漢章和間隱居平岡山黃帝降授龍蹻之道能控御雲龍後入峨眉山修洞房明鑑之術臨欲昇天辭訣親友駕龍而去今平岡化有龍巖山繫龍溪黃石圯下李整洞中前漢列傳張良過一老人墮履於圯下顧良曰孺子取履良取進老人曰孺子可教遂與之期曰後五日與我期於此如是三次如期而來老人曰當如此遂出書與良曰讀是則爲王者師後十三年見齊北穀城山下黃石卽我也南嶽夫人曰信者得失之關楗張良三期可謂篤道而明心矣眞誥中茅君曰河內李整昔守一之道初在洛陽近遷在華陽洞中主考注民間之事趙昇露宿馬湘壁睡神仙傳天師張道陵有九鼎大要唯付弟子王長曰而後合有一人從東方來當得之此人必以正月七日日中到具說長短形狀果有趙昇從東方來生平未相見其形貌一如陵所說陵乃七度試昇皆過乃授昇丹經第一試昇初到門不爲通使人罵四十餘日露宿不去續仙傳馬湘字自然有道術因入長溪縣界投宿主人戲言無宿處若壁上睡可矣日暮弟子切於止宿湘曰爾乃眾人中睡我坐可到明眾人皆睡湘躍身梁上以一脚掛梁倒垂身睡主人夜起燭火照見大驚異之湘曰染上猶能壁上何難俄而入壁主人祈謝乃出稷邱擁琴漁父鼓枻列仙傳稷丘君者泰山下道士也武帝時以道術受賞賜髮白更黑齒落更生上東巡狩太山稷丘乃冠章甫衣黃衣擁琴而來迎五代逸史潯陽太守孫愐於渚際見一輕舟凌波隱現俄而見一漁父垂綸鼓枻長嘯清虚公問有魚乎答曰其釣非釣甯有魚耶公異之遂褰裳涉水謂之曰觀先生有道耶方今文明之治何不賛緝熙之治乎答曰僕山海狂人不達世務未辯貧賤無論富貴乃歌曰竹竿籊籊河水悠悠相忘爲樂貪餌含鈎非夷非惠聯以忘憂遂鼓枻而去道開食麄石坦衣弊茆亭記單道開惡食惡衣不畏飢寒好山居而山神木精屢試之而不懼後遷入羅浮山獨處茅茨蕭然物外百餘嵗尸解晉逸史石坦自稱北海人居無定所不營定所不求美衣衣弊或有與之者則反施於人或有送葬杖策而吊之路無遠近時有寒暑必在其中同時同日皆至焉人莫測以爲神明後不知所在司馬白雲巫談紫氣神仙傳司馬承禎善篆別爲一體名爲金剪刀書隱居天台玉霄峰號白雲子睿宗召見旣歸朝士賦詩送之盈編自號爲白雲記又漢駙馬都尉巫談字子都北海人也漢武帝出子都見於渭橋其頭上有紫氣帝召問君年幾何對曰臣年一百三十八嵗帝問東方朔朔曰此君有陰道之術武帝屏左右問之子都曰臣昔年六十五有時腰痛口燥舌燥涕出得此以來七十三年有子三十六人身健如少武帝受其術不盡然壽最勝別帝琴高控鯉黃安坐龜抱朴子琴高多遊江浙每於水中行時人以爲水仙昔浙江南鍊丹丹成潑灰於江化爲小魚時人因號爲琴高魚後遊吳控赤鯉上昇列仙傳黃安代郡之卒常坐一龜闊三尺許或問此龜幾年曰昔伏羲造網結罟以授予其背已平矣此出畏日月之光三千年一出頭吾坐此已五見出頭矣㻌服桃核回書榴皮王氏仙傳王㻌爲王屋令常令黃庭經六千遍未了深義罷官絶穀咽氣入洞中有嵌室石牀案上古經一軸㻌再拜曰臣竊入洞天萬劫良會今睹玄經願許塵目一披忽有一人曰吾東極眞人王太虚黃庭經吾所註授於子復與桃核大如數斗磨而服之愈疾延年子未可居此更二十年期㻌携核與經而歸搜神袐覽湖州沈偕秀才父以其晚年自號東老延賔客多釀酒以供肴饌苟有至者無問貴賤悉皆酌之一日有術者造謁與東老對飲高談琅琅洞達微妙夜以繼日酒屢竭壺術者神色自若詰姓氏終不答因以石榴皮書于壁曰西鄰已富憂不足東老雖貧樂有餘白酒釀來因好客黃金散盡爲收書後題曰回山人東老醉遂失之其去後人多以爲呂公所題之字削去更生東坡有詩甚詳焦光石芋羊愔雲芝抱朴子焦光居山每煑白石如芋食之或時入山伐薪以施於人及魏受禪乃居河濵結菴以居不設席其身垢汚如泥漆或數日一食持不語老少不常如此在人間二百餘年後不知所之續仙傳羊愔常棲括蒼山後遊阮郎亭崖上去地十餘丈有篆書刻石字極大傳云漢阮肇所題驗之乃李陽冰嘗爲縉雲令遊此亭題詩曰阮客自何所仙雲洞口橫人間不到處今日此中行愔於亭側與縉雲道士花時飲酒忽仆地若斃乃舁還家七日乃醒愔曰初有一人青幘絳服自稱靈英邀入洞府見樓臺鸞鶴之異石穴中有物飛去靈英指之曰此青雲芝也食之得仙愔食之覺身輕行步如飛後入委羽山隱矣
