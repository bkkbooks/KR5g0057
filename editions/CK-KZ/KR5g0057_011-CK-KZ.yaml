body:
  text: 道全於晉永嘉中上昇貧士抱龍稚川除虎野人閑話灌口白沙有泰山府君廟每至春三月蜀人軿集忽一人鶉衣百結顏貌憔悴亦往廟所眾人輕之行次江際乃坐於石上逡巡謂人曰此水中有睡龍眾不之應遂解衣入水抱一龍出腥穢頗甚深閉兩目而爪牙鱗角悉備雲霧旋合風起水涌眾皆驚走貧士亦瞥然不見神仙傳葛洪字稚川洪嘗養牛數爲虎所暴乃書符劾之見一人自稱高山君白洪曰虎狼爲害當已除之矣重刋道藏輯要三洞羣仙錄正一道士陳葆光撰集處回旌節元卿琅玕野人閑話王處回侍中延接布素之士一日有道士於竹葉上大書道士朱桃枝奉謁公出見從容致酒談論舋舋雍容可觀處回曰久存志於道常欲於青城山致一道院以遂閑適道士曰未也卽於囊中取花子二粒種之以盆覆於上逡巡去盆花已生矣頃刻長四五尺層層生花道士曰此仙家旌節花後公果建節兩鎭廣記謝元卿遇神仙見丹柯碧葉微風時扣五音相節云此琅玕木也炭婦許遜木仙魯般西山記許眞君遜門下學者數百人一日欲以事試之因化炭爲婦人散詣諸弟子其不爲所染纔十人耳卽他日上昇諸眞君是也今有炭婦市炭婦坊在建昌縣界酉陽雜爼魯般燉煌人莫詳年代功侔造化於涼州造浮圖作木鳶每擊楔三下乘之以歸無何其妻有姙父母詰之妻具說其故其父後因得鳶擊楔十餘下乘之遂至吳會吳人以爲妖遂殺之般又爲木鳶乘之遂獲父屍怨吳人殺其父於肅州城南作一木仙人舉手指東南吳地大旱三年後知般所作也齎物具牛謝之般爲斷其兩手其月吳中大雨國初呉人尚祈禱其木仙法善寶函王喬玉棺集異記葉法善字道元嘗於洪州西山養神修道一日括蒼三神人降傳太上之命汝當輔我睿宗及開元聖帝未可隱跡山巖以曠委任言訖而去時二帝未立而廟號年號皆已先知其後果有命詔入京後乃平韋后立相王睿宗明皇承祚繼統師於上京左右聖主凡吉凶動靜必預奏聞會土蕃遣使進寶函封曰請陛下自開無令他人知機密朝廷默然唯法善曰此是凶函令蕃使自開上從之及令蕃使自開及函中弩發中蕃使死果如法善言王氏神仙傳王喬後漢顯宗時爲葉縣令一日天降玉棺喬曰天帝召我耶乃沐浴入棺遂葬於城東土自成墳其夕縣中牛馬皆流汗喘乏人莫知之後人爲立廟號葉君祠王母靈鳳文妻彩鸞唐隱逸傳道士王遠知梁揚州剌史曇選之子母丁氏嘗晝寢夢靈鳳集其身因而有娠又聞腹中啼聲沙門寶誌謂曇選曰生子當爲神仙之宗伯煬帝爲晉王時亦遣使召之遠知來謁見斯須而鬚髮變白王懼而遣之仙傳拾遺文蕭寓洪州許眞君宅遊帷觀八月十五上昇之辰士女雲集連袂踏歌謂之酬願忽見一妓歌詞潛合其名姓復是神仙之語詞曰若能相伴陟仙壇應得文蕭駕彩鸞自有綉襦并甲帳瓊臺不怕雪霜寒蕭異之歌罷蕭徐行隨入大松徑中所居肅然侍衛環列有几案簿書若官府亦有案牘斷割多爲江湖沒溺之事肅再三詰之乃曰此不可輕泄吾當爲子受禍矣果有黃衣使曰吳彩鸞爲私欲泄天機謫爲民妻一紀乃與蕭歸金陵僦居其後乘虎俱入越王山不知所之劉照青藜穆歌黃竹仙傳拾遺劉向成帝之末校書於天祿閣夜遇一老人黃衣植青藜杖叩門而進問姓名我卽太一之精天帝聞卯金之子有博學之才而下觀之遂出懷中所牒有天文地圖之書授向而去穆天子傳天子南遊黃臺之丘以觀夏啟之所居獵平澤大寒雨雪作詩三章以哀民曰我徂黃竹口員閟寒帝牧九行嗟我公侯百辟冢卿皇我萬民旦夕勿忘赤松綵囊白雲仙籙齊諧志鄧紹八月旦入華山見童子執五色囊盛栢葉上露曰赤松先生取以明目今人八月旦作明目囊是也列仙傳劉白雲江都人也多陰德遇樂子長曰子有仙籍天骨而流浪塵土中何也因授以籙且告之曰子先得變化而後可授道白雲依而行之變化萬端日行七百里再遇子長服丹千日上昇侯楷同塵幽棲混俗高道傳侯楷字法先十四師正懿先生學道先生曰汝束心勵節於道不懈苟非棲隱山樊不易得也楷曰道在方寸何必山樊先生曰吾固知之然神仙多託巖藪及成眞之後出而同塵又薛幽棲開元中登進士第勇退不仕入鶴鳴山訪漢天師治所修行僅一紀道氣愈充天寶初遊南嶽卜棲眞之地遊心於自得之場曠然無所係而能和光混俗毁方瓦合於三洞經教靡不該覽故幽人逸客嚮風稟受嘗進元微論及注解度人經行於世王生桑田麻姑陵陸宣室志王先生有道術晦跡烏江人皆不識之洪農史晦之聞其名謁之抵暮先生以杖劃庭下則雷霆震動巖谷重疊湖水極目先生曰陵陸遽遷而有桑田之變坐客惶恐先生曰所以爲娛耳卽以菷掃庭寂靜如故神仙傳麻姑時降蔡經之家入見王方平遂拜之姑曰自接待以來見東海三爲桑田向見蓬萊又淺於往時至復還爲陵陸乎方平笑曰聖人皆云海中復揚塵也玉壇風冷瑤臺露清稽神錄建鄴市有卜者忽於紫微宫題壁云昨日朝天過紫微玉壇風冷杏花稀碧桃泥我傳消息何事人間更不歸自是絶跡人皆言其上昇逸史唐開成初進士許瀍遊河中忽得重病不知人至三日蹷然而起取筆大書於壁曰曉入瑤臺露氣清坐中唯有許飛瓊塵心未悟俗緣在十里下山空月明書訖復寐及明旦又驚起改其第二句曰天風吹下步虛聲言訖兀然如醉醒不復寐矣良久漸言曰昨夢到瑤臺有女仙三百餘人內一人云是許飛瓊遣賦詩及成復令改曰不欲世間人知有我也旣畢甚被賞令諸仙皆和曰君終當至此且歸若有人導引者遂得回耳李賀樓記方朔甕銘書法苑李賀將死時有緋衣人駕赤虬持一板書若太古篆如霹靂古文云召賀了不能讀下榻叩頭言阿彌老且病不願去緋衣人曰帝成白玉樓立召爲記天上差樂不苦也少頃氣絶賀學語時呼太夫人爲阿彌拾遺記黃帝時碼碯甕至堯時猶存甘露尚在其中盈而不竭謂之寶露以班賜群臣至舜時露漸減隨世之汙隆時淳則露滿時澆則露竭秦始皇通汨羅之流掘地得赤玉甕可容八斗置於舜廟漢東方朔識之乃作甕銘曰寶雲生於露壇祥風起於月館望三壺如盈尺視八鴻如縈帶李通丹臺子微赤城六帖紫陽眞人周季通入蒙山中遇寓門子再拜乞長生訣寓門子曰名在丹臺玉室中何憂不仙神仙傳司馬天師名承禎宇子微女眞謝自然汎海詣蓬萊求師至一山見道士謂曰天台司馬承禎名在丹臺身居赤城眞良師也自然遂還求之得度有弟子七十餘人一旦曰吾於玉霄峰東望蓬萊常有眞仙降駕今爲青童君所召須往矣俄頃蛻去詔贈銀青光祿大夫諡正一先生帝親文其碑有集行於世彭蛇盤躃王鶴飛騰丹臺新錄彭宗字法先年二十服業於杜沖眞人深蒙賞接栖眞味道精貫神人山中有毒蛇猛虎宗每以氣禁之潛伏盤躃雖摩觸終不得動宗觧之方去王氏神仙傳丞相王徽女幼年慕道持經撫琴嘗曰洞宫有召命當補仙職題詩曰翫水登山無足時諸仙頻下聽琴詩此心不戀居人世唯見天邊雙鶴飛是夕奄然而卒及明有雙鶴飛騰於庭木音樂異香滿野舉形就木空衣而已空洞靈瓜嵰洲甜雪拾遣記後漢明帝陰貴人夢食瓜甚美帝使求諸方國時燉煌獻異瓜種恒山獻巨桃核瓜名穹隆長三尺而形屈曲味美如飴昔道士從蓬萊山得此瓜云是空洞靈瓜四劫一實西王母遺於此地世代遐絶其實頗在又說巨桃霜下結花隆暑方熟亦云仙人所食又穆王東遊大騎之谷指春霄宫集諸方士仙術之要西王母乘翠鳳之輦而來前導以文虎文豹後列雕麟紫麏曳丹玉之屨敷碧蒲之蓆黃菅之薦共玉帳高會薦清澄琬琰之膏以爲酒又進洞淵紅蘤嵰洲甜雪伯微金汋仁本玉屑丹臺新錄莊伯微少好道常以日入時正西北向閉目握固想見崑崙積二十一年後服食入山學道猶存此法當復十許年後閉目乃奄見崑崙存之不止遂見仙人授以金汋之方因而得道猶是精感道應使之然也非此術之妙矣酉陽雜爼鄭仁本與其中表遊山迷路見一人枕一樸物而坐問之乃云君知有七寶城乎常有八萬二千戶修之我其一也因開樸視之有斤斧數事玉屑飯兩裹分遺鄭曰食此可以畢世無病矣李封道德嚴議優劣高道傳道士李含光者晉陵人年十三篤好道學雖處暗室如對君父人見之情色皆歛明皇召見問理化對曰道德經者君王師也昔漢文行而躋民於仁壽又問金鼎曰道德者公也輕舉者公中之私也雖時見其私亦聖人存教爾若求生徇欲類於繫風不亦難乎帝甚嘉之又嚴達者字道通始髫齓已有方外志周武建德中詔法師於便殿是時已沙汰浮屠氏又下議公卿復欲去道家流上問法師道與釋孰優曰主優而客劣上曰主客奚辯曰釋出西方得非客乎道出中夏得非主乎上曰客旣西歸主無送耶曰客歸則有益胡土主在則無損中華去者不追居者自保又何送乎上嘉其對葛呼錢飛宋指燈滅丹臺新錄葛仙翁嘗取錢使人投於井中公往井上以器呼錢人見其錢一一飛從井中出入公器中續仙傳宋知白爲道士眉目如晝言談秀麗夏則衣綿冬則卧於雪中去身一丈餘周匝氣如蒸出而雪不凝又指燈卽滅指人則如隙風所吹或食彘肉五斤蒜薤一盆飲酒三斗到處住則以金帛求置一二美女行則捨之人以爲得補腦還元之術後之撫州南城縣白日上昇陶挂朝服夏懸辟書丹臺新錄陶隱居除奉朝請頗怏怏與從兄書曰昔仕宦意以體中打斷必期四十左右作尚書郎出爲浙東一好古縣粗得山水便投簪高邁宿昔之志謂言指掌今年三十六矣方除奉朝請不如早去無自勞辱欲脫朝服挂神虎門襲鹿巾徑出東亭因與王晏別語及此事晏曰主上性存嚴治不許人作高奇事脫致忤旨便恐違卿高志如何先生嘿思良久曰吾本爲身非爲名若有此慮亦奚如此於是不詣省直表辭而已眞誥明晨侍郎夏馥字子治陳留人也服木餌和雲母少時被公府辟召懸辟書著桑樹乃去其用懷高邁如此月支獻獸麻村射猪列仙傳漢武帝幸安定月支國遣使獻香四兩大如雀卵黑如桑椹又獻猛獸一頭形如狸其毛黃色帝曰此小物何謂猛獸使者對云夫威於百禽者不必計其大小是以神麟爲巨象之王鳳凰爲大鵬之宗亦不在其巨細也臣國去此三千萬里常占東風入律青雲干吕謂中國將有好道之君故以二物來獻豈圖陛下乃不知眞乎帝恨使者言不遜欲罪之明日遂失使者猛獸所在廣記麻陽村人見一野猪射之至一石室中見一老人曰此非眞猪速宜出去童子送出門村人曰老人誰耶曰河上公也上帝令爲諸仙講易又問童子汝誰耶曰我王輔嗣也未能精通於易被罰守門童子以石塞門四顧茫然不知所在揚君問龍葛公借魚眞誥楊羲夢登高山四面皆大水見一白龍身長數丈東向飛行空中光彩耀天又見白衣女子入口中須臾三入三出乃止又還羲右邊而立又覺羲左邊有一老公著繡裳芙蓉冠柱赤九節杖而立俱視白龍某問何等女子徑入龍口耶公對曰此太素玉女蕭子夫取龍氣以煉形也又問公何人來登此宇公答曰我蓬萊仙公洛廣休此蓬萊山吾治此立府君故來乃得相見我耳某又問此龍可乘否答曰此龍眞人張誘世石慶安許玉斧丁瑋寧也又問一龍而四人乘耶公曰此侍晨官龍如世之軺車神仙傳葛仙公出行於路見人賣魚謂魚主曰欲借此魚到河伯所可乎主曰魚已死公卽書符內魚口中投之於水魚卽跳起襲祖輕舉自眞昇虛高道傳道士雙襲祖栖白馬巖誦黃庭經功成閉室七日不出弟子驚異視之忽然輕舉而昇遺仙帔於木杪及嵓中卧蓆後百餘年皆不壞又道士賀自眞有學趣嚮高邁居嵩山修道一日雲鶴音樂雜滿空際自眞遂昇虛而去處士陳陶與洛人贍之因賦詩曰子晉鸞飛古洛川金桃再熟賀郎仙三清樂奏嵩山下五色雲屯御苑前朱頂舞迎低絳節青鬟歌引駐香軿誰能白書相悲泣太極光陰億萬年劉翊陰德韓崇仁政眞誥劉翊家巨富周給困窮好行陰德累遷陳留太守損已分人遇馬皇先生告之曰子仁感天地德動鬼神太上嘉子之用情使我來擕子以長生吾仙官爾能隨吾去否翊從之而行遂授以服五星之華法今在華陽洞中爲右理監又韓崇毗陵人遇神人王偉元授以流珠丹元法語之曰子行此道可以仕宦功成之日無妨仙舉崇初爲宛陵令行仁政以撫民蝗不集界後遷太守視民如傷政化洽普復遇偉元再授隱遁解形法遂入大霍山以度世今在華陽爲左理監蕭文補履負局磨鏡神仙傳蕭文常在市中爲人補履十數年人皆不知其神仙也只見其不老好事者欽之就求道術不能得之惟梁母得其作火之法一日上三亮山與梁母相別列數大火而昇列仙傳有一磨鏡叟常負一鑑局於市中不識姓名皆不知其神仙只以負局呼之或時貨藥服之者皆愈顧和執蓋淳于典柄眞誥顧和吳人也少孤有志操仕晉爲中丞遷尚書僕射永和元年尸解太上迎補爲執蓋郎今在華陽洞中列仙傳淳于上虞人也自少好道長於十筮入天目山隱居遇仙人惠車子授丹經功成今在洞中爲典柄郎主試有道之士韓康避名戴孟改姓後漢逸史韓康字伯休常採藥名山賣藥長安路口不二價三十餘年時有女子買藥康守價不移女子怒曰公是韓康伯休耶乃不二價乎康嘆曰我本爲避名今女子皆知有我焉用藥爲乃遯入霸陵山中公車連召不至高道傳道士戴孟本姓燕名濟漢末人以謂養生者隱其名字藏其所生之時改姓戴託仕於武帝之朝孟少好道事母以孝母服除入華山服木遇裴眞人授以玉珮金璫經遂能輕身周遊名山日行七百里黃符療疫蘇香返魂搜神祕覽長安有黃公者甞售得一僕負擔相從幾一二嵗家貧窘夫婦悲嘆僕聆之問曰主人所須得幾何曰得五百千僕云某有小術可以致之因市好紙并筆硯瓦缶蒭茭各一明晨與俱往市中僕乃疊紙數百重持筆謂人曰今書一符在紙面使皆津透來年長安大疫此符可療每道當焉五十金後日果五百千矣遂行氣吹噓草生火光焰相燭以瓦缶覆其首入坐於火中乃不知所在來年長安果火疫有符者免焉洞微志有蘇德哥者善合返魂香但殂經八十一年已上者卽不可返時司天主簿徐肇嘗泣告之曰父母曾祖皆欲一拜之蘇唯唯乃懷中取一貼如白檀香撮於鑪中煙氣裊裊直上其香甚於龍腦蘇微吟曰徐肇欲見先靈願此香煙用爲追引食頃忽然驚風拂幕見其祖曾父母俱至肇泣拜熟視之其衣冠裝著悉如平時曰今日嘉會誠亦難得飲訖徐徐出幕爲煙霧而散德哥後亦不知所之玉巵娘子金華仙人幽怪錄有崔書生於東周邏谷口見一女郎具聘娶之崔母曰新婦妖美必是狐媚傷害於汝女曰本侍箕箒便望終天尊夫人待以狐媚明日便行矣明日入山遂失所在後有胡僧曰君所納妻乃仙女玉巵娘子若住一年舉家必仙矣崔生歎恨而已大洞玉訣曰太初天有流汨之池池中有玉樹周回蓮華十丈池廣千里水乃香美金華仙人恒處蓮華之中飲流汨之水則五臟明徹面生紫雲張誤食厭應不茹葷括異志龍圖張公燾卽樞密直學士奎之子也樞直爲殿中丞日奉朝請在京稅宅子居常閉關一日有人叩門頗急大呼曰小師入去何故便不放出張起視之乃一老道士也疑其狂且醉不復與之較量良久乃去邑君先妊娠是夕生燾景祐元年第甲科後嘗誤食犬肉夢黃衣使者追至一府見一道士謂曰何故食厭物張自辯曰非敢故食誤耳道士曰若然者且止此吾爲若言少選復出呼張曰可謝恩乃引至一殿前通曰張燾誤食厭物謝旣再拜而悟汗流浹體公神骨清粹衿懷夷曠豈非仙曹被謫者歟高道傳道士應夷節母夢流星入牖驚寤室有光因而孕焉旣生不喜葷茹授正一紫虛等籙師行之精謹嘗謂弟子曰吾以維持教法不能滅跡匿端能道不違人而勤行方至然玉京金闕泉曲酆都相去幾何唯心自兆耳爾等勉之子晉窺井士則叩門拾遺記大始元年魏帝爲陳留王之嵗有頻斯國中有丹石井非人之所鑿下及漏泉水常沸湧仙欲飲之時以長綆引汲也其國人皆多力不食五穀日中無影飲桂漿雲霧羽毛爲衣髮大如縷堅韌如筋伸之幾至一丈置之自縮如蠡續人髮以爲繩汲丹井之水水中有白蛙兩翅常來去井上仙者食之王子晉臨井而窺有青雀𠾑玉杓以授子晉子晉取而視之乃有雲起雪飛子晉以袖揮之則雲雪自止白蛙化爲雙鳩入雲遂滅劇談錄嚴士則穆宗朝爲尚衣奉御因入山採藥覩一茅舍煙蘿四合見一人偃卧石上士則問候答曰予自安史犯順居此避世不知年代仍無煙火念君遠來無以療飢乃取紙囊中如褊豆形者取一粒汲泉煮之良久香熟令啗之卽覺
