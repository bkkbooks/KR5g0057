body:
  text: 要在賢不肖有別則君之身名可保無累矣眞乃命酒自酌達曉遽辭去祐潛伺之見眞化一大鹿西走不知所之唐史屬辭張志和字子同顏眞卿爲湖州剌史志和來謁眞卿以舟弊陋請更之志和曰願爲浮家泛宅往來苕霅間李德裕稱志和隱而有名顯而無事不窮不達嚴禮以敬志和水戱夏統耦耕續仙傳張志和會稽山陰人也時顏眞卿東遊平望驛志和酒酣爲水戯鋪蓆於水上獨酌嘯詠其蓆往來後有雲鶴隨其上眞卿親賓寮佐觀者莫不驚異尋水上揮手以謝眞卿上昇而去晉隱逸夏統字仲御會稽永興人幼孤貧養親以孝聞每採稆求食星行夜歸或至海邊拾螊越虫以資養雅善談論宗族勸之仕謂之曰卿清亮質直可作郡綱紀與府朝接自當顯至如何甘辛苦於山林畢性命於海濱也統勃然作色曰諸君待我乃至此乎使統屬太平之時當與元凱平議出處遇濁代當與屈生同汙共泥若汙隆之間自當耦耕沮溺豈有辱身曲意於郡府之間乎季平可活隱瑤再生宣室志上黨程逸人有符術唐劉悟爲澤潞節使臨洛縣民蕭季平家甚富一日暴卒逸人嘗受季平厚惠聞其死馳傳視之語其子曰爾父未嘗死葢爲山神所召治之尚可活乃朱書一符向空擲之食頃果甦曰初見一綠衣人云霍山神召約行五十餘里適遇一丈夫朱衣杖策怒目從空而至謂季平曰程斬邪召可疾去於是綠衣者懼而走朱衣人牽其袂偕來遂醒其家驚異因問逸人斬邪謂誰曰吾學於師氏歸依龍虎斬邪籙因解其所佩籙囊示之後遊閩越不知所在仙傳拾遺周隱瑤洞庭道士也居焦山學太陰煉形之道死於崖窟夢謂其弟子曰檢視其尸勿令他犯六年後再生當以衣裳迎我弟子視之則臭穢虫壞唯五藏不變依閉護至六年往看乃身全却坐弟子備湯沐以新衣迎之髮鬚而黑麁而直若獸鬣焉十六年又死如前更七年復生如此三度狀貌益壯煬帝召至東都懇乞歸山尋亦遂其意肩吾三住墨狄五行西山會眞記施肩吾字希聖嘗作三住銘云太易曰精氣爲物遊魂爲變凡在萬形之中其所保者莫先於元氣元氣若住則形住形住則神住此三者旣住則我命在我不在於天也大理昭然玄居者不信之矣神仙傳墨子名狄仕宋爲大夫年八十二乃歎曰世事已可知榮位非長保將委流俗以從赤松遊耳乃入周狄山精思忽見一人乃問之曰君豈非山岳之靈氣乎將度世之神仙乎願且少留誨以道教神人曰知子有志好道故來相候爾於是授以素書未央圓方墨子拜受合作遂得其驗乃撰集其要以爲五行記後得地仙隱以避戰國邢公丹竈周貫藥鐺談選九嶷山中絶頂人迹所不及舊傳有仙隱於其上近有本郡監兵子曹雄因獵山間遂深入至峰頂見結茆三兩間中一人隱几而坐雄再拜問之答曰吾邢仙翁也自唐僖宗時隱此因延雄訪以世間事雄視其所居唯一書閣及丹竈几案有所著詩雄求錄其詩得十數篇今錄出一篇云虛皇天詔下仙家不久星潢借客槎壁上風雲三尺劒床前龍虎一鑪砂行乘海嶼千年鶴坐折壺宫四序花爲愛陰符問元義更隨綵仗入烟霞雄後追復舊遊幾月方到環視居室雖存而仙已去矣冷齋夜話周貫不知何許人自號本鴈子治平間嘗往來西山又至袁州見市井李生者有秀韻欲擕以歸林下而李嗜酒色意欲無行貫指煮藥鐺作偈示之頑鈍天教合作鐺縱生三腳豈能行雖然有耳不聽法只愛人間戀火坑尋死於西山方將化人問其幾何嵗貫曰八十西山作酒仙麻鞋孔斷布衣穿相逢甲子君休問太極光陰不記年後有人見於京師州橋附書與袁州李生云我明年中秋夕當上謁也至時果造李生生時以事出乃以白土大書其門而去曰今年中秋夕來赴去年約不見折足鐺彈指空剥剥李果墮馬折一足童子錦帷尚父綉幄西山記孝武寧康二年八月一日許眞君晨起忽有雲物自天而下仙降於眞君之庭乃宣上帝詔賜學仙童子許遜紫綵羽袍瓊旌寶節玉膏金丹各一合詔至奉行是月十五日中忽聞音樂來自天際青童綵仗龍車羽葢來迎許君與家屬四十二口及雞犬皆乘雲上昇頃之有錦帷自空飛下復有雞栖墜於宅東南神仙感遇傳郭子儀初從軍沙塞間因入軍催軍食至銀州十數里日暮忽風沙陡暗行李不得遂入道傍空屋中藉地將宿旣夜忽見左右皆有赤光仰視空中見軿輜車繡幄中有一美女坐床垂足自天而降子儀拜祝云七月七日必是織女降臨願賜長壽富貴女笑曰大富貴亦壽考言訖冉冉昇天後子儀立功貴盛拜太尉中書尚父年九十而薨王賈玉符天寵金鑰廣記婺州參軍王賈舉孝廉擢第授婺州參軍時杜暹爲婺州參軍與賈同列相得甚懽與暹同部領使洛陽過錢唐江登羅刹山觀潮謂暹曰大禹眞聖者當理水時所有金匱玉符以鎭川瀆此杭州城不鎭壓尋當壞矣暹曰何以知之賈曰此石下是相與觀焉因令暹閉目執其手令暹跳下暹忽開目已至水底其空處如堂有石匱高丈餘鏁之賈手開其鏁去其蓋引暹手登之因入匱中又有金匱可高三尺金鏁之賈曰玉符在中非有緣不能見也因引手復出則已至岸矣仍告暹曰君有宰相祿當自保愛因示其拜官厯仕及於年壽周細語之暹後遷拜一如其說閑中雜記崇寧間南康軍進士彭天寵者初未嘗學道忽自言天人降其家且得天書一日沐浴語人曰我昇天矣閉戶不出有頃失所在後四十二日忽渡江歸且曰我初去時泛一金船載雲中如在綿上迤邐昇天見一道士曰子在晉時爲彭澤令有功及民故係仙籍因指白氣示之曰此父母思汝之愁氣盍歸爾九十年當復來及遺金銀鑰匙各一使復泛舟下至蔡州以金鑰賣之得錢歸至江將渡錢盡又賣銀鑰匙得錢買舟至其家錢盡父母驚喜他日令娶婦亦無他異洛下痴羊山中病鶴鷄跖集洛下有洞穴有人悞墮其中見宫殿人物非凡處又有大羊羊髯有珠人取食之不知所以問張華華曰此乃地仙九館也大羊乃痴龍也雲笈唐相李石未達時頗好道嘗遊嵩山荒草中聞有人呻吟聲視之乃病鶴鶴乃人語曰某已爲仙厄運所鍾爲樵者見傷一足將折須得三世人血數合方能愈也李公解衣卽欲剌血鶴曰世上人少公且非純人乃授一眼睫曰持往東都但映照之卽知矣李公中路自視乃馬首也至洛陽所遇頗眾悉非全人或犬彘驢馬首偶於橋上見一老翁騎驢以睫照之乃人也李公拜揖具言病鶴之事老翁忻然下驢宣臂剌血李公以小瓶盛之持往鶴所濡其傷處裂帛裹鶴謝曰公卽爲明時宰相後當輕舉相見非遙愼勿墮志李公拜之鶴沖天而去景翼邪正興明苦樂道學傳孟景翼字輔明軻之後也性至孝齊竟陵王盛洪釋典廣集羣僧與景翼對辨二教邪正景翼隨事剖析辭理無滯雖藺生拒嬴來公折隗蔑以加焉仙傳拾遺陳興明遊名山遇神人告之曰世人修道多不能勤久故罕覩其成功汝之積功亦可佳也如無退志何慮不列于玉籍然前苦後樂苦卽有窮樂卽無極夫林谷幽棲禽獸爲伍飢渴必至寒暑辛勤割世辭榮離親捨愛可謂苦矣壽同天地變化無方策空駕虛坐生雲翼可謂樂矣得不勉於修礪乎興明拜曰永佩聖言畢志於道不敢怠慢修之十八年晉大始元年三月一日於衡岳昇天歸眞馴兔顏闔飯牛橫山觀記國朝大中中有宋歸眞者棄官服道結廬山側茹芝絶粒三十餘年晨昏諷誦輙有白蛇白兔馴伏如聽太守趙需目其廬曰廣寒室嘗留詩以贈焉南華經魯君聞顏闔得道之人也使以幣先焉顏闔守陋閭苴布衣而自飯牛魯君之使者至顏闔自對使者曰此顏闔之家與顏闔對曰此闔之家也使者致幣顏曰恐聽者謬而遺使者罪不若審之復來求之則不得已茂實乘虎太白跨虬廣記王夐南陽張茂實之僕也一日辭去謂茂實曰感君恩遇深欲奉報夐家甚近其中景趣可觀能一遊乎茂實曰可然不欲家人知潛一遊可乎夐曰甚易乃截竹枝其上書符曰君仗此入室稱疾潛置於衾中抽身卽出乃相與南行數里餘有黃頭執青麒麟一赤文虎二俟於道茂實驚欲回夐曰無苦但前行夐卽乘麟茂實乘虎上仙掌越壑凌山殊不覺峻嶮至一山下物象仙媚樓臺松石非世所有紫衣吏數百人迎於道側旣入青衣數十人容色皆殊執樂拜引宴於中堂歌鸞舞鳳及諸聲樂皆所未聞情意高逸不復思人寰間事因教以至道贈金百鎰令送之到家家人方環泣云卒已七日矣以心間尚煖未殮也茂實遂棄官遊名山不知所終異人錄元和初有人海上見李太白與一道士在高山上笑語久之道士於碧霧中跨赤虬而去太白聳身健步追及共乘之東去高士善卷仙官馬周高士傳善卷舜時高士舜欲以天下遜之卷曰冬衣皮毛夏爲葛絺春耕足以肆力秋歛足以休食日出而作日入而息逍遙於天地之間而心意自得吾何以天下爲哉遂不受而入深山莫知其處列仙傳馬周少時多困於酒一日出城遇一老人揖坐林間與語曰太上命汝輔佐聖孫何爲沉困於酒自掇困餓五神已散旦夕將死何不省悟復曰汝本華山素靈宫仙官今召汝入宫周同行果見其宫室姓字存焉遂啟戶而入見爐火鼎器備具忽見五人立於前曰向先生酒酣而我奔散今請閉目復入神室明日謁天崗崗曰子有所遇位至丞相宜自勉之周果厯台輔數年眞仙下降其室曰佐國功成太一徵召無復留也遂解化伯元冥視梁諶夢遊眞誥霍山有學道者鄧伯元同王元甫授神人吞日丹景之法積三十四年乃能冥視夜書道成太帝遣羽車同元甫白日上昇高道傳道士梁諶字考成一日相者見之曰此子目流白光貌集眞氣非常人也後果樂仙道咸熙初事鄭法師於樓觀常夢與仙人遊或登名山或飲石髓由是自有所悟欽奉者多諶厭之乃深入嵓谷目能視地中物耳能聽數里聲一旦忽謂門人曰有朋待吾於南峰今須往矣乃冠服而出則雲氣迷繞不見其形唯聞鼓吹音隱隱于空時太興元年戊寅嵗也山甫吉凶守信禍福神仙傳伯山甫雍州人也居華山常服食黃精二百餘嵗每至人家則知人先世善惡有如臨見吉凶言之皆效東齋筆錄秦州徐二翁名守信日持一箒以掃堂殿未嘗與人言有問則不對而走忽發一言則應禍福吕參政惠卿旣除喪將赴闕便道訪二翁拜而問之翁驚走吕追之忽回顧曰善守善守吕意謂善守富貴及還朝除知建州徐禧沈括新敗懇辭不行又乞與兩府同上殿神宗怒落職知單州卽單守之應也二翁崇觀間眷遇優厚賜號沖和先生建仙源萬壽宫以居焉陳綯市鮓棲眞啖肉江南野錄陳綯善天文長於雅誦嘗吟曰一鼎雌雄文武火十年寒暑鹿麑皮寄語東流任斑鬢向隅終守鐵蓑衣又乾坤見了文章嬾龍虎成時印綬踈晚絶縉紳之望以修養爲事隱居西山種藥開寶中嘗與一鍊師舁藥入城鬻之獲貲則求鮓就鑪對飲傍若無人歌曰藍采和塵事紛紛事更多爭如賣藥沽酒飲歸去空嵓拍手歌疑其爲夫婦也或云得仙矣本朝蒙求賀蘭棲眞不知何許人爲道士自言百餘嵗善服氣不憚寒暑往往不食或時縱酒遊市鄽啖腐肉數斤後召至闕下眞宗賜之以詩爾朱浮石鮑焦抱木五代史補爾朱先生功行甚至遇異人與藥一粒曰若見浮石而後服之則仙道成矣先生如教每遇一石必投諸水後峽山將渡江有叟艤舟相待間其姓曰石氏問地所屬曰涪州先生豁然而悟遂服藥卽時輕舉隱逸傳鮑焦不知何許人不食五穀不衣絲麻居深山食木實衣木皮人或問之木實木皮亦天所生何異五穀絲麻哉焦遂更不食抱枯木枝而死嚴東一瓢道徽百斛高道傳道士嚴東不知何許人齊建元中詣晉陵依道士李景游東自晦若愚或與之談論則所造精微每齎一瓢隨行在晉陵五六年一日將別援筆注度人經辭不停翰窮日而終後入溧陽山中不知所之賢己集孔道徽守志業不仕父祐至行通神明隱於四明山嘗見谷中數百斛錢視之如瓦石不異採樵者競取入手卽成沙礫有鹿中箭投祐祐爲之養瘡愈然後去仙君橘井神女竹壇郴江集蘇仙君一日太上有召將補眞官臨別告其母曰明年此郡當有疾疫可取庭前井水一盃橘葉一枝以救人疾苦必有奇驗亦少資甘旨言畢出門眾仙擁衛幢節羽儀森列左右冉冉昇天而去明年果大疫母以井水橘葉救之無不立愈至今橘井存焉集仙錄雲華夫人名瑤姬西王母女也能飛騰變化禹遇之疑其怪誕非眞仙也問諸童律曰天地之本者道也運道之用者聖也聖之品次眞人仙人矣其有禀氣成眞不修而得道者木公金母是也雲華夫人乃金母之女也其後禹遂禮之乃得理水䟽決之道策鬼召神之書神女乃化爲石今巫山有神女石卽其所化也又有神壇壇側有竹垂之若篲或飛物著壇上者竹則因風而掃之終嵗常瑩潔焉劉商囊藥樂天鑪丹神仙傳劉商每歎光景甚促筋骸漸衰朝馳暮止但自勞苦浮榮世宦何益於已於是託病免官入道遊及廣陵於城街逢一道士賣藥見商目之甚相異乃罷藥擕手登樓以酒爲歡道士出一小藥囊贈商並戲吟曰無事到揚州相擕上酒樓藥囊爲賜別千載更何求乃別去商開囊視之紙裹一葫蘆得藥九粒如麻子依訣服之頓覺神爽不饑後往義興愛罨畫溪之景乃入湖漁隱於山中人多見之曰我劉郎中也有胡笳十八拍行於世仇池筆記樂天作廬山草堂燒丹而鑪鼎敗明日忠州剌史除書到乃知世間事不兩立也張碩羽帔原憲華冠列仙傳張碩洞庭人遇女仙杜蘭香降其室授以舉形飛化之道留玉簡以爲登眞之信命玉女齎羽帔絳履玄冠以授於碩且曰此上仙之服非洞天所有也碩乃白日飛昇南華眞經原憲居魯桑樞而甕牖子貢乘大馬軒車不容巷往見原憲原憲華冠屣履杖蔾應門子貢曰嘻先生何病憲曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色原憲笑曰夫希世而行比周而友學以爲人教以爲己仁義之慝輿馬之飾憲不忍爲也遊嶽却粒仲都禦寒高道傳孫遊嶽字頴達嘗茹芝却粒又專服穀仙丸顏采精爽老而愈少王氏神仙傳王仲都遇太白眞人授以虹丹能禦寒暑已二百許年冬月單衣乘駟馬車從帝於昆明池環水馳走帝御孤裘而猶覺寒仲都貌無變色背上氣蒸烋烋然又當盛夏曝之日中圍以十鑪火口不稱熱身亦不汗後亦仙去孫愽成火譚峭入水神仙傳孫愽河東人有清才能屬文著詩百篇誦經數十萬言晚學道治墨子之術能使草木金石皆爲火光照數里中亦能使身成火行見中使從者數百人皆不燒病者指之皆愈後合神丹得仙續仙傳譚峭字升叔愽聞强記遊厯名山辟穀養氣以酒爲樂後入南嶽煉丹得成入水不濡入火不灼變化隱形定辭涮腸鮑助拍齒高道傳塗定辭每到中春人服踈藥時渠卽臨流於小灘下躶露使水自七竅入謂之涮腸一日平坐而化家人環哭却活曰坐去難爲葬具言訖卧化數夕顏色如生及就壙棺甚輕識者以爲尸解眞誥鮑助不知學道法術年四十得面風氣口目不正兩齒上下正相切拍有聲晝夜不止得壽年百二十七嵗後遇寒過大水墮長壽河中死北帝中間比遣煞鬼及日遊神地殃使取之而終不敢近鬼官問其故天煞荅云此人乃多方術以制於我常叩齒鳴天鼓以警身中諸神神不得散鬼氣不敢入是以無緣取得若助不行水渡河亦可出千嵗壽不啻也當是遇大寒步行冰上口噤不能叩齒是故鬼因溺著河中患風病而齒自動叩者猶能辟死却煞鬼況道士眞叩齒鳴天鼓集神耶靈膠續弦神芝活死仙傳拾遺漢武帝巡北海祠恒山王母遣使獻靈膠四兩帝以付外庫不知靈膠之妙也一日射虎於華林苑而弩弦斷使者請以膠一分口濡其膠以續弩弦續訖乃使武士數人牽之終日不脫帝驚異焉膠出鳳麟洲葢鳳喙麟角合煎之名曰集弦膠廣異記徐福字君房不知何處人時始皇大苑中多枉死者橫道有鳥𠾑草覆死人面皆登時活有司奏聞始皇帝卽遣使齎此草以問鬼谷先生先生曰此是東海祖洲上不死之草生瓊田中一名養神芝葉似菰一株可活千人帝乃遣徐福及童男童女各三千人乘樓船入海尋祖洲採芝草後不返徐登婦人丘曾男子晉史徐登閩人也本是婦人化爲丈夫有道術能禁人令坐而不起禁水不流虎狼伏地與趙丙爲方外友同行其道道成登仙靈寶本行經云北室有精進賢者王福度有女名阿邱曾年十六在密室香湯自洗見金光曲照疑有不常遂出淨室登高望見道眞神仙精光輝爍邱曾乃作禮稱名今睹天尊願轉身爲男子俄頃之間已見其身形化爲男子元始天尊卽命南極尊神爲丘曾之師授其眞文給金童玉女道語邱曾曰汝得師南極豈不高乎功滿德備自當令汝位及至眞超身三界迅足九霞朝宴太上也蔡經狗竇宋卿雞窠王氏神仙傳總眞王君名遠字方平遊括蒼山過道民蔡經家君知其骨相合道往而度之謂經曰汝應得度世以補仙官但汝少不知道氣少肉多唯可尸解此法須臾如過狗竇中耳言訖而去經忽身熱如火欲得水灌之舉家摙水如沃焦狀三日之中消瘦骨立乃入室以被自覆因失其尸視被中之身頭足具全如蟬蛻耳洞微志李守中爲承旨奉使南方至瓊州界道逢一翁自稱楊遐舉年八十一邀守中詣其居見其父曰叔連年一百二十二又見其祖曰宋卿年一百九十五語次見雞窠中有小兒出頭下視宋卿曰此九代祖也相傳數世不語不食不知其年多少朔望取下子孫列拜而已梁須徹視李元飡和抱朴子道士梁須不知何許人聞柠檳赤者却老還少令人夜間徹視見鬼須年七十乃服之轉更少壯年至一百四十行及走馬後隱青雲山仙傳拾遺李子元居隸上山石室中習讀丹經專精念道忽有神仙乘羊而降授其食氣飡和之訣修之數年白日昇天今所居山卽第十化也下有綿水山中石上多有神羊之跡在焉荀環駕鶴阮瓊碎鼉遂異記荀環遊江夏黃鶴樓上望西南有物飄然而來乃駕鶴之客也羽衣虹裳賓主歡對已而辭去跨鶴騰空𦕈然而滅野人閑話趙尊師善飛符救人百姓阮瓊家有女爲精怪所惑父母召人醫療必先知其姓名瓊乃請師垂救師曰不消吾親去但將吾符貼於戶牖間自有所驗瓊得符貼於門上其夜一更聞有巨物似中擊之聲遂攢燭照之迺一巨鼉宛轉在地逡巡卽死其符遂不見瓊遂碎鼉之首棄於溝壑女亦尋愈俠士舞劒廉貞持戈北夢𤨏言道士羅少微頃在茅山紫陽觀寄泊有丁秀才同寓蘂宫冬之夜霰雪方甚一二道友圍爐有肥羜美醖之羡丁曰致之何難遂闢戶奮袂而去至夜分蒙雪而回提一銀榼酒熟羊一足云浙帥廚中物由是驚訝歡笑擲劒而舞騰躍而去迨曉莫知所往道士後以銀榼納於本邑也逸史裴令公少時術士云命屬廉貞將軍宜祭以清酒當爲助裴自此不懈及爲相事繁乃遺忘後有女巫云廉貞將軍遣某傳語大無情却不相知也將軍怒甚相公何不謝之公
