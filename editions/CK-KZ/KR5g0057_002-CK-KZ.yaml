front:
  text: 楊君司命子晉侍宸
  hash: sha256:845276acf01732484cbb131f439dcad2b45daaea0999b6561e585971d0af2a4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_CK-KZ_02p017b, image: JY296/CK-KZ_JY296_02p017b.png}
body:
  text: 眞誥楊羲和句容人幼而通靈與二許結神仙友道成眞仙屢降授以道法九華眞妃告之曰夫處風塵之休盛者乃多罪之下鬼趨死之老質也夫富貴淫麗是斷骨之斤鋸有似載罪之舟車自後眾眞屢降月無虚日至二十年楊君乘雲鶴白日昇天補華陽司命眞人王氏神仙傳王喬字子晉周靈王之太子生而神明幼而好道好吹笙作鳳鳴之音而白鶴朱鳳翔集復過浮丘公授以道要接上嵩山不歸一日忽乘鶴駐山巔而童謡曰王子喬好神仙七月七日上賔天初補南嶽司命侍宸再補桐栢眞人謙之師位道翔仙眞高道傳道士㓂謙之隱嵩陽修鍊感太上道君下降勅仙伯王初平引謙之而前曰吾得中嶽主表云自張天師登眞之後而作善之人無所師授道士㓂謙之行合自然宜處師位眞誥道翔許長史第三子之字也君糠粃世務專修上道長史君器之極通眞靈與師契合今在東華爲仙眞授書除侍帝宸俞叟誡魄夏馥鍊魂宣室志唐王公潛節制荆南有呂氏子窮窘來謁公公不爲禮寓居逆旅月餘窘甚鬻所乘驢於市中市門監俞叟者召生問其所由生曰吾家渭北家貧親老王公乃吾之重表父也乃不遠而來公不一顧豈非命也叟曰我見子有飢色今夕爲子具食幸宿我宇下於是延入一陋室共坐弊席陶器進脫粟飯而已夜徐謂生曰當爲子設小術致歸洛之費因取一小缶合於地上食頃舉手視之見一人長五寸許紫綬金章俞曰此王公之魄也俞誡之曰呂乃汝之表姪家貧遠來曾不爲禮豈親親之道耶可厚其資賄以一馬一僕二百縑遺之紫衣者俛首受教於是却以缶合於上有頃視之亡矣明日王公果召生宴游累月生告去贈以僕馬及二百縑生歸渭北不敢形言後數年方告於人眞誥司命君曰夏馥少好道入吳造赤須先生授鍊魂之法再遇桐栢眞人得道今在洞中仙矣道榮焚襯惠宗積薪高道傳道士勾道榮不知何許人名聞於蜀與華陽丞吕翼友善自言去世月日當送我東郊巨松之下以薪火燎棺爲惠翼與其友章升常燦數十軰共誌其日以俟之前一夕道榮徧詣知友家飲酒言笑至暮宿於逆旅翼使密視之見寢處如常黎明則已化而顏色不變於是爲置棺襯送於巨松之下致薪次火已發棺中烈熖不可近見道榮出於煙熖上冉冉淩虚而去又趙惠宗天寶末忽於郡之東積薪自焚僚庶往觀惠宗怡然坐火中誦度人經斯須化爲瑞雲仙鶴而火盡其下草猶綠遺簡得二詩其一曰生我於虚置我於無至精爲神元無爲軀散陽爲明合陰爲符形爲灰土神與仙俱眾垢將畢萬事永除其二吾駕時馬日月爲衛洞躍九霄上謁天帝明明我眾及我門人僞道養形眞道養神懋哉懋哉餘無所陳徐釣塗心錢朗補腦續仙傳徐釣者不知何許人自稱蓬萊釣者常腰一葫蘆棹扁舟泛五湖所得魚治江博酒吟咏而歸或見疾病者取藥一粒如麻子許令人以酒塗心上皆安或有問之此藥可食否曰可食恐憎飯耳有好事者吞之自然絶食人方信之一旦遁去又錢朗登甲科累厯清顯所治皆有遺愛後棄官入廬山遇人得還元補腦之術年一百五十嵗其顏如童子有玄孫數人出仕皆皓首朗一日與別云我處世多年道爲上清所召今當往矣遂解化去伯高方臺玄解眞島眞誥東卿君曰龍伯高漢人也伏波將軍戒其兄子稱此人之佳可法伯高後從仙人刁道林授胎息之法託形醉亡隱處方臺廣記祈玄解老而顏童憲宗異之召問曰先生年高而色不老何也答曰臣海上常食靈芝故得然也遂剋木作海上三島綵繪以珠玉帝觀之曰若非上仙無由及此境玄解曰三島咫尺試爲陛下一遊卽隱身而入漸覺身小無復見矣帝嘆異之因號其山爲眞島陰生乞兒寒嵓貧道列仙傳陰生者乃長安之乞兒也常於市中求乞市人厭賤遂以糞潑之而衣不汚疑以爲妖囚之依前市人行長安有歌云見乞兒與美酒庶免壞屋之咎而劉向云陰生乞兒人厭其瀆識眞者希累其囚辱於我無汚彼灾其屋廣記寒嵓子隱於天臺好吟詩多述山林幽隱之句桐栢眞人序而集之以行於世咸通間出謁李褐褐見其藍縷不禮之次日更衣乘白馬而來待之甚厚老人曰子知有寒嵓子耶曰知老人曰貧道卽是也吾謂子爲可教今則未然也子未知其門曰內修其心外檢其身所以無過知柔守謙所以安身不善歸己所以積德如是可以冀道之髣髴遂鞭馬而去谿父煉瓜孟節含棗列仙傳谿父居山間有神人來往賣瓜常止其家遂授父以煉瓜子之法令春分食之二十餘年昇山入水百餘嵗絶居山頂呼父說事遂去西漢逸史孟節西漢人有道術含一棗核可至十年不飢又能結氣不息身不動摇可至一年許士庶慕之爲神仙後入山不出時荷一食青精九飡西山眞君傳時眞君名荷鉅鹿人少時入四明山遇神人教以丹訣點化金玉賙濟困苦民受其賜後能驅逐邪魅役使鬼神事母以孝聞善胎息得坐忘法或百日一食半年一寢晉明帝時待之甚厚及許眞君上昇師亦從而昇天神仙傳青精先生年千嵗色如童子行步日過五百里能終嵗不食亦能一日九飡天師三境翊聖九壇本傳張道陵留侯六代孫也舉賢良方正雖仕而志在鍊形遂退隱北邙山章帝以三品印綬起之不就入嵩山遇神人告之曰石室中藏黃帝丹經琅函玉笈之書子行必獲矣師從之果得其書於是築壇朝眞以煉九丹丹成謂弟子王長曰服丹當沖天然吾未有大功豈敢遽服宜爲國家除害興利然後服之則吾臣事三境亦無愧矣翊聖傳本朝建隆初翊聖眞君降謂張守眞曰壇法有九上三壇爲國家設中三壇爲臣僚設下三壇爲百姓設而九壇各有儀式焉玄甫五藏叔期三關眞誥王玄甫授仙人吞日景之法積三十四年乃能內見五藏冥中夜書道成太上遣羽車迎玄甫乘雲駕龍白日登天今在玄圃臺受化爲中嶽眞人又趙叔期於王屋山學道見一卜者曰欲入天門詣三關存朱雀正崑崙叔期異之拜請要訣卜者授書一卷曰三關者口爲天關足爲地關手爲人關三關調則五藏安五藏安則舉身無病而仙道成矣道君授劒玉女獻環本傳天師功成太上道君下降授以雌雄二劒而劍各有日月星斗之文道君乃曰吾憫下元生人執係幽魂人鬼雜處今子爲吾分別人鬼異位則子之功無量矣又天師至仁壽縣遇十二天游玉女各獻玉環一隻願事天師師合而爲一環謂之曰吾投於地中先得之者納焉玉女爭取愈取愈深卽禁之不出因化爲鹽井公私取之以爲利其邑因爲陵郡自道陵始也聖母穿雲周生取月廣記聖母海陵人適杜氏爲母遇人能易形變化而夫不之信反以爲妖告官下獄而母自牕中飛出人見穿雲去時留履一緉於牕下海陵人爲之立祠號曰聖母祠宣室志周生有道術游吳楚人多敬之時抵廣陵坐中秋夜會月色明瑩眾人談及明皇游月宮之事周生笑曰吾常學於師亦可以取之因取數百筯繩而架之曰我將此梯取月乃閉戸久之客步庭中俟焉忽天地曛黑仰視又無纖雲俄聞生呼曰某至矣手舉其衣出月半寸許一室盡明寒入肌骨食頃如初商唱陽春張吟白雪詩史商七七有異術過潤州與客飲云某有一藝爲歡卽顧屏上畫婦人曰可歌陽春曲婦人應聲遂歌其音清亮似從屏中出歌曰愁見唱陽春令人離腸結郎去未歸家柳自飄香雪如此者十餘曲悟眞篇序天臺張伯端字平叔嘗罄所得吟成律詩九九八十一首號曰悟眞篇文多不錄其九轉金液還丹詩一篇云黃芽白雪卒難尋達者須憑德行深四象五行全藉土三元八卦豈離壬鍊成靈質人難識消盡陰魔鬼莫侵欲向人間留袐訣未逢一箇是知音張覩樓臺逢升宮闕北夢瑣言張建章好經史每以清淨爲念時往渤海遇風見一青衣人相引登山至島上覩見樓臺巋然中有仙女處處侍衛甚盛留飲少頃曰子不欺暗室可謂古之君子矣遂令青童送還廣記逢女幼而不食心慕清虚父母以爲虚言忽一日見神仙在空中自南至北將逾千里湧出金城玉樓於山頂一人招女升宮闕眾仙羅列儀仗肅然曰汝有骨錄當爲上眞太上命我授汝以靈寶眞文按而行之飛升有期後果及期升虚矣棲嵓洞室徐姑掘穴傳記許棲嵓舉進士第而志在修鍊時因入蜀登危棧忽與馬俱墜棧下進退不能卽隨馬而行至一洞室見諸仙羅列皆喜曰此乃長史公之孫也有仙相矣眾眞命坐賜飲且曰此石髓也汝得之矣無輸洩無荒淫後復來相見遂以所乘之馬送行曰此吾洞中之龍也因責出負荷子有仙骨故得遇之若到人間放之任其所適後棲嵓逡巡到故居而馬化爲龍飛舉廣記徐仙姑年數百嵗而貌若二十許人多游名山或時止宿於林巒窟穴之中往來江表吳人見之三四十年顏色不改行步如飛咸通間至剡縣謂人曰我先君仕於北齊有陰功而後及於我已得延年後人以此詳之方知姑卽丞相徐之才之女也德玄五嶽偉道九嶷眞誥東卿君云宋德玄周宣王時人也服靈飛六甲符得道日行三千里變形易質今在嵩山游行五嶽又韓偉道不知何許人隨宋德玄出入以師事之而德玄授以道法今道成常出入九嶷山徐福白鹿處士黃鸝廣記秦始皇遣徐福并童男童女三千人往東海取長生不死之草不歸及沈羲得道黃老君遣徐福乘白鹿車來迎沈眞人方知徐福之得道又元藏幾自號元處士隋大業中奉使過海遇神人留外國遍厯仙境一日思歸卽時津遣不旬日至東萊問其國乃皇唐也尋其子孫皆無人唯有二鳥類黃鸝隨處士出入每翔翥空中呼之卽下能傳口中言語裴諶佳會蘭香玄期廣記裴諶昔與王敬伯梁芳爲方外友入山學道梁芳死敬伯下山調官至正元中奉使淮南邂逅裴諶維舟慰問汝何所須諶曰吾儕野人心近雲鶴廣陵之西卽吾宅也倏然鼓櫂而去敬伯詣宅見諶衣冠偉然設宴就座諶酒酣謂左右曰此人乃吾昔山中之友道心不固以明自賊將浮沈於生死海中求崖未得今日之嘉會誠難得也子其往矣又有漁父於湘江岸側聞小兒啼聲四顧無人唯有一女子三嵗許父抱歸養之十餘嵗天姿奇偉忽一日見一青童自空而下携女子而去謂其父曰我仙女杜蘭香有過謫於人間玄期有限今往矣謫仙呼鼠祝公養雞廣記永明中鍾山有隱者蔡生每養老鼠數十枚呼之卽來令之卽去語言怪異時人謂之謫仙列仙傳祝公洛人也居北山好養雞百餘年雞千隻皆有名字暮棲木上日放散去呼名卽至積錢千萬置錢去吳開池養魚登吳山有白鶴孔雀數百常止其旁李珏販糴安公伏冶續仙傳李珏世居廣陵城市以販糴爲業年十五父傳業而珏受之升斗俾之自量不計時之貴賤衣食豐足年八十不改其業適會李珏相公出鎮淮南而珏改名寬一夕李公夢入洞府有金書李珏名視之甚喜忽見二仙童自石壁出珏問曰此何所二童曰此華陽洞天也此名非相公也公曰非我何人童曰公之部民也珏悟遍尋問於里巷得李寬之名迎入府拜爲年兄問以道術寬曰不知所修具以販糴事對公曰此常人之難事陰功不可及後寬尸解蟬蛻列仙傳陶安公鑄冶師也數行火火一旦散上紫色衝天安公伏冶下求哀須臾朱雀止冶上曰安公安公冶與天通七月七日當迎爾以赤龍至其日赤龍果至安公騎之上昇而去馬湘紙猧章震泥馬續仙傳馬湘字自然錢塘人幼好文學有道術一日過菜圃見蘿蔔甚盛因丐之園叟弗與湘於篋中取紙裂爲一猧子又裂一鷺鷥飛走園中而猧子趕趁之菜踐踏俱碎園叟知是異人乃祈謝之於是取紙猧及鷺鷥致篋中視菜如故略無所損抱朴子章震在周幽王時屢召不起師長桑子得其術能分形化影折草化爲龍虎噴水爲珠玉一日與弟子行卽以泥圓化爲馬乘之日行千里後入崆峒山白日上昇程妻致縑蘇母思鮓神仙傳期門郎程偉妻者能神通變化偉當從駕出行而服飾不備甚以爲憂妻曰出而闕衣何愁之有妻卽爲致兩縑忽然自至前偉復作黃白術連作不成妻乃出其囊中藥少許投汞銀中煎之須臾成銀欲從求方終不可得云偉骨未應得之逼不已妻尸解而去蘇仙傳仙君姓蘇名耽桂陽郡郴邑人也生於前漢幼丁父憂奉母潘氏以孝聞温清定省禮無違者晨羞夕饍人莫及焉常感神仙授以道術能隱形變化一旦侍朝飡於母母曰吾思鮓汝可致之曰唯卽捨七筯輟食携金而去須臾持鮓而至母食未畢得鮓甚喜母曰此去市甚遠何處得之其速如此答曰便縣市中買來母曰便縣山路危險去一百二十里如此之速汝誑我也答曰買鮓之時見舅在便市語耽曰明日來此請待舅來以驗虚實翌日舅果至乃首說市中相見之事母始知其非常乃潛察之見常持一青竹杖眾疑之爲神杖也道人兩口先生䨥踝王氏見聞錄梁况之居鄂州忽一道士至况之與之對飲道人求綿袴遂與卽捲投衣袖中將投語曰入袖中再入凡投十數次皆不能入道人咨嗟曰不免爲㓂萊公矣道人遂引去約當再來後月餘復至門人欲入白卽曰不須見侍郎但報先去也俟到彼相見况之貶化州久之一道人兩口腹上亦一口旣至廳舍索酒一斗引而盡見况之言曰記得鄂州相見否音聲雖同形貌非矣索錢二十七文而去出門以檐穿腹中口鼓鐵笛取漁舟獨立其上風引渡江而去後二十七日况之謝世道學傳簡寂先生陸修靜字元德吳興東遷人吳丞相凱之後也母姚氏懷之有一老姥告之曰生子當爲人天師及生足有䨥踝掌有大字家本奥室早涉婚宦嘗謂同僚曰時難再得乃遺棄妻子脫落營務專精教法不捨寤寐卜居廬嶽召赴金陵一旦謂門人曰吾將還舊隱俄偃然解化膚色暉暎異香芬馥山中諸徒悉見先生還山儀服鮮華眾皆驚異俄失其所樊英噀水朱倫駕煙漢書樊英者濟南人也善圖經緯洞達幽微隱於壺山之陽辟召不應嘗有暴風從西方來英謂生徒曰城都市火甚盛因含水西向噀之輙記其時日後有客從蜀郡來者云是日大火須臾有黑雲從東起大雨滅矣英嘗云浮丘公與我遊天壇之上一旦遂去丹臺新錄朱倫字德元凝心抱一不替感太上下降開瓊藴給丹符與之曰爾能精修上道守之能堅保爾昇度淩虚駕煙遵則福降慢則禍纏子能行之愼勿輕傳倫道成景王時太上授書除中嶽仙官抱一龍杖清虚虵鞭高道傳趙抱一年十二因牧牛遇一老人問之子飢否先生但點頭而已老人探手囊中取食與之其狀如蘿蔔而味甘又與柱杖一條瓢子一枚中有藥乃豌豆也諭之令人服食於是沈痾新疾服者無不愈先生自食蘿蔔不復思煙火食忽之一日信步抵京城之西巴樓院過涅槃堂聞有呻吟聲先生問何人若此僧曰數童行時疫方甚先生自瓢中取豌豆以新水令嚥之卽時汗如新沐人經夕皆愈後請藥者如市傳於裏外時眞宗東封未還丞相向公留守京師陰遣人察其實飛奏詣行在迨車駕還召見眞宗欣然拊其背曰子乃朕之姓也封御披度爲道士未幾求歸賜金鍍龍頭杖銅朱記癭木柸香藥等差中使張茂先道士胡太易送至石門山特與建眞寂觀以爲登眞之所仙傳拾遺廖沖字清虚連山郡人也以才德見稱爲本郡主簿後辭其印綬遊探道要於衡嶽遇太平眞人授道後歸鄉里常乘一虎執蛇爲鞭先天二年風雲晦冥騰舉而失所在劉邦賔友虔子高仙眞誥劉邦沛人起自布衣破秦平項創漢之基於漢有功上帝補爲南明公賔友而茅君云先世有陰德者徑補仙官或入南宮受化不拘職位之高下例皆速詣南宮受化又華陰山中有學道尹虔子武帝時人遇異人服丹霞之道行之五十年色如童子今太一君遣迎乘雲昇天在元州爲高仙矣彭鏗出處仲倫留連眞誥彭鏗卽彭祖也年八百嵗而不作尸解之絶南嶽夫人云諸公自欲出處語默肥遁山林以遊仙爲樂以升虚爲滅非不能登天也不爲耳王氏神仙傳王仲倫時居鶴鳴山石自響田宣見而問之曰彼何人也曰我神仙王仲倫也愛此石之奇響故留連而聽之耳
