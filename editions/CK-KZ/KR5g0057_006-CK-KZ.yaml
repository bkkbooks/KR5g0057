body:
  text: 味甘且香有頃公弼與法師別出反顧但見石壁而已玉器自滿陶瓢屢空高道傳道士王延字子元師華山雲臺觀焦曠眞人授三洞袐訣眞經後周武帝欽向乃遣使召之焦眞人謂曰道教陵夷久失拯援汝可力闡無令不振吾自此逝矣師至都久之得請還觀復詔增修以居之然山石無土致之極勞因虚默禱天忽踊土出於觀側取多而不竭常苦乏油又置一器經夕自滿久用而有餘晉逸史陶潛少有高趣任眞自得宅邊有五株柳故嘗著五柳先生傳以自况曰先生不知何許人亦不詳姓字宅邊有五柳因以爲號焉閑靜少言不慕榮利好讀書不求其解每有會意欣然忘食性嗜酒而家貧不能常得親舊知其如此或置酒招之造飲必盡期在必醉旣醉而退曾不吝情環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也宋香足雨吳符止風高道傳道士宋元白一日越州大旱方曝尫檄龍以祈雨久之亢陽愈甚元白謂人曰凡所降雨須俟天符非上奏無以致於是止於元眞觀焚香上祝經夕大雨告足越人神異之信州復旱郡將特請禱元白遂作術以告城隍之像則須臾致雨西山記吳眞君猛字世雲嘗有暴風起世雲書符擲屋上有青鳥啣去須臾風止人問其故答曰南湖有舟遇此風有二道士呼天求救故以此符止之耳驗之果然尊師伏虎處士豢龍野人閑話閬州雲臺化昔老君張天師經遊之所觀內有一道士裴浩中者不知何許人年逾百嵗多食松枝或鍊氣而已每因握固數息冥目靜坐必有猛虎馴擾於左右同住者亦嘗見之一旦謂門人曰余有所往爾等好住無替修習門人固留不住遂褰衣上峭壁若履平地如飛鳥捷猿直上峯頂杳杳而不見之後鄕里有虎暴者競畫尊師形像以厭之謂之伏虎尊師尚書故實牛相國鎭襄陽久旱有處士眾云豢龍者公請致雨處士曰江漢間無龍獨一湫泊中有黑龍强驅必爲災難制公固命之果有大雨漂流萬戸孝先水上德閏甕中高道傳葛孝先人呼仙翁嘗從吳王船行至三江口阻風船多漂沒仙翁船亦不知所在吳王歎曰仙翁有道何不能免此乎乃遣使求之踰宿忽見翁水上行來衣履不濕旣至頗有酒容詰其故曰昨伍子胥强邀留飲淹屈陛下於此上忻然天師內傳張仲常字德閏天師玄孫常應聘至闕潛歸嘆曰吾幾落世網室中常埋一甕每對妻子茹葷飲酒夜皆在甕中經日不出赤松雨師元芝水母列仙傳云赤松子者神農時雨師也服水玉以教神農能入火不燒往崑崙山西王母石室中隨風雨而上下炎帝少女追之亦得仙俱去高辛時復爲雨師焉晉逸史趙元芝一日出行遇一道士相揖遂引入水去深夜月中行泥濘不污傍見一物如蛇形有五色之光元芝驚異問此何物耶道士曰此謂之水母見者神仙洞源鳴鍾薦明聞鼓本傳瞿柏庭師事桃源黃洞源法師一日拜辭洞源問汝辭吾將安往答曰歸洞府欲留之不克見柏庭顏色光彩異常服短布衣烏繒巾逡巡却行三移足忽然不見洞源與道徒皆愕貽求之無蹤跡鳴鍾集觀戸將大索林莽觀戸至東北林際遇一大蛇當路而止高道傳道士張薦明通老莊高祖召見問道家可以治國乎對曰道者妙萬物而爲言得其極者尸居袵席之間可以治天下高祖大其言延入內殿講道德經拜以爲師忽一日聞禁中奏時鼓曰陛下聞鼓乎其聲一而已五聲十二律鼓無一焉然和之者鼓也夫一萬事之本也能守一者可以治天下高祖善之賜通玄先生後不知所之剪韭務光服葵桂父列仙傳務光者夏時人也耳長七寸好琴服薄韭根殷湯伐桀因光而謀曰非吾事也湯曰孰可曰吾不知也湯曰伊尹何如曰强力忍垢吾不知他湯旣克桀以天下讓光曰智者謀之武者遂之仁者居之古之道也吾子胡不遂之請相吾子光辭曰廢上非義也殺人非仁也人犯其難我享其利非廉也吾聞非義不食其錄無道之世不踐其位况於尊我我不忍也遂負石自沉蓼水已而自匿後四百餘年至武丁時復見武丁欲相之不從武丁以輿迎而從辟不以禮遂投河浮山後遊尚父山眞誥云務光剪韭以入清泠之泉是也又桂父者象林人時黑時白時赤時黃南海人見而尊事之常服桂及葵以龜腦和之千丸十斤桂父累世見之今荆州之南尚有桂丸焉仙流譚宜客作子主仙傳拾遺唐譚宜開無末生墮地能言數嵗身逾六尺髭髮風骨不與常兒同不飲食行及奔馬後忽失所在遠近異之以爲神人鄕里立廟祀之大厯中忽還家卽霞冠羽衣眞仙流也告別父母訖騰空而去列仙傳子主者不知何處人也詣江都王自言甯先生雇我客作二百餘年不得作眞人以爲狂王問先生居止云在龍眉山上王遣吏將上龍山巔果見甯先生毛身廣耳披髮鼓瑟主見之叩頭吏致王命先生曰此主是我比舍九世孫也汝勿預吾客事吏乃下山師文泉涌萇洪雪飛列子瓠巴鼓瑟而鳥舞魚躍鄭師文聞之棄家從師襄遊師襄曰子之琴何如師文曰得之矣請嘗試之於是當春而叩商弦以召南呂涼風忽至草水成實及秋而叩角弦以激夾鍾温風徐回草木發榮當夏而叩羽弦以召黃鍾霜雪交下川池暴沍當冬而叩徵弦以激蕤賔陽光熾烈堅冰立散將終而叩宫以總四弦則景風翔慶雲浮甘露降醴泉湧拾遺記靈王二十三年起昆昭之臺亦名宣昭臺高百丈昇之以望雲色時有萇洪能招致羣異王乃登臺望雲氣蓊鬱忽見二人乘雲而至鬚髮皆黃遊龍飛鳳之輦駕以青螭其衣皆縫緝毛羽也王卽迎之上席時天下大旱地烈木燃一人先唱能爲霜雪引氣一噴則雲起雪飛坐者皆凛然宮中池井堅冰可琢又設狐腋素裘紫羆文褥褥是西域所獻也又有一人唱能使卽席爲炎乃以指彈席上而暄風入室裘褥皆棄於臺下也蕭隨弄玉犢配連眉列仙傳蕭史者秦穆公時人能致孔雀白鵠舞穆公有女字弄玉好之公以女妻之遂教弄玉作鳳鳴居數十年吹簫作鳳聲鳳來止其屋穆公作鳳臺夫婦止其上不下數年一旦皆隨鳳去故秦人爲作鳳女祠於雍宫時有簫聲神仙傳黑山仙人犢子者鄴人也居黑山採松子茯苓餌之已數百年時壯時老時美時醜乃知其仙人也都陽女者生而連眉耳細而長眾以爲異俗皆云天人也會犢子求耦都女悅之遂留相奉時出門共牽犢耳而走莫能追之左太沖魏都賦曰昌榮練色犢配連眉昌容事載別卷張老席帽孟岐草衣神仙傳張老楊州六合縣園叟也因娶比鄰韋恕女爲妻一日乃挈妻去且曰某土居山下有小莊明旦且歸他年相思可令大兄往天壇山南相訪去數年絶無消息韋念其女令男義方訪之至天壇南有崑崙奴迎拜至一甲第樓閣花木異常見一人戴遠遊冠朱履儀狀偉然細視之乃張老也引入堂內見妹且碧窗珠箔服飾之盛世所未見進饌精美留經日而別贈金二十鎰並一度帽曰兄若無錢可於楊州北郊賣藥王家取錢一千萬特以此信旣歸五六年間金盡訪王老取錢果留帽付錢乃信眞神仙也仙傳拾遺孟岐清河逸人也年七百餘嵗言及周時事如在目前云曾侍周公升壇以手摩周公之足而周公以玉笏一枝與之岐常執之今已銳矣每切桂葉而食漢武帝好神仙遂披草衣而來帝異之驪母尅木槎客支機廣記李筌往嵩山石室中得黃帝陰符經本未曉其義理因往驪山於路傍見火起燒木有一老姥曰火生於木禍發必克筌聞之大驚曰此黃帝陰符之祕文姥何得而言之姥曰吾受經已三元六周甲子矣筌於是拜請奥義姥曰吾受此符名列仙籍而後可語至道之妙夫陰符者上清所袐玄臺所尊理國則太平理身則得道非奇人不可妄傳泄天機者沉乎三劫可不戒哉博物志客有居河濵者年年八月十五日浮槎來過至不失期客陰異之乃多賫粮乘槎去任其所之忽至一城郭處望見織婦因問不答但取支機小石與之曰可將此蜀中問嚴君平客還問君平君平曰去年七月七日客星犯牛女卽是汝矣芝耕雲卧松餐澗飲仙傳拾遺吳筠自號洞陽子年十五篤志於道善屬文攻楷隸舉進士三教九流靡不周覽隱居南陽倚帝山芝耕雲卧聲利不入高道傳道士王延字子元九嵗好道師正懿先生陳寶熾至十八受業於樓觀與眞人李順興相友善未幾訪華山雲臺觀復師焦曠眞人授三洞祕訣眞經唯松餐澗飲以希眞理司命寶爵老父神枕仙傳拾遺司命君者常在於民門與御史康元環幼小同學嘗贈元環一飲器如玉非玉不言其名自此叙別不復再見一旦有商胡詣東都所居謁元環曰宅中有奇寶之氣願得一見元環以他物示之皆非也乃出司命所與器商胡見頓首曰此天帝流華寶爵耳致於日中則白氣連天承以玉柈則紅光照室此器太上鎮中華之寶亦不久留於人間卽當飛去得此寶者受福七世元環以玉柈承之夜現紅光滿室神仙傳云太上老父者失其姓名漢孝武帝東巡狩見老父鋤於道頭上白光怪而問之老父答曰臣年八十五垂死有道者教臣服朮飲水并神枕之中有三十二藥物二十四件應二十四氣其八毒藥應其八風今臣之年轉少此之故也嚴青夜行國珍晝寢神仙傳嚴青會稽人也居貧常於山中作炭忽有一人與青語臨別授以一書曰汝骨相應得道並教以服石腦法青自得神書之後常覺有數十人侍從時都督逢青夜行因叱從兵錄之青亦叱其從神錄之都督與從者皆不得去明旦行人曰此必是嚴公也家人往叩頭謝過乃放遣歸高道傳巨法師名國珍好神仙學名利兩忘喜怒俱遣食疏衣弊所守彌篤忽感疾人勉之以藥曰道勝則疾除何慮之有其自信之如此一日晝寢門人忽聞車馬往來有頃瓦屋皆震師遂化去洞府天倉靈壇石廪神仙感遇傳河東薛逢爲綿州剌史夢入洞府肴饌甚多有人謂曰此天倉也旣覺卽使道士孫靈諷與親吏訪焉至州界昌明縣有洞曰天倉者師乃入洞見石牀羅列飲食名品極多食之味皆甘香欲賫歸以奉薛及出洞門形狀宛然皆化爲石矣湘川記朱陵之靈壇太虚之寶洞當翼軫之宿度應璣衡故曰衡山山有五峰而石廪預其一焉山多詞人樵夫舟子往往能詩嘗有廣州從事舟行聞人諷詠云野鵲灘西一棹孤月光遙接洞庭湖堪憎回鴈峰前過望斷家山一字無寡言石室靈府草堂高道傳道士陳寡言隱玉霄峰以琴酒吟詩放情自任未嘗加飾其山居詩云醉卧茅堂不閉關覺來滿目見青山松花落處宿猿在麋鹿羣羣林際還又曰照水氷作鑑掃雪玉爲塵何須問今古便是上皇人將尸解謂弟子曰當盛我以青布囊於石室中慎勿土木爲也臨終以詩示其徒云我本無形暫有形偶來人世逐營營輪回債負都還了搔首索然歸上清又徐道士名靈府號默希子居天台雲葢峰建草堂以居之日以修鍊自樂嘗作詩云寂寂凝神太極初無心應物降雲輿性修自性非求得欲識眞精只是渠又曰學道全眞在此生迷途待死更求生今生不了無生理縱得生知何處生會昌初武宗詔浙東廉使以起之辭不復出見廉使獻言志詩曰野性歌三樂皇恩出九重傳來紫宸命遣下白雲峰多愧書傳鶴深慚紙畫龍將何佐明主甘老在巖松廉使表以衰槁免命由此絶粒久凝寂而化劉寬府帥賀亢員郎眞誥劉寬字文饒後漢人今在洞中作童初府帥正侯主始學道者陳無已傳賀亢世莫知年與其鄕里仕石晉爲郎章聖皇帝東封有布衣帀裹謁於道左稱晉水部員外郎賀亢帝知其仙者夜閱牓子得之大驚使求之不獲每與莊獻皇后言之以爲恨天聖中賀使其弟子喻澄詣闕獻金銀銅道像直數十萬后怪之召問澄澄以師對問師曰賀也后亦大驚問今安在可得見耶澄曰在淮南使臣有獻固願見也后喜過望遣使隨澄求之淮南與俱來后爲幸鴻福寺見之其言皆人所難切於時者后不樂罷之何充仙品丁義神方眞誥何充盧江灊人也累遷尚書世業奉教多施惠立功德永和二年尸解受化南宫升居仙品以其多施惠故也西山記吳眞君名猛字世雲七歳有孝行夏不驅蚊蚋懼其去已而噬親也年四十邑人丁義授以神方復師南海太守鮑靚得其祕法黃龍中嘗天降白雲符遂以道術盛行於吳晉之間矣湘媪丹篆郭公青囊女仙傳唐貞元中湘潭有一媪不云姓氏但稱湘媪常易止人舍十有餘年每以丹篆字救疾閭里莫不應驗媪鬢髮如雲肌潔如雪策杖曳履日可數百里忽有道士與媪相遇甚相慰悅或詰道士道士曰此劉綱眞君之妻樊夫人也方知媪卽樊夫人矣神仙傳晉郭璞好經術博學有高才而訥於言論詞賦爲中興之冠好古之奇尤妙於陰陽有郭公者客居河東精於卜筮璞從之受公以青囊中書九卷與之由是五行天文卜筮之術禳災轉福通致無方雖京房管輅不能過也璞門人趙載嘗竊青囊書未及讀而爲火所焚子春膏肓遊嵓痼疾幽怪錄杜子春落魄資產蕩盡有一老人與錢三百萬不告姓名而去旬歳稍盡去馬而驢去驢而徒老人又與錢千萬數年後貧過昔日老人又與錢三千萬曰此而不痊貧在膏肓矣唐史隱逸田遊巖就兆三原人初補大學生其母及妻子並有方外志後入箕山就許由廟東築室而居自稱許由東鄰調露中高宗幸嵩山遣中書侍郎薛元超就問其母遊嵓山衣田冠出拜帝令左右扶止之謂先生養道山中皆得佳否遊巖曰臣泉石膏肓煙霞痼疾旣逢聖代幸得逍遙帝曰朕今得卿何異漢獲四皓乎薛元超曰漢高祖欲廢嫡立庶黃綺方來豈如陛下崇重隱淪親問巖穴帝甚歡王質爛柯徐甲枯骨王氏神仙傳王質東陽人時入山伐木偶於石室中見數童子下棊質坐斧柯上觀之童子將棗與質食之無飢渴童子下棋未終一童子曰子可去來已久矣質起視斧柯已爛矣還家親戚無有存者後入山昇天今衢州有爛柯山神仙傳老子西度關關令尹喜知其非常人從之問道時有客徐甲約日雇百錢計欠甲七百二十萬錢甲見老子出關遠行索債不可得作辭詣關令以訟老子喜得辭大驚乃見老子老子問甲曰汝久應死吾昔倩汝爲吾官卑家貧無有使役故以太玄生符與汝所以至今日汝何以言吾乃使甲張口嚮地而太玄符立出於地丹書文字如新甲成一聚枯骨矣仲節學道觀子奉師眞誥有學道者平仲節河中人渡江入括蒼山受師宋君存心鏡之道具百神行洞房事如此積四十五年精思身形更少體有眞氣今年五月一日黃老遣迎卽日乘雲駕龍白日昇天今在滄浪雲臺又黃觀子自少好學道而家中奉師朝朝拜禮願乞長生如此積四十九年太上眞人以一百四十事試之皆過遂與之金丹而入焦山誦大洞經今補仙官爲太極右卿有志者也非師所能致是其寸心定耳園客甕繭巴卭盎橘仙傳拾遺園客者濟陰人也姿貌端美而良邑人以女妻之客終不取常種五色香草積數十年服食一日有五色蛾止其香末客衣而薦之以布生花蠶焉至蠶時有女夜半至自稱客妻道蠶狀客與俱往得一百二十頭繭皆如甕大繰一繭六十日乃盡訖則俱去矣莫知所之濟陰人祠華蠶設祠室也眞怪錄巴卭人不知姓家有橘園因霜後盡收餘有二大橘如三四斗盎巴人異之剖開每橘有二老叟𩯭眉皤然相對象戲亦不驚怖一叟曰恨不得深根固蒂以盡棋中之樂一叟曰君輸我海龍王第七女髮十兩智瓊額黃十二枚紫綃帔一副絳臺山霞實散二庾瀛洲玉塵九斛阿母療髓凝酒四勝阿母女熊飛娘躋虚龍縞襪八緉後日於王先生青城草堂還我耳一叟曰橘中之樂不減商山一叟曰僕飢虚矣卽於袖中取龍根脯食之如一草根方圓徑寸形狀宛轉如龍毫釐罔不周悉因削食之隋削復滿食訖以水噀之化爲一龍二叟共乘之足下泄泄雲起須臾風雨晦冥不知所在金城絳闕清都紫微逸史有崔生者於青城山下洞見金城絳闕仙翁羽衣霞帔留生酒食以女妻之取青囊藥兩粒令服之每朔望乘鶴上朝蘂宮嵗餘請歸得隱形符乃潛遊宮禁竊錦綵上令羅公遠作法照之殿後果有崔生上令笞死公遠曰此人已居上界殺之非國家福上遣兵仗送至青城山洞口果見金城絳闕生妻擲一領巾化爲五色絳橋令生渡橋隨步隨滅須臾雲霧四合但聞鸞鶴笙歌之聲列子周穆王遊化人之宮化人之宮搆以金銀絡以珠玉出雲雨之上而不知下之據望之若屯雲焉耳目所觀聽鼻口所納嘗皆非人間之有王實以爲清都紫微鈞天廣樂帝之所居王俯而視之其宮榭若累塊積蘇焉希夷餌柏守微茹芝唐史屬辭王希夷隱嵩山餌松柏雜葉年七十餘筋力柔彊明皇東巡詔見行在訪以政事與語甚悅高道傳道士李守微不知何許人常遊蜀談論多滑稽不拘小節人常輕侮之忽謂人曰余將遊五嶽諸山今往矣或問求利術則曰浮生瞬息間盍尋眞訪道脫灑塵網至若脫氣鍊丹茹芝絶粒皆有益也何區區於利術哉遂遁去嘗與祠部韓嶼友善嶼贈詩云一定童顏老嵗華貧寒遊厯貴人家鍊成正氣功雖大忘却元神道更差舄曳鶴毛乾毾及毛杖携龍甲瘦查牙如何舊隱不歸去落盡蟠桃幾番花番去聲伯玉娶婦薊子還兒三洞珠囊褚伯玉字元璩吳郡錢塘人父爲取婦入前門間伯玉從後門而出往剡居瀑布山修道又嘗遊南嶽路入閩中飛湍赴險伯玉舟航逼晚迥泊涯際而衝飈夕震山洪暴起激船於萬仞之上傾墜絶崖徒侶在前判其冰碎緣岨尋求已見伯玉怡然自若後至霍山鍊氣餐霞積年絶粒也神仙傳薊子訓齊人舉孝廉除郎中又爲都尉年二百餘顏色不老曾求抱鄰舍嬰兒誤墮地死死家素尊子訓卽埋之二十餘日子訓自外來抱兒還之家恐是鬼掘視所埋但泥而已居士芒屨道者麻衣仙傳拾遺朱桃椎者成都人隱於郭外結草爲廬或佯狂放誕或終日不言益州牧竇軌辟之爲掾不就遺以衣服棄而逃去每織芒屩致於路側行者見之爲留米置於本處桃椎夕而取之人謂之居士屩冷齋夜話有史宗者號麻衣道者坐廣陵白土埭江都檀祇與語多無畔岸索紙賦詩曰有欲苦不足無欲卽無憂未若清虚者帶索被玄裘浮游一州間汎若不繫舟要當滅塵慮棲息老山丘檀祇異之陶淵明記曰白土埭逢三異比丘此其一也有狂道士借海鹽令所畜小兒登小山山有屋數椽道人三四輩相勞苦其言小兒一不能解但得食一甌如飴又有問道士曰謫者何時竟答曰在徐州江北廣陵白土埭計其謫行當竟矣仍作書授小兒曰爲達之繫小兒衣帶上令還海鹽令喜問曰衣中何有曰書疏耳又呼問小兒至何處小兒曰爲前道士捉杖飄然去但聞足下波浪聲至一山中山中人寄書與白土埭上卽引衣帶示令令一不能曉小兒歸詣史宗宗驚曰汝乃蓬萊山中來耶
