  text: 三洞羣仙録卷之三筵三
  hash: sha256:d262b8c856e2cc507495d91d6206357d6a069236ecb8d7e0ec26153125546b24
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_HFL_003-001a, image: hfl/0992/0992-102.png}
body:
  text: 正一道士陳葆光撰集明期飆室素臺真館真誥衡山有學道者冶明期以魏末入山服食與張禮正同止嚴穴受西城王君丹法已四十三年矣內外洞徹日行五百里今在方諸室為上仙又定録君云易遷童初二宫是男女之堂館凡地下主者之高者便得真仙之館今有女真趙素臺在易遷宫已四百年不肯遷云天下無復樂於此處也茅君雞子聖姑鵝卵神仙録茅君學道於齊後道成治於茅山有疾病者往請願常煮雞子十枚內帳中須臾茅君擲子還之歸破之皆無中黃者病人當愈若中有土者病即不愈以為常候雞子如故無破處也南史簫昂為彭城太守時有女子年二十許散髮黃衣在武窟山石室中無所修行雖不甚食或出人間飲少酒鵝卵一枚呼聖姑就求子往往有效造者充滿山谷昂呼問無所對以為妖惑鞭之三十瘡即瘥後失所在道義馴鹿君友引犬高道傳道士王道義知終南山有尹喜真人登真之所大和中自姑射山將門弟子六七人來居樓觀以永平三年師羽化白雲滿室異香盈庭有白鹿卧於庭中旬日或隱或見既殯乃絶鄉人見道義乘白鹿沖天矣茅亭客話遂州小溪縣石城鎮村民和君友於雲頂山寺遇一道士布衣鹿幘引一黑犬令君友携壺杖到青城山初由荒徑見怪石夾道細竹桃花飛泉鳴瀨至一觀宇令君友致囊杖于階上云爾有仙表乃取藥一粒令吞之曰九月八日復當來此乃遣君友歸家了無飢渴之念至其日是夕山谷月皎風清君友如有所待達旦雲霞相映如有五色君友仰觀躡空祥風綵霧鬱然而起遂越巨壑層巒而去極目乃沒干朴識陶和璞笑琯丹臺新録嘗有人從江外還忽逢一人乘小小鹿頭船子劣容一人從浪中直來便呼其人姓名曰顧道度下都去吾欲寄尺書與茅山陶隱居正爾作書垂當見授忽云罷君會不往山中我尋自下去此人至都果忽忽便往廣陵後子良問洪先生洪云此人乃中嶽仙干朴其前生經識陶某耳非今生相識也豈復來此耶高道傳邢和璞不知何許人隱居瀛海間時房琯為廬氏宰待和璞甚善因携手不覺行數十里至夏谷村有廢佛堂松竹森映共坐其下和璞以杖擊地令侍者掘之深數尺得一瓦甕中有婁師德與永公書和璞笑謂琯曰省此乎琯髣佛記前世嘗為僧名永和璞復曰君當為輔相善自愛也梅姑履水道華登松異苑秦時丹陽縣湖側有梅姑廟生時有道術能著履行水上至今廟晦望之日見水霧中曖然有履形高道傳侯道華凡所居之觀有損處即持斧斤以葺之勤苦備歷一日修殿宇忽於梁間得丹一粒即吞之觀門前有一松木道華登松去其枝梢人責之答曰恐礙我上升人皆以為狂後七日凌晨道華升松頂揮手謝曰我受玉皇詔授仙臺郎知上清宫善信院今去矣復留詩云帖裏大還丹多年色不移前宵盜喫却今日碧空飛俄頃雲中音樂聲幢幡隱隱凌空而去令威仙鶴宋纖人龍搜神記遼東城門華表柱有仙鶴立其上人不知欲射之其鶴飛於空中自歌云有鳥有鳥丁令威去家千歲今來歸城郭猶是人民非何不學仙塜纍纍後人於華表柱立二鶴自此始矣晉逸史宋纖有才藻去官不與人交遊隱居酒泉弟子受業者三千人酒泉太守圖其像於閣上出入祝公頌曰為枕何石為漱何流形雖可見名不可求遂造其門而嘆曰名可聞而身不可見德可仰而形不可覩而今而後知先生乃人中之龍也王鼎物外乖崖夢中雅言雜載王鼎書歌詩好神仙心遊物外時人或謂有所得問之終不泄露詩百餘篇傳於人間如風落蠹枝驚鶴去水流山果向人來贈程明甫云古縣枕前灘官間道自安執杯山鳥唱曬藥野猿看石縫橫琴筆槎頭插釣竿不知陶靖節早晚入雲端忠定公録張乖崖在成都夢謁紫府真君接語未久忽報請到西門黃兼濟承事承事以幅巾道服而趨真君降階接之禮頗隆盡且揖張公坐黃之下諭顧詳欵似有欽嘆之意公朔旦即遣吏詣西門召黃承事者戒令具常所衣之服來比黃即至果如夢中公即以所夢告之問平日有何陰德蒙真君厚遇如此黃曰無他長每歲遇米麥熟時以錢收糴至明年米麥未熟小民艱食之際糶之價直不增升斗亦無高下在我者初無所損而細民得濟所急公曰此承事所以坐某之上也乃令吏掖而拜之順興宿德少道陰功丹臺新録李先生字順興京兆人也因秋分之夕忽有飛仙千餘騎翔集空中有二人在庭謂先生曰上帝有命遣仙官於紫閣上石室中相待也吾二人乃直日之神奉使來召宜即展駕先生與之相隨越度峯谷若乘飛飆倏然便至乃見三真人各坐一牀自然有五色雲霞羅覆其上侍從僚屬精光璨鬱幢幡羽蓋非可名字先生即稽首請白日內飛之道真人曰子有宿德位階仙官而欲形神同舉不足為難也王氏神仙傳王少道以陰功救人積德成仙常語人曰功滿三千白日升天修善有餘坐降雲車弘道無已自致不死斯言信哉而真誥云童初府有王少道漢時人也杜沙龍飛馬符鼠伏丹臺新録杜升真人莫測其年壽絶粒飲水如二十許人能以沙書一龍字浮於水上叱之則變為小龍飛起丈餘隱隱雲霞生呼之即下神仙傳馬湘遍遊名山人皆不知有道術常州太守馬公聞之召以年兄待之公曰城中多鼠湘即書符令人貼於壁下長嘯一聲而羣鼠湊集湘乃呼其大者而前曰爾乃天生微物天與粒食何以撓於相公今不欲殺爾宜速去大者回而小者俯伏階前成羣而去韓湘藍關尹喜函谷青瑣韓湘字清夫文公姪也落魄不羈嘗醉吟曰青山雲水窟此地是吾家後夜流瓊液凌晨咀絳霞琴彈碧玉調爐鍊白朱砂完鼎存金虎玄田養白鴉一瓢藏世界三尺斬妖邪解造逡巡酒能開頃刻花有人能學我同共看仙葩公問曰子安能奪造化開花乎湘曰此事甚易取土聚之以盆俄頃碧蓮二朵類牡丹花葉有小金字云雲橫秦嶺家何在雪擁藍關馬不前公莫曉句意後言佛骨謫潮州時大雪塗中遇湘曰憶向花上之句乎詢地名即藍關也公方驚悟乃續其詩曰一封朝奏九重天夕貶潮陽路八千本為聖明除弊事敢將衰朽惜殘年雲橫秦嶺家何在雪擁藍關馬不前知汝遠來深有意好收吾骨瘴江邊湘後與公俱至沅湘莫知所之廣記函谷關令君喜占風氣逆知當有神人來過乃掃道四十里見老子而知是也老子在中國都未有所授知喜命應得乃停關授以道要盱真母部黃君父屬西山記盱真君諱烈字道微事母以孝聞而母亦有志學道與母同往西山見許真君叩頭求哀真君念之使築室於所居之西侍母居焉授以道術及許真君上升道微與母皆受玉皇詔部分許君家屬升天又真君姓黃名仁覽字紫庭父名輔字萬石有高行事親以孝聞州郡舉孝廉穆帝時仕至御史紫庭少俊拔有清致許真君以女妻之萬石事許君執弟子之禮及紫庭受玉皇詔與父母家屬升天今高安縣祥符觀有丹井存焉乃其故居也修公化羊尹澄憫鹿列仙傳修羊公隱華山石室中服黃精室有石牀公卧其上而石盡穿景帝聞名詔之公即於牀上化為白羊題其脅曰羊公謝天子帝後置石羊於臺上公復化而隱不知所在丹臺新録尹澄有道術始皇纍詔不起澄厭喧譁意以山林為樂改名尹林子遠遁林谷時見羣鹿有一傷足者躓頓不前澄憫其苦用藥封其足復遇大雨食盡困於林藪時羣鹿奄至飢則吮乳寒則卧懷相隨纍月遇神人授祕訣乃能生骸護病年三百四十歲白日上升而真誥名尹林子者漢末入茅山令以為真人矣志真縶虎子英捕魚高道傳吕志真廣成先生弟子居石室十餘年善以藥石救人入林谷則虎豹隨之問其道則默無所對出商山道中忽失色不前人皆訝之且曰前有剽掠者來果見兵刀至志真謂賊曰此行皆吾弟子無得干之其徒斂衽避路不復敢前又至一谷口曰此有害人之物同行欲見之遂入林中以繩縶二虎而出由是知志真深得廣成之道焉列仙傳子英者舒鄉人也善入水捕魚得赤鯉魚愛其色持歸著池中數以米穀食之一年長一丈餘遂生角有翅翼子英怖而謝之魚曰我來迎汝爾可上我背與汝俱去須臾暴雨子英乃上其背騰空而去子先二狗沉建一驢列仙傳子先姓呼漢時人卜師壽百餘歲好飲酒有一嫗待之甚厚未嘗問及酒資一日忽呼嫗曰急裝當與共行是夜有神人持二茅狗來子先與嫗共乘之入幸陰山大呼云子先酒家母在此仙傳拾遺沉建有延年却死之術一日遠行寄驢一頭并犬羊於主人之家各付藥一粒而去主人曰此客可怪寄下十五口並無一文當若之何建出三年乃還奴婢驢羊如故建輕舉矣或去或還如此三百餘年人皆不曉後不知所在韓衆苣勝廷瑞菖蒲總仙記樂子長齊人少好道入霍林山遇韓衆授以苣勝赤杯散服之年可八十歲色如少女後升仙補為修門郎郡閣雅談沈道士名廷瑞故吏部彬之子居玉笥山每遇深山古洞終日忘返一日辭道侣坐集仙亭上念人生幾何賦畢乃卒葬後越二年有閣皂山曾昭瑩於山門數里相遇其閣皂玉笥相去一百六十里曾問所往云暫到廬山尋知己且留詩一首為别云南北東西路人生會不無早曾依閣皂又却上元都雲片隨天闊泉聲落石孤何期早相遇藥共煮菖蒲曾歸玉笥話及方知師尸解矣俱鳳闒茸持滿侏儒北夢瑣言後唐同光中有狂生桑俱鳳闒茸垢膩不近人情神異不一至渚宫謁南平王一足草履一足麻鞋號為野人河東記唐汝陽王璡能劇飲術士葉法能過之王強以酒不可曰某有生徒酒量可與王敵明日使謁王詰旦有投刺者曰道士常持滿王遽引入形狀侏儒然神氣彩瑩音韻鏗然既坐善談胚腪王命飲道士欣然王以醇酒寫大斛中沃以巨觥王既醺然而道士風韻高爽良久忽謂王曰某止此一杯醉矣王強之道士曰王不知量有限乎何必強之復勸一杯忽然倒地視之乃一大酒榼耳受五斗焉瑶池白橘滄州碧棗神仙傳周穆王會西王母於瑶池食素蓬黑棗碧藕白橘桂陽雜編隋處士元藏幾為海使判官遇風船壞破木載至洲島人曰此乃滄洲去國千萬里花木常如二三月人多不死産分蒂瓜長二尺碧棗丹粒皆大如梨池中有四足金魚金蓮花婦人採為首飾曰不載金蓮花不得到仙家藏幾思中國洲人製凌風舸送之激水如箭旬日達東萊問其國乃唐也自大業至貞元二百年矣右英五芝鳳綱百草真誥右英夫人吟曰有心許斧子言當採五芝芝草必不得汝亦不能來廣記鳳綱者漢陽人嘗採百草花以水漬泥封之自正月始盡九月末止埋之百日絞煎丸之卒死者以此藥內口中皆立生也綱服藥數歲不老後入地肺山公成偃逸宋來灑掃真誥趙公成昔患腳疾不能步履心常默拜太上三十年精專不替感太上賜藥一劑服之即愈後得道今在鶴鳴山行道之時未嘗少忘此所謂內研太元偃逸神府者也又宋來子楚莊公時為市長常灑掃於市見一乞食翁歌於市云天庭發雙華山源障陰邪清晨按天馬來諸太真家歌此乞食於市人無有識者獨來子知之遂以師禮事之積三十年授來子以中仙之道今在中嶽方知乞食翁乃西嶽真人馮延壽也注云手為天馬鼻為山源宫嵩長生郭延不老抱朴子宫嵩有文才年數百歲色如童子遇仙人干吉得其書多論陰陽否泰之事有天道焉有地道焉有人道焉治國者用之以致太平治身者用之以保長生此其道也神仙傳東郭延者山陽人服靈飛散夜書在冥室中身皆生光又能遠望見平地數十里上小物知其采色天下當死者識與不識皆逆知之如其言在鄉里四五百歲不老一旦有數十人乘虎豹來迎比鄰盡見之辭别而去入崑崙山中祭女繡鳳志和雕鸞廣記蔡女仙襄陽人也幼而慧巧善刺繡鄰里稱之一日繡雙鳳方成五綵霞焕忽一老人詣門請觀為安眼眼成雙鳳翔舉而老叟同女子各乘鳳去即降襄陽山南之林後因號襄陽山為鳳林山置鳳林關乃敕其宅為鳳林靜真觀立女冠像又韓志和外國人入中國為衛士雕木為鸞鶴烏鵲之形置機棙于腹中發之則翔空百步之外又能作龍御牀履之則牙爪皆動夭矯如飛憲宗悅之甚厚賜而志和悉散與人後遁去不知所之欒巴破廟谷青發棺廣記欒巴時為成都功曹而太守問曰功曹有道可試之乎曰唯即時入壁冉冉如雲氣之狀已失巴所在後除郎官遷豫章太守其山有廟甚靈能使江船分風使帆巴至失神所在巴曰廟鬼詐矣遂破其廟鬼走化為書生往齊國而太守以女妻之巴往齊國見太守遂書符長嘯令書生出相見叱之化為狸即斬殺之列仙傳谷青成帝時侍郎也因病死而尸不冷入殯不釘至二年見青冠幘坐於縣門上家人迎之不下發棺無尸後入太白山人為之立祠而青時復往來於祠中梁伯求衛孝惠祠韓神仙傳孝武帝遣使者梁伯至山中求衛叔卿不見但見其子度世與之俱入太華山尋訪度世望見父與數人博戲於石上坐白玉牀度世問博者為誰曰洪崖先生許由巢父王子晉也曰我有仙方在所居柱下度世歸掘之得玉函封以飛仙之印乃五色雲母也度世服之仙去拾遺記漢孝惠帝時有道士韓稚解絶國人言有泥離國來朝人長四尺兩角如繭牙出於唇處於深穴其壽不可測帝使稚問之經見幾代答云五代事相承迭生迭死如飛塵細雨存沒不可論又記女媧及軒黃以來事了如在目稚以聞於帝帝嘆曰悠哉杳昧非通神達理難可語乎斯遠矣稚於斯退莫知所之帝使諸方士立仙館於長安北名曰祠韓若山脫屣任敦棄官廣託唐若山開元中出鎮潤州日與僚友賔客三五人整棹浮江將遊金山寺既及中流江霧晦冥咫尺不辨若山獨見老叟棹魚舟直抵舫側若山入魚舟中超然而去几案間得若山訣别之書又得遺表一紙其略云臣運屬休明纍叨榮爵夙悟升沉之理深知止足之規棲心玄關早得真訣黃金可作信淮南之昔言白日可延察真經之妙用既得之矣餘復何求是用揮手紅塵騰神碧落扶桑在望蓬島非遙遐瞻帝闕不勝犬馬戀軒之至明皇省表異之道學傳任敦字子尚永嘉初天下擾攘棄官南渡遂抗志俗外居於山林忽有一人長丈許敦問之此人自稱是阿那窟老君見使來問訊敦問老君常在何許答曰常在天上復遊世間又恆經過而去復有所止答云時往大治及仙圖中敦後逆知孫恩之禍乃尸解於木沼山稚川金闕公遠碧落本傳玉皇詔葛真人曰洪久傳心要善養胎真演神方治病於生靈述先典廣行於塵世陰功濟物密行齊真名係玉都身歸金闕可宜於三月三日寅時升車上天者本傳詔羅真人云公遠能除水怪救濟生靈馘崇驅邪召龍致雨有行藥瘥病之善有施符遣疾之功內修三一外養四生名著仙都身歸碧落可宜於正月十五曰午時駕赤龍車歸天者沈羲龍虎公陽鸞鶴抱朴子沈羲吳人也學道於蜀救人利物德感上帝一日出行塗中忽見青龍白虎車各一乘從者十數人皆朱衣仗節滿道問曰君見沈道士乎羲曰某是也吏曰子有功於民黃老君遣仙官來迎子為碧落侍郎於是升天西山記鍾離嘉字公陽許直君之甥也好處林巒許君愛其有授道之質遂付以祕訣令密修之許君上升告以沖升之日紫雲自天而下青鸞白鶴翔舞於庭仙童玉女下迎公陽白日上升帛公素書甘君仙藥神仙傳于君者因病癩數十年百藥不能愈忽見市中賣藥公姓帛因往問之云可救以素書二卷授之曰不但愈病而已當得長年于君再拜受之于君思得其意內以治身修性外以消災救疾無不愈者道成仙去西山記甘真君字伯武以孝行見推於鄉里仗劒隨許真君除妖其功居多許君授以祕訣而君潛匿形影人莫之測一日天際忽聞天樂之聲須臾祥雲綵霞暉映而君升天鄭公崑臺子廉魏閣青瑣進士牛益出都門息柳陰之下夢至高門大第吏云此羣玉宫也熟視乃故人吕臻吕曰吾掌此宫益見殿上有白玉牌朱篆蒙以絳紗大字云中州天仙籍其次皆名氏數千其中唯識數人吕及夷簡李迪余靖而已益問天仙之詳吕曰自有次序真命上非子可知益曰今世卿相率皆仙乎曰十中有七八益曰富公弼國之元老豈其仙也曰富公是崑臺真人壽九十三歲方還崑府益曰公今何職曰更三百年補地上主者益曰王者人是何官曰掌五嶽四瀆名山大川者也括異志衡嶽道士率子廉落魄嗜酒性獷戾易辱人以言人亦少與之接故以牛呼焉居山之魏閣禮部侍郎王公祐守潭州立夏將命祀祝融至衡嶽因訪所謂魏閣者及至則子廉方醉寢王公與語甚異之遂載與還郡日與之飲酒間辭歸山復止魏閣者一日忽謂人曰我將遠行當一别王公即日扁舟下潭來謁且曰將有所適王公留與之飲居二日辭歸至日以書别衡山觀主李公盥浴服飾焚香秉簡而蛻去聞者驚異李為買棺厚葬之殆半歲有衡嶽僧自京師至安上門外子廉來看京師云即途時蒙李觀主厚有行懷中出一書附僧為謝李發封乃真子廉書也人皆嘆王公之默識
