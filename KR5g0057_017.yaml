  text: 三洞羣仙録卷之十七設七
  hash: sha256:689bcc4fce709056db3c4ccd6e7c9d49e44a767fb44ea7abc4b6ba25d31c1fe0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_HFL_017-001a, image: hfl/0995/0995-048.png}
body:
  text: 正一道士陳葆光撰集田宣塊石羊愔片竹神仙傳田宣隱居鶴鳴山遇一白衣神人將一塊石與之曰吞此可以不飢宣食之自此得道入山不出續仙傳羊愔擢進士第除台州樂安令棄官入山遇一絳衣人自稱靈英引入洞中得靈芝服食曰爾有仙分復引見茅君君曰愔有仙骨未得飛升宜地上修煉遂引出愔自後絶食身輕抖擻骨節如片竹叩板之聲飲酒三升日行三百里剛稱天門誗號鬼谷王氏神仙傳王剛自稱天門子明補養之法著經云陽生於寅純木之精陰生於申純金之精以木投金無往不傷陰人用脂粉者法金之白也是以真人留心玄妙審其盛衰我行青龍彼行白虎也彼前朱雀我後玄武不死之道也天門子行此道壽一百八十歲顔如童子今升入玄洲為真人又王誗學道於老君入石梁山採藥服食顔如童子後遷鬼谷山自號鬼谷子時蘇秦張儀問學於先生誗曰聞道易修道難二子就學三年辭去君曰足下勤勞四馬功名赫然子不見河邊之木乎僕馬折其枝波浪漱其根此所居者然也子不見嵩山之柏乎華陰之桂乎葉干青雲而無斧鋸之患玄狐赤豹隱其下文鳥丹鳳棲其嶺比所居者然也悲夫二子輕喬松之永壽而貴一旦之浮華可惜哉南昌免官元瑜逃祿真誥郤南昌公先為北帝南朱陽天門靈關侯後又轉為高明司直昔坐與劉慶孫事免官今始當復職也晉隱逸傳郭瑀字元瑜少有超俗之操隱于臨松薤谷鑿石窟而居服柏實以輕身張天錫遣使者孟公明持節以蒲輪玄纁備禮召之公明至山瑀指翔鴻以示之曰此鳥安可籠哉遂深逃絶迹公明拘其門人瑀嘆曰吾逃祿非避罪也豈得隱居行義害及門人乃出而就召山叟書符道人畫簇傳奇高昱艤舟昭潭夜窺潭上三大芙蕖有三美女倨其上相謂曰昭潭無底橘洲浮信不虛語各謂言所好一曰習釋次曰習道次曰習儒又曰各算明日得食何物曰各從所好平旦果有一僧渡至中流而溺又有道士一儒生溺死不逾時而溺三子俄有舟載一叟云是祁陽山叟昱遂迷其事叟怒曰焉敢如此取丹筆書符命弟子捧入潭底若履平地睹大石穴有三白豬卧石上見符至化三白衣女曰啓天師容三日搬去叟怒曰明日須離此不然使六丁仗劒斬之明日黑雲風雨有三大魚沿流而去搜神記許懋吳人好黃白術一日遇一道人將一畫扇簇挂於壁上有藥爐童子在上道人呼童子而童子跪於爐前畫扇頻動爐火光炎少頃藥成道人曰黃白之術役天地之數非積功纍行不可求之遂告懋曰五十年後當於茅山相尋遂不知所在吳剛斫月蔡誕鋤芝酉陽雜俎舊傳月中有桂高百丈其下有斫之創痕即合其人姓吳名剛學仙有過或言月中桂即地影也空處即水影也本無物此理差近抱朴子蔡誕好道棄家入山不堪其苦而還欺其家人曰吾為地仙位卑為老君牧龍因羣仙博戲輸一五色班龍緣此被謫崑崙山藝鋤芝草君平卜筮望之巫醫仙傳拾遺嚴遵字君平蜀郡成都人也留情黃老博覽羣書常以卜筮為業與人子言依于孝與人弟言依于悌與人臣言依于忠遵之善屬文依老子莊生之旨著書十餘萬言名曰指歸後舉家升天宅舍亭臺亦隨飛去高士傳漢安丘望之字仲都長陵人少治老子恬靜不求進時號安丘丈人成帝聞名欲見之望之辭不肯見為巫醫於人間接輿木實仇公松脂列仙傳接輿楚人也好養生食草木之實遊峨嵋山世世人見之歷數百年劉向為之頌曰接輿樂道養性潛輝見諷仲尼諭以鳳衰納元以和存心以微高步靈嶽長嘯峨嵋又仇生不知何許人當湯時為木匠已三百年矣而色更壯人皆知其壽也咸共師之只見常食松脂而已噲參療鶴靈璝乘龜述異記噲參養母至孝有仙鶴中箭參收養療治瘡愈放之後鶴雌雄雙至夜𠾑明月珠為謝高道傳俞靈璝居衡山十餘年遇神人授以回風之術行之坐見天下事如視諸掌自晦不為異以驚俗而人莫知之常養一大龜謂之元龜廣四五尺見者懼之師一日乘此龜入九嶷山不出採樵者時或見之從善借馬朱沖還犢高道傳劉從善字順天祥符中師道士王太和於建隆觀至和三年正月仁宗不豫召從善於大慶殿奏章命執政代拜伏章訖執政問曰章達否曰章已達時仁宗仙仗已行數刻忽復精神明爽傳宣問葛將軍何神也從善對曰三天門下有神曰葛將軍復傳宣速令設位供養翌日聖體遂康諭左右曰朕昨夜至天門有葛將軍者云皇帝未合來急借馬遣回遂寤晉逸史朱沖字巨容少有至行間靜寡欲好學而貧常以耕藝為事鄰人失犢認沖犢以歸後得犢於林下大慚以犢還沖沖不受每聞詔書至輒逃入深山時人以為梁管之流董道畫床王遙作獄仙傳拾遺董仙道乞酒踏歌周遊天下大中年多在河中府市肆之人或董生醉宿其門傍者即賈市頓售人皆欽異仙道或徉狂自歌藕絲織得萬重羅仙道用心多或遇大雪以杖畫為床即寢於雪中人或問其寒否答曰深山松柏木不畏雪漫漫發言成章率多此類王氏神仙傳王遙字伯遼鄱陽人也頗能治病病無不愈亦不祭祀不用符水針藥其行治病但以八尺布敷地坐不飲不食須臾病愈便起去其有邪鬼作禍者遙畫地作獄因召呼之皆見其形物在獄中或狐狸鼉蛇之類也乃斬之或燔燒病者即愈王果厭塵元鑒絶俗王氏神仙傳王果楚之賢人也厭穢風塵臊羶名利隱遁山林靜退諸行一旦乘雲而去真境録唐威儀白先生名元鑒不詳其字西川成都人明皇幸蜀之年别制得度住上皇觀志在絶俗逍遙遐舉隨風冷然綿歷星紀相川陸所宜得前賢高蹈之躅至餘杭天柱觀止焉元和間遁化子明瓦金李脫石玉天師傳張慈字子明天師十六代孫也襲真人之法歲以三元傳度諸階祕籙有道術點瓦為金或投於水中而火起或化為瓦後解化而空中聞仙樂之聲野人間話漢州昌利山李真人諱脫自西周之初於此山中煉水玉及九華丹三往三反八百餘年人謂之李八百丹成塗石成玉變砂為珠至今因雨往往拾得五色真珠者後漢建武中餌藥騎龍上升煉丹之處依然存在其石壁藥氣所逼盡成金玉之色光彩異常有一方長尺餘似人腳迹後於是處起佛寺僧徒誕言是迦葉之迹年代深遠人皆傳之其實李脫真人煉水玉之處也元化叱鬼仙翁鞭巫高道傳道士張元化不知何許人一日有客召入酒肆元化辭以不飲與之茹葷又辭以佩法籙客稍怒元化熟視之知其非人也謂曰暫請歸願子少待即以劒而誘出郊叱使坐而戮之即鬼也朱髮藍面如五六歲小兒携其首以示人且曰此鬼輒欺吾故戮之以去民害丹臺新録仙翁葛元行過武康主人主人病劇令女巫下神神令公飲酒公不飲輒言語不遜公曰何敢爾即叱五伯捉曳出鞭脊不見人如有引之去至中庭已見抱木解衣但聞鞭聲舉身流血主人疾亦愈祖龍驅石玉女投壼述異記始皇作石橋海上欲觀日出有人驅石去不速神人鞭之流血今石橋色猶赤又真境録臨安洞霄宫路側石崖之上按記云秦始皇驅山嶽擬塞東海常役鬼兵來移此山山勢欲動忽有仙人來叱鬼直以身靠定使不前去至今崖上有肩帔簪冠印成深迹焉列仙傳東王父與玉女投壺每一投千二百島設有不入者天為𡄵呼監切噓笑也穆王八駿鄴令雙鳧本傳周穆王好神仙之道駕八駿之馬造于崑崙之山食王木之實謁西王母而得升天之訣後托身解化示民有終王氏神仙傳王喬漢明帝時為鄴縣令有神術每月朔望常詣京朝帝怪其來數而不見車騎密令太史伺之言臨至必有雙鳧從東南飛來於是俟鳧至舉網得之乃一對舄也蓋四年時所賜尚書履也太虛受印道全佩符仙傳拾遺程太虛者果州西充人潛心高靜居南岷山絶粒坐忘一夕迅風拔木雷電大雨庭前坎坎之地水猶沸涌以杖攪之得碧玉印兩組用之頗驗每歲遠近祈求或受符籙者詣其門以印印籙則受者愈加豐盛所得財利拯貧救乏無不稱嘆又尹道全者於衡山修洞真還神徹視之道兼佩五帝六甲左右靈飛之符天真降焉謂之曰夫白日升騰者當有其才而後成其道者漢武帝劉徹感降天真授五嶽真形靈飛十二事才得尸解之道而不得形骨俱飛汝受其一而明沖舉之望斯乃勤苦所資亦宿分所稟矣因問靈飛十二事曰靈飛昔金母所授欲使武帝安五嶽福萬民而卒不究無為之至化黷武窮兵殺傷流血自敗其福故不得如軒皇夏禹乘虬駕龍解形隱景斯為失矣周撫亭長丁度館主真誥南門亭長今用周撫代郤鑒一門有二亭長輒有四修門郎一天門凡八修門郎括異志慶曆中有朝士冒晨赴起居至通衢見美婦三十餘人靚粧麗服兩兩並馬而行若前導俄見丁觀文度擁徒按轡繼之而去朝士驚曰丁素儉約何姬侍之衆多邪有一人最後行朝士問曰觀文洎宅眷將遊何處對曰非也諸女仙迎芙蓉館主耳時丁巳在告頃之聞丁卒南極老人西河少女真誥注七聖元紀中赤君下教變迹作沙門與六弟子俱顯名姓者也又云在元氣為元君在元宫為元帥在南辰為南極老人在太虛為太虛真人在南嶽為赤松子此乃天帝四真人之師太一之友女仙傳西河少女者神仙伯山甫外甥也學道精思服食二百餘年容貌益少見其外甥年少多病與之藥時年已七十稍稍還少色如嬰兒漢遣使行經西河於城東見一女子笞一老翁頭髮皓白跪而受杖使者怪而問之答曰此妾兒也昔妾舅伯山甫得神仙之道愍妾多病以神藥授妾漸復少壯今此兒妾令服藥不肯致此衰老妾怒之故杖之爾使者問女及兒各年幾許女子答曰妾年二百三十歲矣姚坦銀花卭疏石乳丹臺新録姚坦字元泰晉襄公嘗屈膝北面稱師餐風味道彌歷年載一日弟子出見天雨銀花繽紛委地良久方消其日太素元君遣仙人下迎受書為玄洲真人蒞白水宫列仙傳卭疏者周封史也能行氣鍊形煮石髓而服之謂之石鍾乳至數百年往來太室中室中卧石床枕焉夏統風至劉慶雲舉晉逸史夏統字仲御會稽人時上巳洛中王公已下並至浮橋士女駢闐車服燭路統坐舟中不顧太尉賈充怪而問之統徐應之曰會稽夏仲御也充曰昔堯亦歌舜亦歌子與人歌而和之可乎統曰先公朝會萬國恩澤雲布聖化猶存百姓感詠遂作慕歌於是以足扣船引聲喉囀清激慷慨大風應至叱吒則雷電冥集長嘯則沙塵煙起諸公相顧曰若不遊洛安得見是人統歸會稽後不知所終吳天師玄綱論云或問古有神仙今胡為而不見答曰清濁殊流真凡異境安可得而見也又曰令威千載而暫歸混元至今而屢降何謂不復見乎又曰今仙者為誰乎答曰自唐已來可略而言之劉慶雲舉於蜀土韋俊龍騰于嵩陽道合蟬蛻于太一洞元骨飛于異方皇化却老齊一反真抱朴子皇化號靈子得還元却老之術其經云此術可以辟兵營衛家門保子宜孫人見則喜不見則思仰神明之心得百姓之意在人間五百餘年顔色愈少高道傳道士張契真字齊一錢塘人時忠懿王精崇道法每三八録齋俾綜其事太平興國中太宗建太一宫詔天下戒潔士以居之而契真與選召對禁中復稱旨已而上以道書魚魯未定詔兩街優學者刋正而師復與焉一日因就寢倣佛有朱衣吏持符而至曰奉命張某宜速淨穢往彼執事遲明召門人諭之曰吾且行矣子其志之泊然返真孟生魂魄王老精神真誥山世遠受孟先生法暮卧先讀黃庭經一過乃瞑使人魂魄自制練但行此道二十一年亦仙矣是為合萬過也得三過四過乃隹北嶽蔣夫人讀此經亦使人無病是不死之道也王氏神仙傳王老者不知何許人與封君達為友訪道名山遇神人告之曰子精神動天太上遣我來授子度世之訣然仙道不遠近取諸身無思無慮不吐不納真一充於內而長生飛升矣思慮營營勞汝之形太上綿綿若存用之不勤是真道矣言訖升天將符救友奉先會親仙傳拾遺穆將符好道不慕聲利與長安東肆姚生友善時往其家則飲酒話道彌日纍夕忽姚生暴卒舉家蒼惶使人奔訪將符際夜方至家號告之笑曰可救也遂解衣與姚同衾而卧戒令勿得驚呼待唤即應撤燭而寢中夜燭之姚已起坐矣曰適為黃衣使者追去頃間聞傳呼云太一有勑使追回自是姚生平復如初將符遁去不知所適又黃奉先濛陽人嘗入葛璝山遇道士教以變化之術同縣富人宋氏以女妻之宋親屬甚廣為奉先宴饌者逾月而未周一旦諸親戲謂奉先曰不知黃郎會親之席何如爾奉先遽答曰明日聊備酒饌望諸親皆至於是鄰觀賔客八十餘人來日詣其家奉先素未預備其日忽見庭宇嚴潔筵饌精豐陳設圖繪皆非西蜀所有無非珍異觀者駭目音樂徐張衆賔醉飫有欲逃席者出門見柱上二蛇賔客驚懼皆不敢出已而既為衆人所知不安栖止後移家入東川太華山微子合氣道真乘雲真誥微子乃張慶之女也微子在易遷宫中常服霧氣自云霧氣是山澤水火之精華金石之盈氣久服能散形影入空與雲氣合體也王氏神仙傳王道真漢時人得道居鬼谷山東古柏臺常有白雲出於臺中遠望如百尺樓道真常乘此雲遊戲山頂暮歸臺中白雲亦斂入此臺內即荆州北清溪鬼谷山也或謂此為陽臺非也尹失恃怙吳闕甘旨高道傳道士尹通字靈鑒博通經史常嗟幻化非固每仰天而嘆父母未之信迫以婚宦乃跪伏曰竊聞張真升天鎮南嗣美茅君得道太守投誠況高祖太極真人之遺德可無隆紹願從所志父母許之遂飄然而去及恃怙已失孝履既盡其希真守一之心與日俱往魏太武聞名尤欽奉焉古今詩話吳仁壁遊羅浮學老莊於張先生得其大旨辭歸謀入京取應先生曰觀子氣法可住此吾授子長生之道仁壁辭以老母闕甘旨俟名遂身退學亦未晚是年中第入浙謁錢武肅殊禮之辟入幕不就以詩謝之其略云弊貂不稱芙蓉幕衰朽仍慚玳瑁簪十里溪光一山月可堪從此負歸心武肅令撰羅城記不從武肅怒沉之於江吳人惜之建隆初寧昱等就羅浮設醮醮畢遊諸嵓洞至山頂見一石門有老叟衣孽蘿據門而坐昱問其由云是羅浮先生宅再問叟為誰云吳先生也名仁壁言訖户闔了無所見王廓酒醇允升橘美王氏神仙傳王廓咸通中自荆渚隨船將過洞庭風甚泊舟君山下與數人登岸而行忽聞酒香問諸同行者皆無所聞忽路側有洞穴遂入穴行數步窪穴中有酒味極醇美掬而飲之醄然似醉自此充悅無疾漸厭五穀乃入名山學道後看仙經云君山有天酒飲者升仙廓所遇即此酒也異人録陳允升入龍虎山天祐中人見於麻姑山計去家七十年矣顔貌如初刺史迎置郡中夜坐嘗曰豐城橘美頗思之允升少選携百枚至鄧郁觀烏商丘牧豕本傳鄧郁隱居𢖍山斷穀三十餘年夜誦太洞經上感南嶽魏夫人降告之曰君有仙分特來相訪一日忽見三青烏如鶴鼓舞飛鳴移時方去郁觀之謂弟子曰青烏既來朝會至矣遂解化神仙傳商丘子胥好牧豕常吹鐵笛年七十無妻子顔色不老邑人奇異之有道術人或問其要只曰食菖蒲飲水自然不飢如此年三百餘歲矣服閭黃瓜展公白李神仙傳服閭者不知何許人常止莒往來海邊諸祠中忽有三仙人於祠中博戲賭瓜雇閭擔黃白瓜數十顆教令瞑目及覺乃在方丈山蓬萊之南真誥昔高辛時有仙人展上公者於茅山伏龍地植李彌滿其地展公今為九宫內右司保其常向人説昔住華陽下食白李味甚美憶之未久而忽已三千年矣三洞羣仙録卷之十七
