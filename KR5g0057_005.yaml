front:
  text: 三洞羣仙録卷之五筵五
  hash: sha256:6910ab58013223a96e8228fb057c897a368e2f1dd7927d2f399d3a27104c6bbb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_HFL_005-001a, image: hfl/0992/0992-176.png}
body:
  text: 正一道士陳葆光撰集善俊烏龍叔卿白鵠高道傳道士韋善俊訪道周遊名山遇神仙授三皇檄召之文得神仙之道常擕一黑犬號曰烏龍所至之處必分食以飼之一日將遊少林寺僧方齋善俊乃牽犬於其側分齋食以飼焉僧曰人未食而食犬可乎曰吾過矣乃謝之尋出寺去衆望之師行愈遠而犬愈大遂化為烏龍師乘之而去神仙傳衛叔卿服雲母得仙漢儀鳳二年八月壬辰孝武帝殿上見一人乘雲車駕白鵠集於殿前帝驚問為誰答曰我中山衛叔卿也帝曰子乃朕之臣也可前共語叔卿本意謁帝謂帝好道見之必加優禮而帝今云是朕臣也於是大失望默然不應忽不知所在帝甚悔焉葛象貨藥季主賣卜續仙傳羅萬象不知何許人也久居王屋山後南遊羅浮嘆曰此山朱明之洞天葛稚川曾棲此雖無鄧岱相留聯自駐矣乃結菴而隱或遊城市貨藥飲酒往來無定忽一膳則數人之食不謂之多或不食則莫知歲月日可行三四百里後不復出丹臺新録司馬季主賣卜於長安宋忠賈誼俱出休沐往見之季主趣向高妙忠等忽自失茫然無色悵然噤口不能言於是攝衣而起再拜而辭出市門僅能上車伏軾低頭卒不能出氣居三日忠見賈誼殿門外語曰道高益安勢高益危居赫赫之勢失身且有日矣景閑碎釜趙明燃屋仙傳拾遺泰景閑不知何許人也會昌中寓止會稽市不常其居或飲酒佯狂凡十年好事者稍疑其異會稽張公家每加欽禮焉忽一旦取秤鎚手挼良久引之如餳取鐵杵摶之為餅良久皆復如故張素貧景閑曰我將去矣命張取釜擊碎之以炭相雜壘於鑪内熾火加藥闔户告張曰炭火息後可取所化之物以豐爾家念道濟人可以世享其富矣翌日張視之皆紫金也抱朴子趙明左慈皆以氣禁水水為之逆流又於茆屋上燃火煑鷄鷄熟而茆屋不燃禁水著中庭大寒露之不氷禁一里中使灼者不熱秦避桃源田居柳谷桃源記晉太康中武陵漁人黄道真泛舟自沅泝流而入見山中桃花夾岸落英繽紛覩一石洞涓流中吐寒聲漱玉居室蟬聯池亭連貫雖男冠女服略同於外然所服鮮潔顔色燦然見道真甚悦遞邀至家為具酒食問今所歷代道真具以實告衆皆感歎曰何人世之多遷貿也道真辭出他日復尋花源之路乃迷不復見矣真誥雷平山之北昔名柳谷有田公者來居此其北有柳汧水或名為田公泉云此水是玉砂之流津服之除腹中三蟲矣緱姑青鳥女真白猿墉城記緱仙姑長沙人入道居衡山年八十餘容色甚少於魏夫人仙壇精修香火子然無侣數年復有青鳥形如鳩鴿紅頂長尾飛來居所自語云我南嶽夫人使也以姑修道精苦獨棲窮林命我為伴又曰西王母姓緱乃姑之祖也河南緱氏乃王母修道之故山也每有人遊山必青鳥預説其姓名後知四海多難乃隱九嶷山仙傳拾遺薛女真者不知何許人也晉時世弊京師不寧有道之者多棲寓山林以避世因居衡嶽尋真臺外示同凡内修真道出行常有黄鳥白猿白豹隨之後乃昇天聶論宗性張講還元神仙傳五代聶鍊師名紹元築室於問政山不偶世俗自號無名子嘗撰宗性論修真祕訣徐鍇甚稱賞曰吴筠施肩吾無以過焉高道傳道士張無夢號鴻濛子嘗遊天台登赤城廬於瓊臺行赤松導引安期還丹之法真宗召對講易即説謙卦上問曰獨説謙卦何也曰方大有之時宜守之以謙復命講還元篇無夢曰國猶身也心無為則氣和和則萬神結矣心有為則氣亂亂則英幸散矣此還元之大旨也上説其説錫賚處士先生號洞賔蓬島景世雲軿丹訣吕洞賔舉進士兩至禮部皆不利曰既不利人間舉當修天上舉唐末因遊廬山遇鍾離先生得其道每持惜氣貨筆墨往來京畿衡嶽之間人多不識其洞賔也而先生授以祕訣云三花和會化火龍直出昏衢千日功成驂鶴駕先歸蓬島真誥灊山有學道者鄭景世張重幸晉初受仙人孟德然口訣以入山行守五藏合日法兼服胡麻及仙丹久久不復飲食而身體輕强反易故形忽一日北方老君遣太一迎以雲軿白日昇天房逄西白徐遇東專實賔録唐房山長陰符大册經序曰子少好學道而慕長生見陰符言上有神仙抱一之道後人只究以安邦治國之法鮮知神仙至樂之術貞觀三年予遊泰山遂逢一老自稱西白不知其姓因話陰符全在神仙大丹之極要世莫能知遂傳以驪山母所注即神仙抱一之道見焉神仙傳徐定辭蓬州人咸平中隸役于郡國輦帛入關宿華陰客邸遇夜有書生自稱東專者揖定辭而坐相得甚懽留飲浹日及告行書生曰吾陳摶也以君非凡骨故得邂逅于此定辭喜懼因懇求異術曰術不貴異但嗇精神不以好惡内傷甚善於是袖出藥一刀圭曰君餌此當壽百歲翌日訪之不復見其後亦尸解矣契虚三彭上元五性宣望志契虚者神骨孤秀居長安佛寺避禄山入太白山忽遇至人勸遊稚川府居一日登山頂見有城邑宫闕殿上有具簪冕者貌甚偉憑玉几而坐侍衛環列問曰子絶三彭之仇乎契虚無以對曰慎不可留乃引去契虚後遁去不知所之稚川則葛真人也漢武内傳上元夫人謂帝曰汝好道乎數召方士登山祠神亦為勤矣然汝胎性暴胎性淫胎性奢胎性酷胎性賊五者常舍汝榮衛之中五臟之内若從今捨爾五性反諸柔善常為陰德救濟死厄不泄精液齋戒勤儉鳴天鼓飲玉漿蕩華池叩金梁按而行之當有異耳郄鑒司直吕誨糾正列仙傳郄鑒初同周撫為南門亭長今遷北帝靈關侯再遷高明司直之任高明之任如世之尚書僕射翰府名談吕誨獻可以言事出安州一日獨坐小軒因合目即有所見一碧衣童子云玉帝南遊炎洲君子隨行紏正羣仙自此口食天厨身遊紫府炎洲苦熱上帝賜汝清凉丹一粒公拜賜而咽之下喉若冰雪公自知不久於世有朱明復者湘江道中有金甲吏兵戴百人公跨玉角青鹿明復拜曰公其仙乎笑而不答口占詩曰功行偶然書玉闕衣冠無限葬塵埃我今從帝為司紏更有何人直拍臺季偉定録思和保命茅君記茅中君諱固字季偉舉賢良方正累遷金吾聞兄大茅君得道遂棄官入山遇兄引見西城王君得仙補定録真人又小茅君諱衷字思和累遷五更大夫同中君入山尋司命君君引見龜山王母授道要補保命真人大茅君告曰吾今既去便有職任不可數相往來每年三月十八十二月初二日邀師命友下臨句曲若有學仙好善男子至其日詣山吾因料理必相教誨於未悟者今茅山朝山之會自兹始也董重復活甘始治病真誥董君臨淮人行氣鍊丹百餘歲不老一日因事繫入獄中佯死臭爛生蟲舁至家復活後遂成仙又甘始太原人善行氣不飲食依容成子得元素之法用之有効治病不用針灸湯藥在人間百餘年後入王屋山昇仙青州從事紫府真人西山記黃真君諱仁覽字紫庭其先武陵人力學有聞後棄官入道紫庭師事許君得其道尚為青州從事紫庭道成從許真君飛昇青瑣高議右侍禁孫勉為元城埽官岸多墊陷埽卒曰有巨黿穴其下天晴輙出勉伺其出引矢射之正中其頸勉晝夢一吏召曰子殺黿今召子證隨至一宫闕吏曰紫府真人宫也勉曰真人何姓氏曰韓魏公也勉思念向蒙公提拂見當求助入望公坐殿上侍立皆碧衣童子勉再拜乞真人大庇公顧左右取青囊中黄誥童讀誥曰五百世方比人身之貴穴殘埽岸事乃勉職也公命遣去王暉虎耕陸羽鳥耘高道傳道士王暉居華嶽熊牢嶺洞真觀常種黄精於谿側則虎豹為之耕耘出入亦乘虎豹具鞭策如人乘馬無異著祕訣以教人修養其事隱而人莫之曉唐逸史陸羽不知所生有僧得之於水濱及長成聦慧能文以易筮之得漸卦取鴻漸于陸為姓名隱於苕溪自號桑苧翁閉門著書或時行歌于野吟詩擊木故時人謂之今接輿羽嗜茶箸茶經人以為茶神又云陸羽象耕而鳥耘仙柯給炭宣平負薪仙傳拾遺王仙柯青城橫源人好行仁惠家富巨萬所居之側山頗宜薪炭忽聞盗斫柴者仙柯因檢行見乃一道士爾曰某於谷中燒鍊丹藥每為闕炭因竊此柴燒之仙柯問其所用幾何可以并為致之不煩自致也道士忻然謝曰藥成後必當奉報如是仙柯時往訪之一旦藥已成矣自此為别也留丹數粒而去仙柯服丹自覺氣逸身輕門側有大柏樹騰身而舉已往木杪因此飛昇而去廣記許宣平新安歙人也景雲年中隱於城陽山南塢或負薪以賣毎醉吟曰負薪朝出賣沽酒日西歸路人莫問歸何處穿白雲行入翠微費公石墨耿女雪銀茅山記費長房遇壺公得其術書符行於世寓茅山之東書符救人有功一日出山傾硯水於石澗中其石變黑因號為石墨至今取其墨亦可書符女仙傳女冠耿先生者耿謙之女嘗因大雪令宫妓以金盤貯雪搦為銀錠投洪鑪中須臾成金指痕猶在又異人録云先生取雪實之削如銀鋌投熾炭中及冷爛然為鋌銀矣虚寂馬鳴大亮牛喘高道傳舒虚寂字得真居新繁銅馬觀常與人言昔黄帝與甯先生天真皇人衆真會於此號其地為三會臺有銅馬隱於林間今龍橋乃其舊迹後人於銅馬隱處築臺以誌之秋夕澄霽忽銅馬騰躍嘶鳴見之者得道虚寂居此三十年幸一見之一日忽謂鄰母曰旦夕將他適欲以後事為託因指示其地囑曰瘞我於此當深三尺餘吾必有厚報是夕卒鄰母如其言而瘞之果得金一鎰以聞官驗所瘞但杖屢而已仙傳拾遺馮大亮家貧好道亦無所習每遇道士及方術之人經過其門必留連延接唯一牛拽歩磨以自給一旦牛死其妻楊氏對泣傷嘆曰衣食所給在此一牛耳牛既死何以資其口食乎時慈母山道士每過其家來即憇歇累日時道士果來夫婦以此語之道士曰皮角在乎曰在即取攣綴如牛形以木為脚以繩繫其口驅叱遂起肥徤如常道士亦不復見數年盛暑牛喘甚急牧童見之私解其口遽成皮骨而已太和鶴駕法善龍輦王氏神仙傳真人王君好道與妻俱入山絶人事香火精勤積數十年遇神人授以素書且告之曰爾仙名已定但奉行此道子必為真人矣後一日上帝遣龍車鶴駕下迎白日上昇補為太和真人高道傳葉法善天師時居四明忽見一老叟號泣求救師問之答曰某東海龍王也太帝敕主八海之寳近緣婆羅門逞幻術晨夕禁呪五月五日海水將竭夫統天鎮海之寳上帝制靈之物必為所取至日乞以丹符相救師即為飛符海水仍舊異日龍輦寳貨為謝師不受謂龍曰巖石之上去水且遠若致一清泉即佳也是夕聞風雨瀟瀟之聲達旦繞山齋石渠泉水環流至今目之為天師渠玉札賢安金書妙典廣記魏夫人名幸存字賢安晉文康公舒之女也幼而學道九經書史無不該覽年十五慕神仙吐納不辭勤苦至二十父母强令適劉乂為妻生二子夫人訓誨二子成立遂告别寢修鍊勤至感太極真人及方諸青童君等降謂夫人曰太上已注子之仙名於玉札矣子其勉哉又魯妙典者九嶷山女冠也生而敏慧及笄遇人授黃庭經而告之曰此經扶桑大帝宫中金書誦詠萬遍得為神仙但在勤心爾經云誦之萬遍昇三天千災已消萬病痊居山誦此如與千人同侣惟患人不能修妙典遂入九嶷山誦經十年真仙下降白日昇天至今仙壇石上履迹存焉老叟蒸兒孺子烹犬神仙傳維陽十友者家富足拉為道友遞以酒食為娱常有一老叟弊衣繿縷每造其席衆亦不拒一日酒酣謂衆曰某雖貧乏欲具一會奉酬可乎衆皆唯明日乃延入一茅舍中丐者數輩相邀環坐乃舁一巨板以油幕之揭視即爛蒸小兒衆深惡之皆不食叟曰此千歲人參也頗不易得欲以此報既不食命也各自分食乃昇天而去高道傳朱孺子師道士王元正居大箬巖一日溪側見二小花犬異而逐之入枸杞叢下因與師掘杞叢得二枸杞根壯如犬師令烹之孺子看火三日因先嘗味又見根爛乃食之孺子忽出覺身輕飛於峯上雲氣擁之而去元正食其餘亦得不死今謂之童子峯高閬笑蟹曹操驚鱸括異志高閬得養生術飲酒至數斗不亂申郎中為江東漕每按部必拉之同行嘗艤舟貴池亭有九華李山人者與高友舊因謁申延之使飲各盡二斗餘殊無醉態高取釣竿曰各釣一魚以資語笑然不得取蟹乃鈎餌投坐前甓鏬中俄頃李引一蟹出高笑曰始釣魚令得蟹可罰也後漢隱逸傳左慈字元放嘗在司空曹操坐操從容顧衆賔曰今日高會珍羞略備所少吴松江鱸魚耳元放於下坐應之曰此可得也因求銅盤貯水以竹竿餌釣於盤中須臾引一鱸魚出操與會者皆驚操曰一魚不周坐度可更得乎元放乃更餌釣沉之須臾復引皆長三尺餘生鮮可愛操使目前鱠之周浹會者馮良棄世杜契隱居真誥馮良為縣吏自恥無志毁車殺牛裂敗衣幘學道術抗志嚴恪州郡禮辟不就朝廷聞三公争讓位於良不就後漢時人也六十七歲遂棄世東渡入茅山今在鹿跡洞中又杜契建安初渡江依孫策入會稽為孫權校尉黄武二十年遇介先生授以守元白之術遂隱居大茅之東能隱形亦數見身出或採伐貿易衣粮而人不知泰宜寳洞元真仙墟丹臺新録周亮字泰宜師姚坦得其術人有能飛沙走石一切妖魅事亮即持經誦呪邪物各復其形或死於左右常與神仙遊行寳洞嘯詠終日廣記薛元真少好道時棲五嶺謂人曰九嶷五嶺神仙之墟山水幽奇煙霞勝異如陽朔之峯巒挺拔博羅之洞府清虚不可忘也所以祝融棲神於衡阜虞舜登仙於蒼梧赫胥燿跡於灊峯黄帝飛輪於鼎湖其餘高仙列真神人輔相騰翥逍遥者其故何哉山幽而靈水深而清松竹交映雲蘿杳冥固非凡骨塵心之所愛也况邃洞之中别開天地瓊漿滴乳靈草秀芝豈塵目能窺凡屣所履矣得延年之道而優游其地信為樂哉世雲羽扇玄同飊車高道傳吴猛字世雲自鍾陵還欲濟大江遇飄風怒濤遂以白羽扇畫水而渡衆皆異之集仙録薛玄同號玄同子誦黄庭經不替遇神仙下降告之曰子誦黄庭有功地司累奏簡在紫虚之府因授口訣至咸通間紫虚元君降授九幸之丹曰服此當遣飊車迎汝歸嵩山矣是夕解化無尸表奏僖宗異之成連刺船顓和擊石樂府解題水仙操伯牙學琴於成連先生云吾師方子春在東海中能移人精迺與伯牙俱往至蓬萊山留伯牙曰吾將迎師刺船而去旬日不返伯邪但聞水聲澒洞山林杳冥羣鳥悲號歎曰先生將移我精援琴而歌頓悟妙旨成連刺船迎之伯牙遂妙天下女仙傳太元女姓顓名和自少行道能開關鑰指山山傾指木木倒常將弟子行山日暮以杖擊石石為之開便覩門户牀帳酒肴之物如此萬里須臾之間老少無常後入抱犢山昇天崇子致譽奉林閉息真誥東卿君曰昔有郭崇子與弟兄四人俱為惡人所擊傷其臂三弟大怒欲治之崇子曰無用怒乃遣去此人後出仕宦而崇子致譽數數非一此人往謝之而猶譽不止其人曰我惡人也不可以受君之施遂自殺崇子後得道而太極真人以崇子有殺人之過不得為真人上仙耳又東卿君曰劉奉林學道於嵩山積四百年三合神丹而為邪物所敗乃徙入委羽山閉氣不息於今千餘年矣猶未昇仙云此人但得不死未能有所役使通和青紫清虚黄赤高道傳賀知章為祕書監開元中遇通和先生授以丹告之曰先盟而後授然仙家品秩如青紫階級不可驟進必以退節為首退節則寡欲寡欲則神逸神逸則無為無不為反此而求道猶却馬以追奔子其志之知章後棄官乞為道士真誥清虚真人告楊君曰夫黃赤之道混氣之法是張陵授世人種子之術耳非真人事也吾數見行此而絶種未見種子而得生夫存心色觀兼行上道所謂抱玉赴火金棺葬狗也夫色觀謂之黄赤上道謂之隱書涓子玉函公弼石壁蘇林傳涓子者古之神仙也昔撫綸於河上遇東海小童君告之曰子勤心至道外假弋釣餌而不釣養生之全也若獲鯉魚試剖之言訖而去涓子果獲一鯉剖之腹中得一青玉函開視乃金闕帝君所受三元真一之法涓子從而修之能興雲致雨乘虚上霄高道傳張公弼不知何許人劉法師居雲臺鍊氣二十餘年每三元常見赴會無言而去師因問之則答曰公弼住蓮華峯下師與之同往至一所見石壁高直千尋公弼叩之劃開内有天地森羅萬象張公語其徒曰法師在此可具食作戲與師觀其徒噀水俄見蒼龍白象各一對舞舞甚妙丹鳳青鸞各一對歌歌甚清仍與法師水一盂刀圭粉和之令飲其味甘且香有頃公弼與法師别出反顧但見石壁而已三洞羣仙緑卷之五
