front:
  text: 三洞羣仙録卷之一
  hash: sha256:8c52ac0995825975a9bc36579b51851a33e2800dfd8196faa56cb749d1b23049
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_HFL_001-001a, image: hfl/0992/0992-014.png}
body:
  text: 正一道士陳葆光撰集盤古物祖黃帝道宗述異記盤古氏天地萬物之祖也其沒也頭為五嶽目為日月脂膏為江海毫髮為草木一云頭為東嶽腹為中嶽左臂為南嶽右臂為北嶽足為西嶽泣為江河氣為風雷喜為晴怒為陰又徐整三五曆記云天地渾沌如雞子盤古在其中萬八千歲天地開闢陽清為天陰濁為地盤古在其中一日九變神於天聖於地天日高一丈地日厚一丈盤古日長一丈如此萬八千歲天數極深地數極厚盤古極長後乃有三皇數起於一立於三成於五盛於七處於九故天去地九萬里又真書曰二儀未分溟涬洪濛未有成形日月未具狀如雞子渾沌玄黃已有盤古真人天地之精自號元始天王道學傳黃帝少典之子姓公孫號常鴻氏一號歸藏氏又有縉雲之瑞亦號縉雲氏赤多白少曰縉又有土德之瑞故號曰黃帝弱而能言聖而預知好道希妙故為道家之宗也少昊歌瑟顓帝錫鍾拾遺記少昊以金德王天下皇娥處璇宫而夜織或乘桴木而晝遊經歷窮桑滄茫之浦時有神童容貌絶俗稱為白帝之子即太白精降乎水際與皇娥宴戲又云西海之濱有孤桑之木直上千尋葉紅椹紫萬歲一實食之後天而老帝子興皇娥泛於海上帝子與皇娥並坐撫桐峰紫瑟皇娥倚瑟而清歌曰天清地曠浩茫茫萬象回薄化無方浛天蕩蕩望滄滄乘桴輕漾著日傍當期何所至窮桑心知和樂悅未央白帝子答歌曰四維八埏眇難極驅光逐影窮水域璇宫夜靜當軒織桐峰之梓千尋直伐梓作器成琴瑟清歌流暢樂難極滄湄海浦來棲息及皇娥生少昊號曰窮桑氏亦曰桑丘氏又顓帝高陽氏黃帝孫昌意子昌意出河濱遇黑龍負元玉圖時有一老叟謂昌意云生子必叶水德而王至十年顓帝生手有文如龍亦有玉圖之象其夜昌意仰視天北辰下化為老叟及帝即位奇祥衆祉莫不總集不禀正朔者越山航海而皆至也帝乃揖四方之靈羣后執圭以禮百辟各有班序受文德者錫以鐘磬受武德者錫以干戈有浮金之鐘沉羽之磬以羽毛拂之聲振百里唐堯鳴鸜夏禹乘龍拾遺記唐堯在位聖德光洽河洛之濱得玉版方赤圖天地之形又獲金璧之瑞文字炳烈記天地造化之始四凶既誅善人來服分職設官彝倫條叙乃命大禹疏川潴澤有吳之鄉有北之地無有妖災沉翔之類自相馴擾幽州之墟羽山之北有善鳴之禽其聲似鐘磬笙竽也世語青鸜鳴時太平又南潯之國有洞穴陰源其下通地脉中有毛龍時蛻骨於曠澤之中魚龍同穴而處其國獻毛龍一雌一雄放置豢龍之宫至夏代豢龍不絶因以命族至禹導百川乘此龍及四海攸同乃放河汭伯陽帝師仲尼真公廣記老子名耳字伯陽楚國苦縣曲仁里人也其母感木流星而有娠或云老子先天地而生或云天之精魂蓋神靈之屬剖母左腋而生生而白首故謂之老子伏羲時出為師號元化子教示伏羲推舊法演陰陽正八方定八卦神農時出為師號大成子教神農嘗百草種五穀與民播殖祝融時出為師號廣成子教修三綱齊七政黃帝時出為師號力牧子消息陰陽作道誡經以至少皥高辛堯舜禹湯老君皆出為帝師各有其號各傳其經各授其道千變萬化不可窮詰昭王時出開化導西胡至幽王時却還中夏故孔子適周而問乎禮曰吾今日見老子其猶龍乎老子知禮樂之原則道德之歸真吾師也史記丘云字仲尼姓孔氏拾遺記孔子生之夜有二蒼龍自天而下有二神女擎香露於空中以沐浴徵在天帝下奏鈞天之樂有五老列於庭則五星之精也先是有麟吐玉書於闕里人家云水精之子系表周而素王故二龍繞室五星降庭徵在以繡衣繫麟角及夫子將終乃抱麟解紱而泣丹臺新録云孔子為太極上真公治九嶷山傅說比星鄒屠夢日莊子曰傅說得之以相武丁奄有天下乘東維騎箕尾而比於列星拾遺記帝嚳之妃鄒屠氏之女也黃帝去蚩尤之凶遷其民善者於鄒屠之地遷惡者於有北之鄉其先以地命族分為鄒氏屠氏女行不踐地常履風雲游於伊洛帝乃期焉納以為妃妃常夢吞日則生一子凡經八夢則生八子世謂為八神亦謂八翌翌明也亦謂八英亦謂八力其神力英明翌成萬象億兆流其神睿焉公孫撫琴師延吹律晋逸史公孫鳳隱于九域山冬則單衣寢處土床夏則并食於器令臭然後食之每撫琴吟詠陶然自得人皆異之拾遺記師延者啇之樂人師延精述陰陽曉明象緯莫測其為人總修三皇五帝之樂撫一絃琴則地祇皆升吹玉律則天神俱降黃帝時已數百歲又能奏清商流滌角之音迷魂淫魄之曲子房萬户涉正一室列仙傳張良字子房佐漢高祖功成乃曰余以三寸舌為帝者師封萬户位列侯此布衣之極於良足矣願棄人間事欲從赤松子游耳神仙傳涉正巴東人說秦始皇時事了了若親見嘗閉目行弟子隨之數十年莫有見其開目者有人固請之正乃開目有光如電照耀一室李八百呼為千歲小兒馬底肥遁昭微隱逸仙傳拾遺馬底子者不知何許人與何丹陽隱居蜀鶴鳴山修八道望雲之法肥遁歷年後於洞府探石函得黃帝金鼎之訣鍊丹於山上丹成服之升天本傳隋李昭微志好隱逸慕葛洪之為人為師訪道不遠千里為高唐尉大業中將妻子隱於嵩山時號黃冠子簡狄聖子蘭公仙王王子年拾遺商之始也有神女簡狄游於桑野見黑鳥遺𡖉於地有五色文作八百字簡狄拾之貯於玉笥覆以朱紱夜夢神女謂之曰爾懷此𡖉即生聖子以繼金德狄乃懷𡖉一年而有娠經十四月而生契祚以八百叶𡖉之文也雖遭旱厄後嗣興焉廣記蘭公兖州人家有百餘口精專孝行感動神明一日遇月中真人下降其室自稱孝悌明王云子居日中為仙王居月中為明王居人間為孝悌王夫孝至於天日月為之明孝至於地萬物為之生孝至於民王道為之成且三才肇分始於三氣三氣者乃玉清三天也吾於上清托化人間示陳孝悌之教晋有許真人傳吾孝道之宗得為衆仙之長今授汝祕旨言訖而不見蘭公頓悟真機道成白日升騰虞舜玉琯漢武錦囊廣記虞舜即位西王母遣使授舜白玉環又授以益地之圖遂廣黃帝九州為十二州王母又遣使獻舜白玉琯吹之以和八風漢武內傳武帝見西王母巾箱中有一卷小書盛以紫錦囊帝見瞻覽母曰此五嶽真形圖也昨青城諸仙就我請求乃三天太上所出其文祕禁豈汝穢質所宜佩乎子恭祕術長桑禁方賢己集杜子恭有祕術嘗就人借瓜刀其主求之子恭曰當即相還耳既而刀主行至嘉興有魚躍入船中破魚得瓜刀其為神效往往如此史記扁鵲者渤海郡鄭人也姓秦氏名越人少時為入舍長舍客長桑君過扁鵲獨奇之常謹遇之長桑君亦知扁鵲非常人也出入十餘年乃呼扁鵲私坐間與語曰我有禁方年老欲傳與公公毋泄扁鵲曰敬諾乃出懷中藥子扁鵲曰飲是以上池之水三十日當知物矣乃悉以其禁方書盡與扁鵲忽然不見殆非人也扁鵲以其言飲藥三十日視見垣一方人以此視病盡見五藏癥結特以𧦽胍為名耳竇遷金液嵩叟玉漿神仙傳竇遷者扶風人也當西晋懷愍之時王室寖微中原振擾年將筮仕痛此亂離遂慕羡門松喬之跡奇峯邃洞靡不栖託凝思至道纍經試難一夕神光照室異香滿谷天樂漸近侍官數百有一真仙項佩圓明乘車而下二女扶翊羣官後從年三十餘虬髯鶴質自稱平都山陰長生也愍以勤苦授金液九丹之訣盟傳告誓禮畢而去廣記嵩叟嵩山老叟也晉人因墮嵩山洞穴中巡穴而行見穴中一物如青泥叟食之不飢遂巡穴出忽到家問張華曰此乃洞府也所食者玉漿也子其仙乎惠超拔俗元素遁跡仙傳拾遺唐胡惠超拔俗有道之士也處衆人中則頭出衆人之上雖至長者才及其肩時人謂之胡長仙善能役使鬼神宣室志昭慶民駱元素為小吏一日遁跡而去令怒分捕甚急遂匿身山中忽遇一老翁策杖立於長松之下召素訊之曰爾安得至此耶素以實對望翁見容引元素入深山僅行十餘里見二茅齊前臨積水珍木奇花羅列左右侍童二人年甚少居于西齊其東齊有一藥竈命元素候火老翁自稱東真以藥數粒令素餌之且曰可以療飢矣自是元素絶粒僅歲餘授以符術及吸氣之法盡得其妙一日謂素曰子可歸矣既而送元素至縣南數十里執手而别元素自此以符術聞里中神效不可具紀知古金魚安期玉舄高道傳道士劉知古字光元睿宗召見問道家稱旨特加崇錫開元中天災流行疾疫者十有八九上召知古治之乃歎曰大德曰生至人亦病下法鍊藥上醫察聲至於針艾不其遠矣遂以色代脉用氣蠲痾故能膏育河决腠理雪散其精妙至如此上寵錫皆不受東陽山下有古觀因葺而居之忽室中有光産丹芝一莖扣之有金玉聲夢神人謂曰後山壁中有金魚跨之可以冲天非此芝扣石不可致遲明訪金魚茫然不知其所是夕復夢曰滴泉之下是也既至以芝扣如風雷之震巨石迸裂得金魚長三尺許乘之飛空雲霧旋擁而去列仙傳安期先生者琅瑘阜鄉人也賣藥海邊時人皆言千歲秦始皇請見之與語賜金璧數千萬出於阜鄉亭置去留書以赤玉舄為報曰千歲求我於蓬萊山下壽光少容玉真美色神仙傳靈壽光年七十餘遇異人得服食之訣顔容更少如二十許人至建安元年已二百餘歲解化殯之開棺無尸唯一履存焉又玉真年七十九歲方知學道得胎息之法斷穀三十餘年肉少而色美行及奔馬武帝召見如二十許人問其里人皆言四百餘歲帝奉之如神辭歸日行三百里景純無成子年略得列仙傳郭璞字景純又西山記云真君許遜見晉室衰亂干戈屢起思有以弭其未然乃與吳君往諸王敦時郭璞先在敦府與之有舊乃俱見敦敦謂真君曰子夢以木破天先生其占之先生曰木上破天未字也公未可妄動乎敦復令郭璞筮之璞曰無成敦不悅曰子壽幾何璞曰公若舉事禍將不久若還武昌壽不可測敦大怒曰君壽幾何璞曰壽盡今日日中敦令武士擒璞將殺之真君以酒杯擲起化為白鴿飛繞梁上敦方舉首已失二君所在矣後敦竟不免晉書王嘉字子年不食五穀不衣美麗不與世人交游隱于東陽谷人侯之者至心則見或不至心則隱形不見姚萇欲殺符堅問嘉嘉曰略得之萇怒曰得當云得何略之有遂斬之先此釋道安謂嘉曰世故方殷可以行矣嘉曰卿其先行吾負債未果去俄而道安亡至是而嘉戮死至萇子興字子略方殺堅略得之謂也嘉之死日人有隴上見之范飲桂水張賜腴膏列仙傳范蠡字少伯徐州人也事周師太公好服桂飲水為越大夫勾踐破吳後乘輕舟入海變姓名又適齊為鴟夷子皮後百餘年見於陶居纍億萬號陶朱公後棄之蘭陵賣藥後人世世見識之仙傳拾遺張雲靈修道於南嶽招仙觀精思感通天降真密授其內養元和默朝大帝之道行之十三年神遊大無面朝皇極大帝賜以瓊腴琅膏混神合景之液受而服之變化恍惚神用無方建興元年九月三日升天靈簫握棗王粲得桃真誥九華真妃字靈簫時同紫陽夫人降楊真人之室夫人問楊曰世上曾見此人否楊曰靈尊高秀無以為喻夫人大笑妃握棗三枚令人各食之真妃曰君師南嶽夫人司命秉權道高妙備實良德之宗也楊云棗無核其味有似於梨也王氏神仙傳王粲昔為王屋令誦黃庭經每欲詮注而未曉玄理已誦六千餘遍時棄官入洞尋真訪道誓不期返一日深入洞中見石床几案之上有經旁有神人告之曰子其志乎吾乃仙人王太虛也注此經已七百年矣今授於子仍將一桃與之曰此桃非中土所有汝今得之食之者白日飛升妙想謁舜良卿薦堯集仙録王妙想蒼梧女道士也辟穀服氣想念丹府由是感通常有光景雲物之異靈香郁烈天樂之音震動林壑須臾千乘萬騎垂空而下儀衛數千人皆長丈餘執戈㦸兵仗旌幢良久乃見鵠蓋鳳車導九龍之輦下于壇前有一人冠劒曳履升殿而坐身有五色光羣仙擁從亦數百人妙想即往視謁大仙謂妙想曰吾乃帝舜耳昔勞厭萬國養道此山每欲誘教後進使世人知無可教授者且夫道在於內不在於外道在爾身不在他人玄經所謂修之身其德乃貞非他所能致也吾覩地司奏汝於此山三十餘歲初終如一守道不邪汝亦至矣於是命侍臣以道德二經及駐景靈丹授之而去如是一年或三五降於黃庭觀數年後妙想上升括異志陳良卿景祐四年自永州隨鄉書赴禮部試十月至長沙夢一人引導入巨艦中見一道士自稱青精先生與之談論辭語高古謂陳曰吾已薦子於堯為直言極諫臣陳曰堯今何在曰見司南嶽陳曰堯之由古聖君也安可在公侯之列先生曰堯人間之帝也乘火德而王棄天下而神位乎南方子何疑焉陳辭以名宦未立侯他日應乃許以十年為期既寤甚惡之為異夢録以自寬明年登甲第調全州判官道出嶽州南驛偶晝寢夢使者持檄來召遽驚覺喟曰豈堯命乎同行相勉以夢不足信後執書秩卧讀之晚食具呼之已逝矣何知沙麓裴憶藍橋仙傳拾遺何丹陽隴右人仕於漢季為尚書郎哀平間王室陵夷謂人曰今日之事非人力所制蓋世數有之昔沙麓傾有知數者云五百年後齊有聖女興今丞相齊國田氏之後聖后當其運革漢之命興齊之業在此時矣遂放志山林以求度世耳常服松花身輕目明乃棄官隱遁居蜀之名山太平上真降授以攀魁乘龍之道後上升傳記裴航傭舟于襄漢同舟樊氏夫人國色也航賂婢裊煙達詩曰同舟胡越猶懷思况遇天仙隔錦屏儻若玉京朝會去願隨鸞鶴入青冥夫人曰妾有夫在漢南幸無以諧謔為意與郎君小有因緣他日必為姻懿答詩曰一飲瓊漿百感生玄霜搗盡見雲英藍橋便是神仙窟何必崎嶇上玉京後經藍橋驛渴甚茆舍老嫗緝麻揖之求漿嫗曰雲英擎一碗漿來航接飲之直玉液也航謂嫗曰小娘子艷麗驚人願娶如何嫗曰老病有此女孫神仙遺藥一刀圭得玉臼杵搗一百日方就欲娶此女但得玉臼杵其餘金帛吾無所用航恨恨而去月餘果獲臼杵挈抵藍橋嫗襟帶間解藥航即為搗之嫗夜收藥航窺之有玉兔持杵雪光曜室百日足嫗吞藥曰吾入洞為裴郎具帷帳俄見大第仙童侍女引航入帳諸親皆神仙中人有一女子云是妻姊曰不憶鄂渚同舟抵襄漢乎左右云是雲翹夫人劉綱天師之妻為玉皇女史航將妻入玉蜂洞中餌絳雪瑶英之丹超為上仙武宿鳥巢端窺螺殼湘山野録祖宗潛耀日嘗與一道士游於關河無定姓名自曰混沌武每有乏則探橐金愈探愈出三人者每劇飲爛醉生善歌步虛為戲能引其喉於杳冥間作清微之聲時或二句隨天風飄下唯祖宗聞之曰金猴虎頭四真龍得真位至醒詰之則曰醉夢語耳豈足憑耶至膺圖受襌之日乃庚申正月初四日也自御極不再見下詔草澤遍訪之或見於轘轅道中或嵩洛間後十六載乃開寶乙亥歲也時上巳祓褉駕幸西沼生醉坐於岸木陰下笑揖太祖曰别來喜安上大喜亟遣中人密引至後掖恐其遁急回蹕與見之一如平時抵掌浩飲上曰我久欲見汝决刻一事無他壽還得幾多在生曰祖今年十月二十夜晴則可延一紀不爾則當速措置上酷留之俾泊後苑苑吏或見宿於樹末鳥巢中搜神記謝端於邑下得一大螺取以歸貯瓮中一日窺其家見一少女從瓮中出至竈下燃火端問之答曰我天漢中白水素女天帝哀卿少孤恭慎自守故使我權相為守炊烹數年中使卿居富得婦自當還去而卿無故竊相伺掩吾形已見不宜復留當相委去留此殼以貯米穀常可不乏端請留不肯時天忽風雨翕然而去採訪下宫成子中嶽廣異記唐玄宗夢神仙羽衛千乘萬騎自空中而下有一朱衣金冠神人前謁於帝曰我九天採訪使欲於廬山西置一下宫自有木植基址但須工力而已帝悟遣使者諸山果有基址巨木千萬段自然而至云是九江王採作宫殿神人運來以供所用帝即時詔造殿宇不旬月畢工一如化成今江州太平觀是也抱朴子成子者姓容不知何許人每多與巢父許由相會今在中嶽服三黃而得神仙三黃者雄黃雌黃黃芩是也趙度逐兔石巨化鶴仙傳拾遺趙度不知何許人因獵於大房山逐一白兔因入於伏龍穴中見瑶臺玉堂壁立千仞有白蝙蝠其大如鴉因與羣仙相遇授靈藥而得仙廣異記石巨者胡人也性好服食大曆中遇疾百餘日形體羸瘦神氣不衰因命其子於河橋召一老姥卜之臣卧堂前紙隔中姥徑造巨言其細密人莫得聞良久姥去後數日但有二白鶴從空而下穿巨紙隔入巨所和鳴食頃俄從孔中三白鶴飛去巨子往視之不復見巨便隨鶴逼至城東大墩上見大白鶴數十相隨上天冉冉而去祖常幽館許肇靈閣真誥大茅西平山俗謂之方山下有洞室名曰方臺其洞與幸陽相通號為幽館惟得道者處焉祖常託醉墜車而死隱身幽館修守一之業而成道又許肇字子阿長史七世祖也肇有賑死之仁拯飢之德至許映被三官遣使執之而映吒其使曰我七世祖積仁著德音和鳥獸救人之患如己之疾己死之命在於阿手窮垂之身撫之如子度脫凶年仁德不墜是以功書上帝德刋靈閣故使度世者五登仙者三汝可知乎孔升䨥鶴華陀五禽天寶遺事明皇自為上皇嘗玩一紫玉笛一日吹笛有䨥鶴下顧左右曰上帝召吾為孔升真人未幾而仙去魏書華陀字元化善養生年百歲猶有少容弟子廣陵吳普彭城樊阿受術於陀時語普曰體欲得勞但不當令極耳身常能動搖則穀氣消化血脉通流病乃不生譬户樞不蠹之義是也昔有道士鮑倩為引導之事作熊經鳥伸引挽腰脊動關節以求難老吾有一術名五禽戲也仙人毁璧貧士施金七命注昔有仙人見二人爭寶仙人乃自毁千金璧二人曰彼千金璧尚且不愛况此乎二人爭訟遂息文選野人間話龍華襌院本詩僧貫休歸寂門人曇域主掌曇域每因衆僧齊後必為貧士設食有一貧士授食後不去遍尋院內顧覷上下從容謂曇域曰弟子雖貧每感上人設食今有少許施利敢乞一人相隨曇域不之信堅請再四遂令院內苦行醋頭僧一人相隨與之偕行城北門外約行十五餘里於一小店中止洎房內則别無所有但見空床兩張而已其夜宿於店內因問院中僧數及修添屋宇僧曰若論院中修葺屋宇豈止千繩貧士遂起燃火於床下滌破磚數角囊中取藥燈下㸃之逡巡光彩盡變為金自將稱分一十斤付與僧且謂之曰將充添修常住慎勿取之凌晨遂辭去不復見采和歌拍段穀謳吟續仙傳藍采和不知何許人常著破藍衫木夸腰帶一腳著靴行歌於市持拍版乞索於人老少隨之諧謔笑者皆倒似狂非狂其詞云踏踏歌藍采和人生能幾何紅顔一春樹流年一擲梭古人混混去不返今人紛紛來更多朝騎鸞鳳至碧落暮見桑田生白波長景明暉在空際金銀宫闕高嵯峨一日踏歌於濠梁間酒樓上騰雲上升遺下衫靴拍板括異志段穀者許州人纍舉進士家豐于財後勿如狂日夕冠幘衣布袍白銀帶行游廛市中嘔吟云一間茆屋尚自修治信任風吹連簷破碎斗栱斜欹看看倒也每至倒也二字即連呼三五句方已墻壁作散土一堆主人翁永不來歸遇其出入則有閭巷小兒數十隨而和焉人以狂待之不以為異慶曆末病卒權厝于野後數年營葬發視但空棺耳昭王絶欲子休恥媱子年拾遺燕昭王假寐忽夢羽衣人與語問以上仙之術羽人曰大正精智未開欲求長生久視不可得也王跪而請受絶欲之教羽人以指畫王心應手即裂王乃驚寤而血濕襟席因患心疾即却膳徹樂移於旬日忽見所夢者復來語曰先欲易王之心乃出方寸緑囊中有續脉明丹補血精散以手摩王之臆俄而即愈王即請此藥貯以王缶緘以金繩王以塗足則飛天地萬里之外如遊咫尺之內有得服者後天而老東方朔內傳秦併六國太白星精織女侍兒梁玉清衛承莊逃入衙城小仙洞四十六日不出天帝怒命五嶽搜捕焉太白歸位衛承莊逃焉梁玉清有子名子休玉清謫於北斗下常春其子乃配於河伯驂乘行雨子休每至小仙洞恥其母淫奔之所輒回馭故此地常少雨焉三洞羣仙録卷之一
