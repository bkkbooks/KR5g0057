  text: 三洞羣仙録卷之八筵八
  hash: sha256:2bc9d1dfa8cbc1d9eaf975e886374cbacae1961dd3ef6cc64e3932280d5bfd78
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_HFL_008-001a, image: hfl/0993/0993-088.png}
body:
  text: 正一道士陳葆光撰集漆園傲吏煙波釣徒晉郭璞遊仙詩曰漆園有傲吏萊氏有逸妻注云莊子嘗爲漆園吏楚威王使厚幣迎許以爲相莊周笑謂楚使曰亟去無汗我漆園傲吏漁歌記憲宗求訪玄眞子漁歌李德裕爲潤州刺史乃獲之玄眞子張志和也自號煙波釣徒歌曰西塞山邊白鳥飛桃花流水鱖魚肥青箬笠緑蓑衣斜風細雨不須歸二曰釣漁父褐爲裘兩兩三三舴艋舟能縱棹慣乘流長江白浪不曾憂三曰霅溪灣裏釣魚翁舴艋爲家西復東江上雪浦邊風笑著荷衣不嘆窮四曰松江蟹舍主人歡菰飯蓴羹亦共飡楓葉落荻花乾醉拍漁舟不覺寒五曰青草湖中月正圓巴陵漁父棹歌蓮釣車子撅頭船樂在風波不用仙蘇耽鶴櫃孫真牛車郴江集蘇仙君耽忽一日掃洒庭宇具衣冠若有所待俄見西北雲鶴翔集從空而下君乃入跪白母曰太上召補爲眞官儀衛已至不得終養言訖拜辭子母歔欷久之母曰汝去後使我何以存養君因留一櫃扃鏁甚固曰有所闕乏可扣櫃呼之所須即至愼勿開也自後母但有所闕叩櫃其物立至母一日心疑其櫃開視之有雙鶴飛去自後雖扣無復應矣抱朴子孫眞事帛和先生得其道一日告行先生將一符函與之云前有牛車迎汝即乘之所有供給行厨食之無疑切不可開函眞跪受以行前果有牛車來問曰君是孫道士乎帛君遣制相迎眞上車如飛每渡水不由橋梁酒食供給悉備一日弟子竊開只見畫牛車一乘即時不知所在眞後亦數與帛和乘車出入彌明賦鼎陶白攜壺高道傳道士軒轅彌明往來衡湘間與劉師服友善彌明自衡山過太白知師服在京夜抵其居校書郎侯喜有詩名與師服擁爐說詩彌明在座貌甚陋喜視之蔑如也彌明因指爐中石鼎曰二子能賦此乎師服雖舊識不知其有文也劉先生吟曰巧匠斲山骨刳中事煎烹次侯曰直柄未當權塞口且吞聲彌明啞然笑曰子詩如是而已因高吟迭賦十餘韻彌明應之如響二子思竭不能續起謝曰尊師非世人能出也其輩伏矣廣記陶太白公每以採藥爲業一日攜壼拉友遊嵩山坐於林下聞松梢有笑語之聲仰視果有二人公曰君必神仙可能下降而共飲乎俄見一丈夫女子古服而下曰予乃秦之役夫也毛女乃秦之宫人與子同脫驪山之禍乃匿於此陶曰今遇眞仙金丹大藥可得聞乎曰予本凡人但能絶世食木實乃得凌虚不覺生之與死俗之與仙如何耳遂折松枝叩壼而歌曰餌柏身輕疊嶂間是非無意到人寰冠裳暫備論浮世一餉雲遊碧落間子良青簡永叔丹書眞誥周子良陶隱居之弟子自幼温雅肅然高邁夭監中眞仙屢降其室曰周生修功積德可爲不負其志矣子良曰枉蒙上眞賜降欣懼交心無以自措司命君曰近往東華見子之名已上青簡保列保晨司矣青瑣歐陽永叔與梅聖俞遊嵩山醉望西峯崖上有丹書四大字云神清之洞永叔指示聖俞間無所見公乃不言洎乞身告世作詩曰四字丹書萬仞崖神清之洞鏁樓臺湮霞極目無人到鸞鶴今應待我來後數日公薨元化湔腸黄眉洗髓後漢華陀字元化仙人也沛相陳珪舉孝廉太尉黄琬辟皆不就精於方藥處劑不過數種若疾發結於内針藥所不能及者乃先令以酒服麻沸散既醉無所覺因刳破腸背抽割積聚若在腸胃則斷截湔洗除去疾穢既而縫合傅以神膏四五日則愈一月之間皆平復漢武故事東方朔生三日而父母俱亡或得之而不知其姓以見時東方始明因以爲姓既長常空中獨語後遊鴻濛之澤有老母採桑自言朔母一黃眉翁至指朔曰此吾兒也吾却食服氣三千年一反骨洗髓二千年一剥皮伐毛吾生已三洗髓五伐毛矣郝姑挑蔬許僕市米女仙傳郝姑祠在莫州莫縣西北俗傳云郝姑者字女君魏青龍中與鄰女於漚洟水邊挑蔬忽二青童至前曰東海公娶女君爲婦言訖敷連裀褥於水上行坐往來有若陸地童子侍側㳂流而下鄰女走告其家家人往看莫能得也女君遥語曰幸憑水仙願勿憂怖後立祠水際祠前忽生青白石一縱一橫闊可三尺高二尺餘有舊題云此姑夫上馬石至今存焉皇朝類苑洪州西山有許大夫婦出入山中相傳許旌陽僕也方與妻市米於西嶺及歸而許君已拔宅上昇矣許大有詩云自從明府歸仙後出入麈寰直至今不是藏名混時俗賣柴沽酒要安心許君乃授以地仙之術改姓干大至今人多見之戲臣鼓吻狂士掩耳酉陽雜俎邢和璞嘗延一客鼔髯大笑吻角侵耳與邢劇談而去或問之曰上帝戲臣也神仙傳和州南門外見一繿縷狂士賣胡蘆子云一二年間甚有用處卒無人曉其理或時兩手掩耳急走言風水聲何太甚邪孩童隨之時人呼爲掩耳先生來年秋江水漲泛淹没數百家衆人皆見狂士在水上坐一大瓢兩手掩耳大呼風水聲何太甚泛江而去北海掛冠南陽遺履後漢逸史逄萌字子廉北海都昌人也家貧給事縣爲亭長時尉行過亭萌候迎拜謁既而擲楯嘆曰大丈夫安能爲人役哉即解冠掛東都城門歸將家屬浮海客於遼東後之瑯琊勞山養志修道人皆化其德集仙傳漢南陽公主出降王咸屬王莽秉政公主夙慕清虚尚崇至道每追文景之爲理又知武帝之世累降神仙謂咸曰國祚如此非女子可以扶持但當自保恬和退身修道稍遠嚚競必可延生若碌碌隨時恐不可免於支離之患遂入華山結廬精思眞靈屢降道成乘雲飛昇而去但於嶺上遺朱履一雙前取之已化爲石因謂之公主峯玉卿白兔吕公青蛇原化記王卿爲天師守丹竈竊發其封而窺一白兔躍出衆皆曰丹已去矣一道士化爲鶴飛去須臾擒兔來復投筩中青瑣賈師雄郎中有古鐵鑑甚寳之久欲淬磨有回處士言善磨鑑笥中取藥堆鑑上曰藥少頃歸取之既去久不至遣人詢其宿止乃在寺中題詩寺門上手内青蛇凌白日洞中仙果艶長春須知物外煙霞客不是塵中磨鏡人公視鑑上藥已飛去一㸃表裏光明又贈張洎云朝遊南越暮蒼梧袖裏青蛇膽氣粗三入岳陽人不識高吟飛過洞庭湖錢真飛練女褒浣紗茅山記女眞錢氏二姊妹依止茅山隱陶居誦黃庭經積三十年一日吿别先生曰何之答曰上賔金闕先生以詩贈之云道士送仙客送到大茅東太華十萬里逺望杳冥鴻眞人答詩曰師住好師住勞師逺相送仙籍有仙名名在蓬萊洞即時飛練入洞及女弟至則洞已扃矣即今燕洞是也有紫菖蒲碧桃焉故田霖有詩云燕洞龍泓氣象清錢眞此處有遺靈仙兄去後師猶在女弟回時洞已扃雲片尚如披白練泉聲長似誦黃庭碧桃花發菖薄紫留與人間作畫屏仙傳拾遺褒女者漢中人也居瀘沔二水之間幼慕沖寂既笄因浣紗於水際雲雨晦冥若有所感而孕父母責之憂恚而疾臨終謂其母曰死後當以牛車載送西山之上即所願也言訖而終父母置之於車中未及駕牛而車自行踰漢濜二水横流而渡直上平原山嶺家人追之但見五雲如蓋天樂震空幢節導從其女昇天視車中空棺而已張白飮酒樵青煎茶括異志張白字虚白自稱白雲子好沉靜博學能文兩舉不第每沉湎於酒會親喪乃泣曰禄以養親今親不逮干禄何爲遂辟穀養氣全神爲事因脫去儒服爲道士入𨞬中多行詬駡切中人微隱之事風雪苦寒必破冰深入水中安坐氣如蒸炊指顧之間悉以乾燥居常飲崔氏酒肆嘗題其壁云武陵溪畔崔家酒地上應無天上有南來道士飲一斗醉卧白雲深洞口其後解去脞說張志和有奴曰漁童婢曰樵青或問其故曰奴使捧釣取綸蘆中鼓枻婢使樵蘭薪桂竹裏煎茶王老打麥張洎破瓜神仙傳王老房州宜君縣人也居於村野頗好道愛客一旦有繿縷道士造門王老與妻延禮之居月餘道士俄遍身惡瘡王老爲求醫看療益勤道士言不煩以凡藥但得美酒數斛浸之自愈王老乃爲造酒及熟道士命貯以大甕自加藥浸之遂入甕二日方出鬚鬢俱黑顔復少年肌若凝脂焉仍令王老飲之王老時方打麥與其妻子并打麥人共飲皆大醉道士亦飲云可上天去否於是祥風忽起綵雲如蒸全家人物雞犬一時飛去空中猶聞打麥之聲今宜君縣西有昇仙村存焉楊文公談苑張洎家居城外有一隱士乃吕仙翁姓名洎倒屣見之索紙筆八分書七言詩一章留與洎頗言將相鼎鼐之意其未句云功成當在破瓜年俗以破瓜字為二八洎果得六十八乃其讖也巫山雲雨姑射冰雪集仙録雲華夫人王母第二十三女名瑶姬嘗遊東海還過江上有巫山焉峯嵓挺拔林壑幽麗巨石如壇留連久之時大禹理水駐於山下大風卒至崖谷振隕力不可制因與瑶姬相值拜而求助即敕侍女授禹策召鬼神因命其神助禹斬石疏波决塞道阨以存其流禹嘗詣之於崇巘顧眄之際化而為石或倏然飛騰散為輕雲或悠然而止聚為夕雨或為飛龍或為翔鶴千態萬狀不可親也其後楚大夫宋玉以其事言於襄王王不能訪其道要以求長生築臺於高唐之館作陽臺之宫以祀之宋玉作神女賦以寓情荒淫託辭穢蕪高真上仙豈可誣而降之也莊子藐姑射之山有神人居焉肌膚若冰雪婥約若處子不食五穀吸風飲露乘雲氣御飛龍而遊乎四海之外元嘉六舉素卿三絶朝野僉載唐元嘉少聦俊左手畫圓右手畫方口誦經史目數羣羊兼成四十字詩一時而就足書一絶六事齊舉時號神仙童子實賔録五代蜀道士張素卿畫獻神仙十二軸歐陽炯為讃水部員外郎皇居寀八分題之號三絶欒巴斬狸長房訶鼈神仙傳欒巴聞廬山廟有神與人語於帳中巴未到十數日廟中神不復作聲遂逃不知所在巴自行逐捕鬼乃化為書生到齊齊太守見其姿容妖麗又有才辯乃以女妻之生一男巴到齊謁太守聞卿有好女壻明於五經可得見否太守遂令壻出壻拒辭不出巴求之不已壻告婦曰今日出必死如之何女怪之巴知其不出乃以符付太守壻得符涕泣而去巴厲聲訶之為狸遂斬其頭子亦化狸并殺之矣又費長房為市掾遇壼公得道能治鬼汝南郡中常歲鬼怪每來時導從威儀如太守入府打鼓周行及去甚悲後長房詣府而正值此鬼長房厲聲呼使捉來鬼乃下車叩頭乞得自改長房呵曰不念温良無故導從唐突郡守復汝真形須臾成一大鼈長房令持符送與葛陂君流涕而去使人追視之至陂鼈死矣雷劒衝斗堯查貫月晉書斗牛之間有紫氣雷焕曰寳劒之精上徹於天云在豫章豐城乃掘獄屋基入地四丈得石函中有雙劒一曰龍泉二曰太阿焕得劍送一與張華一自佩及華誅失劒所在及焕卒其子衆持劒行經延平津忽於腰下躍出墮水使人入水見兩龍盤合光照水而去焕曾云靈異之物終當化去果然仙傳拾遺堯登位三十年有巨查浮於西海查上有光夜明晝滅海人望其光乍大乍小若星月之出入矣查常浮繞四海十二年一周天周而復始名曰貫月查張哥呼蝶初平叱羊散仙傳慶曆間有張九哥者在京師有道術燕王一日登樓上命呼之嘗賜以酒九哥曰某有小伎欲以悅王可乎王曰何伎也九哥曰借王帛一疋并金剪一柄王悉與之取羅碎剪為蜂蝶狀隨剪皆飛去莫知其數或集王衣或聚美人釵鐶上王驚顧大喜九哥曰恐失王之帛乃呼之一一皆來復為羅一端羅中間一缺似一蝶之痕乃一蝶為宫人所捕也王曰此一蝶可復歸乎曰不可也若隨呼而來即可既久即已亦留此為異也乃别去神仙傳黄初平家使牧羊有道士將入金華山不歸兄初起求之不得後於市中見一道士問之道士曰金華山下一牧羊小兒非是耶初起隨道士往見其弟問羊何在初平曰羊在山東起往視之但見白石初平叱之白石皆化為羊順興辟戎進賢駡羗丹臺新録李順興年十一與道士籍一日有飛仙千數集空中神光照室命侍經仙郎開九色流霞之藴出經二卷以授之魏文帝嘗召入都城朝野欽信稱為李鍊師年三十八大統六年託疾告終葬日有姪遇於驪山道中謂曰若天子尚未忘我則可於此作吾像北向居之當為國家辟北戎之淫俗也姪還家方知已化遂以實奏遣使發視則空棺而已乃立祠於沙苑號李聖真誥王衍為晉武帝尚書令其女字進賢為愍懷太子妃洛陽陷劉曜石勒掠進賢渡孟津於河中欲妻之進賢駡曰我皇太子婦司徒公之女而胡羗小子敢干我乎言畢即投河中其侍婢名六出復言曰大既有之小亦宜然復投河中時遇嵩高女真韓西華出遊而愍之撫接二人遂獲内救外示死形體實密濟便將入嵩高山令在華陽宫洞中易遷之宫六出時年二十二三體貌亦整善有心節本姓田漁陽人魏故浚儀令田諷之孫諷曾有陰德之行以及六出耳孟欽風旋丘林雲翔晉逸史孟欽得左慈劉根之法百姓歸向之時符堅惡其惑衆欲誅之俄而欽至堅留之飲酒酣令左右執之欽化為旋風而去有告在城東忽前溪水不能渡真誥范丘林在華陽宫為保命丞善長嘯如百鳥之雜鳴或如風激衆林或如伐鼓之音須臾雲翔其上衝氣動林休復妓侮徐姑僧僵仙傳拾遺陳休復者號陳七子嘗於巴南太守筵中為酒妓所侮休復笑視其面須臾妓者髯長數尺泣訴於守守為祈謝休復呪一柸酒使飲之良久如舊廣記徐仙姑者北齊僕射徐之才之女也年數百歲狀貌常如二十四五歲善禁呪之術名山勝景無不周遊多宿巖麓之中寓止僧院忽為豪僧數輩微辭巧言侮之姑駡之羣僧激怒色愈悖姑笑曰我女子也而能棄家雲水不避蛟龍虎狼豈懼汝鼠輩乎姑即解衣而卧遽徹其燭僧喜以為得志洎明姑理策出山諸僧一夕皆僵立尸坐口不能言姑去數里僧乃如故淮南八公田谷十老神仙傳淮南王劉安折節下士有八公者詣其門門吏曰王上欲延壽命以期長生不老之道今公皆老矣公曰若王必欲見少年謂之有道謹以少矣言訖皆化為童子色如桃花高導傳法師嚴達字道通幼有方外志與王延蘇道標程法明周化生王真微史道樂于長文張法成伏道崇等十人以道術相忌同於出處世號十老趙昇取桃田師降棗神仙傳漢天師將諸弟子登雲臺絶巖之上下有桃一株如人臂傍生石壁下臨不測之淵桃大有實天師謂諸弟子曰有人能得此桃實當告以道要於時伏而窺者二百餘人股戰流汗無敢久臨視者莫不却退而還謝不能得昇乃從上投擲木上足不蹉跌取桃實滿懷天師乃分賜諸弟子後授以至道白日上昇高道傳田法師者名仕文古郎人也授三洞經法服餌鍊氣齋戒修奉未嘗少輟每與人祈福及救疾無不通感即獲平愈陳綱嘗請作醮忽神降棗數顆在壇食之則非人間所有者夢昌戴花子韋被草郡閣雅談伊夢昌不知何許人因夢兩日遂立其名唐末不仕披羽褐遊山水散逸愛載花又青瑣後集夢昌嘗題攸縣司空觀仙壇云唯有青松空弄日更無雲鶴暗迷人題黄蜀葵云露凝金盞滴殘酒檀㸃佳人噴異香夢昌後尸解人發其棺無尸太平廣記宋景公之世有善星文者許以上大夫之位處層樓延閣之上以望氣象設以珍食施以寳衣忽有野人被草負笈叩門而進請見景公公延之崇堂語則及未來之兆及已往之事萬不失一夜則觀星氣晝則執筭披圖不服寳衣不甘奇食景公謝曰今國喪亂微君何以輔之曰德之不均亂將及矣修德以來人則天降之祥人美其化景公稱善遂賜姓曰子名之韋即子韋也萬傳八音韋贈三寳仙傳拾遺萬寳常者不知何許人也幼達音律因於郊中遇十許人車服鮮麗麾幢森列召之曰上帝以子天授音律之性將傳八音於季世故將壞之樂然正始之音子未備知也命坐乃教以歷代之樂治亂之音靡不周述寳常畢記之由是羣仙凌空而去寳常自此人間之樂無不精究神仙感應傳韋弇字景昭因下第遊蜀至鄭氏園亭見仙子數十左右侍衛華裙麗服非世所覩謂曰予有新曲名曰紫雲今天子奉尚神仙之道吾欲以此樂授與吾子而貢於聖唐之君以此相託可乎弇曰某儒生耳素非知音固不可為也美人曰既不能余當寓夢以授於天子也然子已至此亦道分使然願以三寳為贈其售之可以畢世而富命侍者出一杯謂之碧瑶杯又出一枕似玉而粟其紋又出一紫玉函皆光彩瑩徹俱受於弇拜而謝之即别去回顧失向亭臺矣叔隱仙伯周顗鬼官丹臺新録秦叔隱今在華山為仙伯真誥周顗為鬼官司帥注云周顗字伯仁汝南安城人仕晉過江位至尚書僕射元帝永昌元年王敦南下遣收於石頭南門被害年五十四歲追贈光禄開府謚康侯賈躭偷書神通竊丹逸史賈躭一日令徤卒入枯井中取文書果得數軸皆道書也遂遣十餘人寫纔畢有道士突入呼賈公姓名叫駡曰爭敢偷書躭遜謝道士復持去高道傳輔神通幼孤貧為人牧牛以自給每於牧所見一道士往來久而稔熟謂神通曰能為弟子乎曰可乃引入水汝宜隨之無憚既入見所居嚴潔有藥囊丹竈使神通看火兼教黄白術經三年神通輙思人間會道士出乃竊丹别貯之既歸問丹所在則隱而不言道士嘆息曰吾本與汝道要今若是曷足授教雖備解諸法然無益長生遂引去廖冲鶴骨平阿玉顔實賔録唐蔣防為連州静福山廖先生碑曰沖先生名也清靈先生字也静福先生家也先生之名玉堂金簡之名矣先生之家紅霞外景之家矣至於鶴骨松貌味淳含虛寓形人間天地無累與夫扶桑公陶隱居張天師為師友矣神仙傳劉平阿不示名字漢末為九江平阿長因以為號行醫救人見人之病如己之病後遇神人授以隱存之道服日月精氣居主臺館其顔色如玉守真三劒楊寳四環翊聖傳建隆初黑殺降謂張守真曰汝乃貞潔之士可以驅邪吾先授汝劒法為民除妖然劒法有三以銅鐵煅為利刃吾目一視便可用之有疾者但揮之邪氣自釋地祇作孽水族生妖以上劒治之山澤怪異以中劒治之魍魎害人以下劒治之續齊諧志楊寳見一黄雀為鴟所搏寳取置梁上啖以黄花毛羽成朝去暮來夜有黄衣童子曰我王母使者昔使蓬萊為鴟所搏承君見救以四環與寳曰令君子孫潔白位登三公事如此環寳生震四世名公三洞羣仙録卷之八
