front:
  text: 三洞羣仙録序筵一
  hash: sha256:111f4b9eb257f38105be6a66f0a9089bf815ee8b58e7c1004d25de5417cb498a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_HFL_000-001a, image: hfl/0992/0992-004.png}
body:
  text: 正一道士陳葆光撰集闕地求泉雖至愚知其可得鍊形致仙雖賢者不能篤信故神仙顯跡昭示世人使鍊炁存真保命養神以祈度世脱囂塵超凡穢而游乎八極之外其利物濟人之意弘矣然仙凡異質浄穢志殊人之生也資形以栖神資物以養生其弊也後神以養形逐物以䘮真自壯而老自老而哀自衰而死骨肉復士形神離矣仙者養形以存生也氣專志一不以好惡累其心不以得喪汩其和游心於澹合氣於漠其至也心静而神完德全而不虧故能出入虚無獨與道俱壽同天地飛升太虚而爲真仙矣然嵇康謂神仙禀之自然非積學所致吴筠謂神仙可學而成二人矛盾如此僕謂神仙苟非積學所致則上帝之詔旌陽也曰學仙童子許遜卿在多劫之前積修至道勤苦備嬰萬法千門罔不師歷求灾扞難除害盪妖功濟生靈名刋仙籍衆真保舉宜有甄升可授九州高明太史又詔曰學仙童子許遜脱子前世貪殺匿不祀先祖之罪録子今生咒水行藥治病伐惡馘毒之功仰潛山司命君傳金丹於下界閉債封形回子身及家口厨宅百好歸三天兩詔皆曰學仙童子又曰積修至道勤苦備嬰是神仙果可學而致也茅盈未生也秦始皇三十一年其祖初成於華山乘雲白日昇天邑民謌之曰神仙得者茅初成駕龍上昇入太清時下玄洲戲赤城繼世而往在我盈帝若學之臘嘉平按盈内傳及盈九錫碑言盈生於漢景帝中元五年蓋未生前七十二年始皇世已謡當仙矣漢哀帝元壽二年上帝授位太元真人東嶽上卿司命神君時年一百四十有五歲如此則神仙豈非禀之自然二百一十七年盈胎未兆前已謡當仙實讖於未然審爾豈積學所致也末學之夫謂神仙非積學所致而怠於勤修者自賊其身者也謂可學而能致者欲磨磚爲鏡坐禪成佛者也夫忠信之道無他誠一而已誠之與一入水不溺入火不焦金石爲開虎豹莫賊如商丘開如吕梁丈夫彼一而猶若是况神仙者形神俱妙與道合真其坐在立亡分形散體倏忽萬變飛行八極宜矣修真之士虚緣葆真抱一冲素以慈爲寳以静爲基朝徹見獨昭曠混冥其要不離於老子莊周之書捨是皆矯誣之論非聖之書也黄帝之遺玄珠七聖迷道而象罔獨得儵忽之遇混沌日鑿一竅而返致其死是明道者當遺形去智虚無寂淡静一而不變純粹而不雜此養形神反造化之本也秦漢之君侈於嗜慾蕩於紛華慕神仙之術欲長年而保其尊榮信金丹之説資藥力以濟其荒淫於是方士並出而幻譎變化之術始彰乃有合鈆汞結丹砂而名大藥嚥津氣存龍虎以爲内丹木公金母之名姹女嬰兒之黄芽白雪之稱七返九還之訣其上則玄都絳闕之異赤明龍漢之紀三洞符籙之科九壇齋醮之式下逮尸解鑑形投胎奪舍飛符布炁劾鬼治邪之術悉由恍惚而立象從虚無以課有千門萬户錯出旁門及其成功則殊途同歸百慮而一致也天下之士無本不立無文不成虚緣葆真抱一冲素本也變化飛升尸解布炁末也故曰本立而末自應始質而文成自然之理也江陰静應庵道士陳葆光憤末學之夫怠於勤修果於自弃生存行尸死爲下鬼乃網羅九流百氏之書下逮稗官俚語之説凡載神仙事者裒爲此書以曉後學使知夫列仙修真之勤濟物之功奉天之嚴得法之艱如此之勤苦勞勩卒能有成丕顯其光與天爲徒也昔司馬子微著坐忘樞陳碧虚作混元鏗以啓後人皆旨趣深遠初學蒙叟無自而入今陳君集仙之行事揚高真之偉烈以明示向道者使開卷洞然知神仙之可學歷世聖賢之跡萃於目前如視諸掌激之勸之使憤悱奮發踴躍精進以祈度世如置尊通衢人人可以酌取自飫則其導迷翊教濟物利人豈淺淺者陳君神氣虚静德性粹和佩三洞之靈文神飛碧落窺九清之秘笈名籍丹臺他日繼列仙而授位載雲氣而上浮五帝校籍三官策勳所以酬著書之勤而警夫偷墮之士使知有補於世者天必有以報也紹興甲戌中元日里竹軒書
