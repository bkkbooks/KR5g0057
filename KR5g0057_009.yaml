body:
  text: 正一道士陳葆光撰集赤腳仙人黃髮老叟括異志樂學士史景德末為西京留臺御史嘗夢一人具冠服稱帝命來召俄見宫闕壯麗因問使者云此帝所也既升陛見帝謂曰而主求嗣吾為擇之少選一人至帝曰中原求嗣汝往勿辭頓首求免者再三帝曰往哉遂唯而去傍拱立者曰此南嶽赤腳李仙人也嘗酣於酒明年果生仁宗皇帝拾遺記李聃衰周之末居反景日室之山與世人絶迹惟有黃髮老叟五人或乘鴻鶴或衣羽毛耳出於頂瞳子皆方面色玉潔手握青筠之杖與聃共談天地之數及聃退迹柱下史求天下服道之術四海名士莫不爭至五老即五方之精也景唐玉案明星石臼稽神録崔景唐汝陰人有道士自言姓梅來訪崔崔客之數月景唐市得玉案將之壽春以獻節度使高審思為梅曰先生但居此吾將詣壽春旬日而還使兒姪輩奉事無所憂也梅曰豫乃壽春人也將北訪一親知亦將還矣君其先往也久居于此思有以奉報君家有水銀乎曰有即以十兩奉之梅乃置鼎中以火煉之少頃即成銀矣謂景唐曰贈此為路糧君至壽春可於城東訪吾家也由是别去崔後至城東求訪梅氏數日不得村人皆曰此中無姓梅為道士者唯淮南王廟中有梅真人像得非此耶如其言訪之果梅真君矣自後不復遇集仙録明星玉女者居華山服玉漿白日升天山頂石龜其廣數畝高三仞有五石臼號曰玉女洗頭盆其中水色碧渌澄徹雨不加溢旱不減耗祠內有玉石馬一匹焉何姑故人李升舊友托遺洪州袁夏秀才侍親過永州因見何仙姑曰吾鄉有故人亭永亦有之此是則彼非此非則彼是幸仙決之也仙曰此亭名因選詩而得之也選詩曰洞庭值歸客瀟湘逢故人夫洞庭之水與瀟湘之流一源耳今永之境湘水出其左瀟水會其右以二水所出故為永字今永創此亭得其實也彼則非也因贈詩曰全永從來稱舊郡瀟湘源上搆軒新門前自古有流水亭上如今無故人風細日斜南楚晚鳥啼花落浙東春因君問我昔時事江左亭名不是真集仙傳李升字雲舉有煉氣養形之術元稹廉察浙東白居易出牧錢塘以升舊友皆慕升之文學道術邀致於賓席問升云當太平何不就榮祿而為布衣先生徐吟曰生在儒家偶太平玄纁重滯布衣輕安能世路趨名利臣事玉皇歸上清成子蛇噬陳純鶴嘔真誥昔閭成子少好長生學道四十餘年後入荆山中積七十餘歲為荆山山神所試成子謂是真人拜而求道而為大蛇所噬殆至於死賴悟之速而存太上想七星以却之因而得免青瑣陳純至桃源愛其溪山秀絶裹糧沿溪尋勝凡九日至萬仞絶壁下夜聞壁間人語純糧盡困卧忽聞美香有巨花十餘片流出因取食之復見青衣採蘋岸下乃詰之曰此即三源夫人之地中秋夕三仙將會於此俄三夫人邀入見碧窗朱户非世所有宴會樂作與純酬唱極洽仍戒曰君愼無往南軒純潛往軒中見案間有一玉笛試取吹之忽見故鄉人物山川儼然妻兒聚會笑語久之不見純不覺嘔一卵墮地化鶴飛去仙責曰不聽吾戒莫非命也後三十年復當來此乃以舟送純歸四明賔友九宫仙嬪真誥魏武帝為北君太傅孫策漢高祖晉武帝荀彧為四明賓友女仙傳帝高辛時蜀地未立君長無所統攝遞相吞噬蠶女之父為鄰所掠唯所乘馬猶在女念其父殆廢飲食其母慰撫之因誓於衆曰有得父還者以此女妻之然無能得父歸者一旦其馬絶絆而去載其父歸自此馬嘶鳴不肯飲嚙父曰誓於人馬配人而偶非類可乎父怒射殺之曝其皮於庭女過其皮忽起卷女飛去旬日皮復棲於桑女化為蠶食桑吐絲成繭衣被人間父母念之不已忽見蠶女乘雲駕此馬自天而下謂父母曰太上以我孝授以九宫仙嬪無復憂念也沖雲而去蜀之風俗宫觀皆塑女子披以馬皮謂之馬頭娘子以祈蠶桑焉鬱夷金霧蒼梧珠塵拾遺記蓬菜東有鬱夷國時有金霧常浮轉低昂有如山架樓室常向明以開户牖及霧滅歇户皆向北又岱輿山南平沙千里色如金若粉屑靡靡常流鳥獸行則沒足風吹沙起如霧亦名金霧又舜時有鳥如雀自丹洲而來吐五色之氣氤氲如雲名曰憑霄雀能羣飛銜青沙珠輕細風吹塵起名曰珠塵今蒼梧之外山人採藥時得青石圓結如珠服之不死帶之身輕故仙人方因遊南嶽七言贊曰珠塵圓靜輕且明有道服之得長生馬明救病峭嵓拯貧列仙傳馬明生者少為縣吏為賊所殺垂死遇神人以藥救之即活方知長生之術有驗遂隨之負藥笈至廬山以受道要馬明自後周遊天下勞苦辛勤願合藥以救人病不願升天每居人間人多不知其神仙也高道傳談峭岩者茅山道士寶曆中遊天台江浙間貌如二十許人人亦不知其有道務以陰功救物常遺金於塗以拯貧乏或報之殊不認問其故則曰陰真君化土為金以賑不足吾恨未能且無用之物以遺人亦何怪久而知其有神丹化金于章剪祟元澤笞神高道傳法師于章字長文開皇間受黃化丈人太極真公六十甲子及五帝五嶽符印凡百三十六首並論天地原流符之本末置壇法式乃録受符日月及真仙誥訣次第記之由是知師通冥之心與日俱進故除妖剪祟其神變不可量而流俗霑惠日益多矣又左元澤溫州青障觀有土地里人常以血食祀之苟祀之不至則為祟元澤以杖笞神背三下翌日有大狸死於庭背有杖痕者三里人復夢神告曰託附吾者為仙官杖死愼勿以血食祭我也禹鈞五枝季卿一葉竇諫議録竇禹鈞嘗夢祖考告以無子及壽數不永後十年復夢其祖考告之曰汝三十年前實無子分又壽促我私告汝今汝自數年以來名挂天曹陰府以汝有陰德延算三紀賜五子皆榮顯仍以福壽而終死後當留洞天充真人位故馮道贈禹道鈞詩曰燕山竇十郎教子以義方靈椿一株老仙桂五枝芳蓋謂此也仙傳拾遺陳季卿因遊長安青龍僧舍會一老翁與季卿擁爐以坐見壁上有寰海華夷圖季卿嘆曰十年辭家辛苦萬里何由泳淮泛洛至于家山耶翁笑曰此不難致命侍童折階前一竹葉置於圖中渭水之上注目於此舟可如向來之願矣季卿瞪目覺渭水波動竹葉已成巨舟恍然舟泛遂及於家見兄弟妻子欣喜迎拜復辭家登舟至渭濱欻然如夢坐在畫圖之前仙翁擁爐如舊季卿謝之因問翁姓名翁曰吾不欲姓名示於人間但居終南山已七百年矣子有道骨故相值爾馮俊負囊王遙擔篋原化記廣陵馮俊以傭賃資生常遇一道士於市買藥置一囊可重百餘斤售俊負之至六合乃登小舟頃之忽抵廬山星子灣也見平湖渺然山嶺疊秀道士上岸行約五六里至一山下有大石方數丈道士以石扣之石遂開有二小童出於石間洞中有數道士奕棊戲笑道士曰擔人甚飢乃與胡麻飯食之謂俊曰勞汝遠來授與錢一千文俊辭歸乃指一石若虎形狀令俊乘之道士鞭石其去如飛不覺已在廣陵門外比至家昏暝方始舉燭解腰下皆金錢也神仙傳王遙遇雨使弟子以九節杖擔篋不沾濕盧生叱賊劉馮止劫酉陽雜爼盧生者因到復州與數人間行途遇六七人盛服俱帶酒氣逆鼻盧生忽叱之曰汝等所為不悛性命無幾其人悉羅拜塵中俯伏聽命其侣訝之盧曰此輩劫江賊也其異如此神仙傳劉馮者沛人也有軍功學道時長安諸賈客隨馮行雜貨萬金忽山中逢劫賊數百人仗白刃張弓四面馮語賊曰汝輩居官食祿我夫佃婦織云何斷道危人利己於是賊愈怒馮大聲曰天兵先打賊一時反手自縛口中血出欲死餘者尚能語乃乞活改惡為善馮曰本欲盡殺汝馮敕天兵放賊皆立起也野夫一拐子芝二榼冷齋液話劉野夫跛足拄一拐每歲必至洛中看花為人談噱有味嘗作長短句曰跛子年來形容何似儼然一部髭鬚世間許大拐上有工夫選甚南州北縣逢著處酒滿葫蘆醺醺醉不知來日何處度朝晡洛陽花看了歸來帝里一事全無與瓠羮餺飥再作門徒驀地思量下水輕船上蘆席橫鋪呵呵笑睢陽門外有箇好西湖神仙感遇傳王子芝字仙苗常遊京洛間蒲帥琅琊公重盈作鎮之初年仙苗居於紫極宫王待之甚厚又聞其嗜酒日以二榼餉之仙苗自云是河南緱氏族狀貌常如四十許人好養氣然莫知其甲子也李釣不餌陶琴無絃高道傳道士李道盛與鄭遨羅隱之為友遨種田隱之貨藥以自給道盛有釣魚術釣而不餌又能化石為金遨嘗驗之信而不求俱好酒能詩善奕棊長嘯有大瓢云可辟寒暑置酒於其中經時味不壞日攜就花木水石間一觴一詠嘗因酒酣聯句鄭曰一壼天上有名物兩箇世間無事人羅曰醉却隱之雲叟後不知何物是天真晉隱逸傳陶潛字元亮性不解音唯蓄無弦琴一張每因朋酒之會則撫而和之但識琴中趣何勞弦上聲炎皇鑽火封子隨煙仙傳拾遺燕昭王即位好神仙之道仙人甘需事之王行道既久谷將子乘虛而集告於王曰西王母將降觀爾之所修示爾以靈元之要後一年王母果至與王遊燧林之下説炎皇鑽火之術燃緑桂膏以照夜忽有飛蛾𠾑火集王之宫得員丘沙珠結而為珮登握日之臺得神鳥所𠾑洞光之珠以消煩暑自是王母三降於燕宫而昭王徇於攻取不能遵甘需澄清之旨王母亦不復至列仙傳寧封子者黃帝時人也世傳為黃帝陶正有人過之為其掌火能出入五色煙久則以教封子封子積火自燒而隨煙氣上下伯仁西補庚生東遷真誥定録君云近見周伯仁補為西明公中都護中都護如世間太傅之官也又庾生者晉庾亮太尉也大帝補為吳越鬼神之司王事靡盬斯亦勞矣元子云庾生今遷為東海侯昌齡策杖世雲乘船西清詩話頴陽石唐山一峯雄秀上有石室即邢和璞算心處也治平中許昌齡安世蚤得神仙術策杖來居天下傾焉後遊太清宫時歐陽文忠公守亳社公生平不道釋聞之邀致州舍與語豁然有悟贈之詩云緑髮青瞳瘦骨輕飄然乘鶴去吹笙郡齋坐覺風生竹疑是孫登長嘯聲公又嘗書昌齡南莊相對北莊居更卜深山十里餘幽徑每尋樵徑上真情還與世情踈雲山犬吠流星過天外雞鳴曉日初昨日有人相問訊旋將落葉寫回書讀此想見其人矣西山記吳猛字世雲嘗乘鐵船於廬山之頂俄有赤龍負之而遊於海越溪道士少室仙伯托遺秦川城北山絶頂之上有隗囂宫宫之壯麗莫得狀之門限皆琢青玉為之瑩徹如琉璃蜀中道士云古仙人有詩在限下土際求之果爾其詩曰越溪道士人不識上天下天鶴一隻洞門深鎖玉窗寒滴露研硃點周易王氏神仙傳王仙君以天復初自上黨雲遊經北邙緱氏入嵩山放志林谷迷其所之歲餘門人道士與其弟姪自壺關大行南遊嵩少歷問所經宫觀物色求之乃於嵩山西北絶崖中見之仙君端居嚴竇之內宴坐凝然門人等皆炷香瞻禮不忍捨去君曰太上以我夙有微功召為少室仙伯仙凡路隔勿復悲戀言訖騰空而去畢靈引艘仙柯拔宅晉史畢靈建昌人也性少言與小人羣居多見侵辱而無愠色邑里號之癡時順陽樊長賓為建昌令發百姓作官船於建城山中船成當下水以二百人引一艘不能動方請益人靈曰此以過足但部分未至耳靈請自牽之惟用數人而去如流衆大驚怪咸稱其神北夢瑣言唐儀鳳中青城縣橫源翠圍山下有民王仙柯服道士所遺靈丹拔宅上升已具仙傳拾遺瞿生捶遁羅郁罪謫廣記道士瞿生被師捶急遁入一室穴中頃時持一棋子出曰適遇秦人下棊留飲此棊子乃秦之物也師視棊子狀如小龜光潤如玉真誥萼緑華女仙之真也於晉升平間降于羊權之家云我本九嶷山得道神仙羅郁是也以罪謫暫降混濁之世以償其過乃謂權曰無思無慮無貪無求無事無為行人所不能行學人所不能學恬淡苦勤內行故我行之已九百年矣今授汝以尸解之訣權亦得道今在湘山不出千韶天書王褒神策續仙傳葉千韶事西山道士學十二真君之術隱居深山遇神將帶劒佩龍虎符有黃衣緑衣二人執簿書前拜曰天命授君此簿神將吏兵充備役使以救世人千韶授天書閲之若人間之兵籍也有事呼召即至自後凡有邪崇聞千韶之名自愈得符者終身不病人皆以為神王氏神仙傳王褒入華山一夕忽聞簫鼓之音千乘萬騎浮空而下見一神人曰吾乃太極真人聞子劬勞山林未該真要良可愍也後命郭靈蓋授君神策玉璽拜為清虛真人理小有洞天事自東擊虺趙昱斬蛟傳奇韋自東遇一道士曰吾合龍虎丹信宿將成多有妖魔須得勇夫烈士仗劒攔截藥成當分惠自東從道士之高峰石洞燒丹之室道士曰五更初仗劒立洞門見精怪擊之無懼也俄有巨虺來自東以劒擊之而去異人録趙昱從道士李珏隱青城山隨煬帝知其賢起為嘉州太守時犍為潭中有老蛟為害昱涖政五月沒舟船七百艘昱大怒率甲士千人夾江鼓噪聲振天地昱持刀沒水有頃江水盡赤石崖傾吼如雷昱左手執蛟頭右手持刀奮波而出韋見斷筆曹視束茆廣記唐西川採訪使韋行武有姪曰子威有部卒丁約者執役於部下一日别去不可留曰五十年近京相見子威自後尋訪絶亡蹤迹子威後調官道由驪山旅舍聞通衢喧甚出視之則兵仗嚴衛桎梏纍纍其中一人乃約也子威驚認之際丁笑密謂威曰尚記臨邛别否一瞬五十年矣威問何為而致此耶約曰吾言之久矣何逃哉威問所須云須筆威搜囊中以進臨刑之日之威往觀丁亦目子威微笑及揮刃之際子威獨見斷筆霜鋒倏及之次而丁囚已躍出謂威曰自此遐遁矣勉於奉道猶隔兩塵當候於崑崙石室言訖而去道謂之塵釋謂之劫俗謂之世也丹臺新録左慈字元放能變化術曹操求之不與曹公欲殺之遍令逐捕人見慈即當殺之數日或有見慈者輒便就斬持其頭以白曹公公大喜就視之乃一束茆耳左蛟蹙縮陳虎咆哮高道傳左元澤居一巖室左右有大竹十本前池於曲渚中有碧芙蓉數十朵文禽數十隻類鸂鶒遊泳其間嘉其趣因宿室中至夜有物環其身既覺唯瞑目坐忽達旦方解去視其布褐唯聞腥涎是夕復坐室中布綱步以伺之果一物自池出長數丈兩目光射人若蛟螭狀甫巖呵喻徐而蹙縮入池因戒曰後學輩無術愼勿獨棲巖穴也又正懿先生姓陳名寶熾誦大洞經通感故珍禽異獸常來侍衛每朝老子祠及八節投龍簡則白虎馴繞左右導從往來人或有惡意則咆哮震奮觸觀左之槐使彼惡者驚畏自匿因號曰考虎木公昉遺鼠忠恕稱貓仙傳拾遺唐公昉師李八百得其神丹遂舉家拔宅升天雞犬皆去唯鼠空中自墮腸出一月三易其腸今山下有拖腸鼠束廣微所謂唐鼠也志林郭恕字忠恕周廣順中為周易博士貶乾州司户秩滿遂不復仕多遊岐雍京洛間縱酒逢人無貴賤常口稱貓遇山水佳處輒絶糧不食盛夏曝日中體不沾汗窮冬大寒鑿河冰而浴傍冰皆釋復卒葬於道傍及改葬視之空空如蟬蛻焉趙熙救惠董奉活燮真誥趙熙漢時為幽州刺史能濟貧人於河中救王惠等於誅族數十事其身得詣朱陵而子孫並在洞天中神仙傳董奉字君異時杜燮為交州刺史得毒病死三日奉時在南方往以三圓藥納口中食頃燮開目動手足顔色遺故半日能起坐遂活人問其故曰初見赤衣吏追云董真君有命遂得回耳邠公觀像曹王出獵廣記杜邠公悰幼時嘗至昭應縣與羣兒戲於野外有一道士獨呼悰以手摩挲曰郎君勤讀書勿與諸兒戲指其觀曰吾居此頗能相訪否既去悰即詣之見荒村古觀巋然一殿存焉內有老君像初道士半面紫黑色至是詳觀頗類向者所見之道士也乃半面為漏雨所淋也原化記唐曹王貶衡州時有張山人伎術之士也王嘗出獵得鹿十頭圍已合失之不知其處召山人問之山人曰此是術者所隱耳遂索水以術禁之俄於水中見一道士長才及寸負囊杖而行王問山人曰可追否曰可王令追之道士笑而來王問鹿何在道士曰向見鹿即死故哀而隱之今在山側王遣人視之皆隱於小坡而不動王笑而遣之童子回舟老翁負笈稽神録婺源公山二洞有穴如井咸通末有鄭道士以繩縋下百餘丈傍有光往視之路窮阻水隔岸有花木二道士對棊使一童子刺舟而至問欲渡否答曰當還童子回舟而去鄭復縋而出明日井中有石筍塞其口自是無入者幽怪録侯遹劒門外見四黃石大如斗收之皆化為金遹貨財百萬市美妾百餘人大第良田甚多忽一老翁負笈曰吾來求君償債將我金去不記憶乎盡取遹伎妄投於笈亦不覺窄須臾已失所在後數年見老翁擕伎行問之皆笑不言逼之又失所在子陽桃皮田鸞柏葉真誥黃子陽魏人也少知長生之妙入博落山中學道九十餘年但食桃皮飲石中黃水後遇司馬季主遂得度世廣記田鸞入華山遇異人指柏木示之曰此長生藥也何求於遠鸞歸服柏葉數年自覺身輕一夕夢神仙持節相引入洞衆仙皆曰服柏仙人來勒名上清玉策金字復告之曰爾且止於人間候有位即召遂悟自後隱於嵩陽百二十三歲少容三洞羣仙録卷之九
