  - {type: variant, offset: 0, length: 0, content: '', CK-KZ: 道全於晉永嘉中上昇貧士抱龍稚川除虎野人閑話灌口白沙有泰山府君廟每至春三月蜀人軿集忽一人鶉衣百結顏貌憔悴亦往廟所眾人輕之行次江際乃坐於石上逡巡謂人曰此水中有睡龍眾不之應遂解衣入水抱一龍出腥穢頗甚深閉兩目而爪牙鱗角悉備雲霧旋合風起水涌眾皆驚走貧士亦瞥然不見神仙傳葛洪字稚川洪嘗養牛數爲虎所暴乃書符劾之見一人自稱高山君白洪曰虎狼爲害當已除之矣重刋道藏輯要}
