  - {type: variant, offset: 0, length: 0, content: '', CK-KZ: 子陽桃皮田鸞柏葉眞誥黃子陽魏人也少知長生之妙入博落山中學道九十餘年但食桃皮飲石中黃水後遇司馬季主遂得度世廣記田鸞入華山遇異人指柏木示之曰此長生藥也何求於遠鸞歸服柏葉數年自覺身輕一夕夢神仙持節相引入洞眾仙皆曰服柏仙人來勒名上清玉策金字復告之曰爾且止於人間候有位卽召遂悟自後隱於嵩陽百二十}
