front:
  text: 三洞羣仙録卷之十五設五
  hash: sha256:66e0b895f594bfab7528f7578b9d5e6d9d66495813dc1bbea50ec3d2d7622c78
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0057_HFL_015-001a, image: hfl/0994/0994-174.png}
body:
  text: 正一道士陳葆光撰集河公道尊元君仙最神仙傳云河上公者莫知其姓名也漢孝文帝時結草為庵于河上常讀老子經文帝好老子之言遣人齎不解之義問之公曰道尊德貴非可遥問也帝即駕乗而從之乃下車稽首問其奥義公曰常以百姓心為心也雲笈七籤任生隱於嵩山讀書一夕見黄衣人執手牒追去曰子命已盡約行數十里幢節旛蓋迆邐不絶有女子乘翠輦侍衛數十人黄衣者與生辟易隱於墻下女子遥見問何人黄衣具以實對女子取牒視之曰今既相遇不能無情索筆判云更與三年生再拜謝之因問使者黄衣云此三素元君仙之最貴也生果再甦後三年乃卒麟伯屋穿紫霄石碎天師内傳張子祥字麟伯博通羣經仕歷洛陽尉棄官與妻退隱龍虎山志在脩煉能吐腹中丹置掌上玩弄或投器中光芒穿屋復吞之年百有餘歲後卒葬之空棺而已神仙傳五代時江南道士譚紫霄有道術能醮星象禹步魁罡禁制鬼魅住廬山棲隱洞時鄴僧於溪滸剏亭宇有為頑石所礙雖致工百倍不能平之師往見曰斯固易矣以指捻訣以水噀之命鎚之其石應手粉碎矣一旦平焉月娥竊藥江妃解佩神仙傳羿有不死之藥妻竊服之奔月為姮娥集仙録江妃二女出遊江濱皆麗服華裝佩十兩明珠大如荆雞之卵鄭交甫見而與語求之解其佩與交甫交甫懷之去數十步俱無見焉又韓詩内傳云昔鄭交甫將之南楚適彼漢高臺下乃遇二女佩二珠大如鷄卵交甫與言曰欲子之佩兮二女解佩與之交甫既行二女忽不見佩亦失之武夷設席祝融召會武夷山記秦始皇二年八月十五日武夷君會郷人於慢亭峯上男女千餘人東西各設地席施紅雲之茵紫霞之褥奏賔雲左仙之曲酒行令歌師彭今昭唱人間會别之曲詞曰天上人間兮會合幾稀日落西山兮夕鳥歸飛百年一餉兮志與願違天宫咫尺兮恨不相隨歌罷忽綵雲四合郷人與仙人相别乃下山回顧峯頂無復一物矣高道傳薛季昌居衡山研真窮妙明皇嘗召入禁掖問以道德而談極精微上喜恩寵優異一日忽謂弟子曰祝融峯今夕天真之會予被召當往遂凌空而去賓聖白犬萬祐青猪高道傳杜光庭字賔聖一日忽謂門人曰昨夢朝上帝以吾為岷峨主司今青城已創真宫恐不久於世矣光庭嘗畜一白犬目之曰吠雲令以胡麻油塗足繒布裹之曰吾聞油塗犬足可日行萬里及真宫成遂披法服升堂集門弟子囑别而化異香滿室吠雲亦號叫而斃廣記萬祐脩道於黔南無人之境每三二十年出城都市藥蜀王建迎入宫盡禮事之問其服餌皆祕而不言曰吾非神仙亦非服餌之士但虛心養氣仁其行尠其過問其齒則曰吾只記夜郎王蜀之歲蠶叢氏都郫之年時被請出但見烏兔交馳花開木落不記其甲子矣後堅辭歸山建泣留不住問其後事皆不言之既去於所居壁間見題字曰莫教牽動青猪足動即炎炎不可撲鷙獸不欲兩頭黄色即其年天不哭智者不能詳之至乙亥年起師東取秦鳳乙亥是為青猪為焚𤍽之期也後三年歲在戊寅土而建殂方知寅為鷙獸干與納音俱是土土黄色是以言鷙獸兩頭黄此言不差毫髮桓闓執爨柳浩掌厨神仙傳宋桓闓字清遠事陶隱居於茅山華陽館十餘年立性端謹寂默若無所為一日有二青童一白鶴自空而下集于庭隱居忻然而接為己當之青童曰太上所命者桓先生也隱居默計門人皆無姓桓者索之唯得執爨闓焉詰其所致則曰常脩默朝之道已九年矣故有今日之召闓服天衣駕白鶴升天仙傳拾遺柳浩者家世奉道焚修精恪年八十餘身嘗無疾郷里疑道力之所及也忽一旦謂其家曰吾昨奉天符太上有勑使我於九仙寳室洞掌仙官厨膳百年來日當行至期無疾而終異香盈庭數日始絶柳融粉龜張果紙驢神仙傳南極子柳融取粉塗盃呪之成龜煮取其肉食之呪其殻復為酒盃又能含粉成雞子吐之數十枚煮而啖之雞子中黄皆有少許粉又取水呪之即成美酒飲之皆醉高道傳張果常乗一白驢日行數百里休則疊之其厚如紙置於巾箱中乘則以水噀之復成驢矣魯逢修舍奚山造車仙傳拾遺魯逢者善於木工往來齊岱之間壽張令别業舍壞二十餘間使吏召匠以修之吏執逢駈行逢邀吏就肆飲酒去莊三十餘里日暮而逢已醉卧令頗剛躁吏甚為憂洎明日又召酒飲吏促之使行逢曰本為脩莊舍舍已正矣何見促之甚吏不能解其意良久村童自莊所至云昨夜似有風雨舍已修整矣吏以事白令召而謝之唯唯而已又奚樂山不知何許人大和中長安大雪月餘負販小民求食無路樂山因冒雪往車之家謂之曰我善作車輻可立致百所計功三百文其家使為之燃燈運斤日昃而作未逾三鼓百所成矣凌晨錢三十千歸以拯飢貧者雪霽告發不知所之列子御風可雲卧雪南華真經列子御風而行冷然善也旬有五日而後反彼於致福者未數數然也此雖免乎行猶有所待也若夫乘天地之正御六氣之辨以遊無窮者彼且惡乎待哉續仙傳杜子昇字可雲自言杜陵人莫測其年壽飲酒三斗不醉能沙書冬卧雪中三兩日人以為僵死或撥看之徐起抖擻雪而行如醉睡醒唐杜孺休為蘇州刺史忽聞可雲在城市乃延入州拜呼道翁賔僚訝之孺休曰先君出鎭西川日與道翁相善别來四十年而裝飾顔貌一如當時後入杭越間去夸父追曰太白捉月大荒經云有人珥兩黄蛇名曰夸父又列子云夸父不量力欲追日影逐之於嵎谷之際渴欲得飲赴飲渭河渭河不足將走北飲大澤未至道渴而死棄其杖尸膏肉所浸生鄧林鄧林彌廣數千里焉摭遺子美後說李太白宿江上於時高秋澄流若萬頃寒玉太白見水月即日吾入水捉月矣尋不得尸說者云水解此神仙之事也雲漿元道石髓王烈高道傳葉法善字元道括蒼人世為道士母留氏晝夢流星入口吞之有娠十五月而生七歲溺大江三年而還父母詢其故曰青童引我飲以雲漿復朝太上故少留耳王氏神仙傳王烈字長休中散大夫嵇叔夜甚欽愛之數數就學共入山遊戲採藥後烈獨之太行山中忽聞山東北有聲如雷烈不知何等往視之乃見山破石裂有青泥流出如髓烈取食之即與叔夜往視之則斷山已復如故按仙經云神仙五百年輙一開其中石髓出得而服之壽與天相畢烈前得者必是也沈彬三舉董威百結郡閣雅談沈彬字子文好神仙少孤西遊以三舉為約初一舉作夢仙謡云玉殿大開從容入金桃爛熟没人偷鳳驚寳扇頻翻翅龍懼金鞭迴轉頭第二舉憶仙謡曰榆風颯九天秋王母朝回宴玉樓日月漸長雙鳳睡桑田欲變六鼈愁雲迷簫管相隨去星觸旌幢各自流詩酒近來狂不得騎龍却憶上清遊第三舉納省卷贈劉象為首云曾應太中天子舉四朝風月鬢蕭踈不隨世祖重携劒却為文皇再讀書十載戰塵消舊業滿城春雨壞貧居一枝何事於君惜仙桂年年幸有餘主司覽彬詩是年特放象及第彬後南遊湖外亦有道者也逸士傳董威在洛陽居白社以殘絮縷帛為衣號為百結脩通行者袁滋士流雲笈道士聶師道聞梅真人蕭侍郎皆隱玉笥山時人多見之師道乃至玉笥寓清虛觀三遊郁木坑或冀一見堅心以去山行極深忽見一人布衣烏紗帽自稱行者問師道何往聶以尋梅簫為答行者曰聞爾精勤慕道遍訪名山情亦非易爾宿業甚静已應玉籍有名雖未便飛昇亦當度世我謝修通又袁相公滋未達時因暇日登復州青溪有一人儒服與語甚狎袁公曰此境山泉奇異當有靈仙之所都府儒生曰有道士五六人間或一來亦不知所居處彼惡人知然得美酒庶或一見也公後得美酒而往歷數宿道流果來儒生為列席致酒儒生乃引袁公出拜道士相顧失色乃怒儒曰此人誠志況是士流良久遂意解固目袁生曰此人似西華坐襌僧去來已四十七年矣問袁公之歲適四十七矣撫掌曰公福禄已至公後果拜相焉左慈眇目許畫偏頭三洞神仙記魏左慈能變化後入東吴吴有徐墮者居丹徒慈過之墮門下有宿客誑云徐公不在慈知客狂己便即去客見牛在楊木杪行適上木則不知所在下木即得牛在木上又車轂皆生荆棘長一二尺斫之不斷推之不動也客大懼即報徐公說有一眇目老翁吾欺之言公不在及去車牛如此徐曰此左慈也汝曹那得欺之諸客分布逐慈叩頭謝之慈意解即遣去還見車牛如故括異志成都畫師姓許善傳神一日有貧人弊衣憔悴來求傳神許笑曰君容壯若此而求傳寫何也其人解布囊出黄道服鹿皮冠白玉簪頂冠易衣危坐以手摩面則童顔矣引其鬚應手而黑乃一美丈夫也許驚曰不知神仙降臨道士曰君傳吾象置肆中有求售止取千錢後有識者曰此靈泉朱真人也求者輻輳許貪畫直每象輒取二千夢道士曰汝福有限不可妄取安得忽吾言將促其壽也因批其頰既寤頭遂偏乃號許偏頭子推黄雀君達青牛神仙傳介子推晋人也隱而無名趙成子與之遊旦有黄雀在門上晋重耳異之與出居外十餘年勞而不辭及還介山有伯子者常來呼推曰可去矣推乃從伯子遊後文公遣人以玉帛徵禮之而不去高道傳封𢖍字君達常駕一青牛因號青牛道士人有病不問識與不識便以腰間竹管中藥與之或下針應手立愈魏武帝問養性大略師曰體欲常勞食欲常少勞勿過極少勿過虛去肥濃節酸鹹减思慮損喜怒除馳逐愼房室春夏施寫秋冬閉藏則幾於道矣上林獻棗河陰市榴東方朔傳曰武帝時上林獻棗上以杖擊未央前殿檻呼朔曰叱來叱來先生知篋中何物朔曰上林獻棗四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩大林也朔來來來棗也叱叱者四十九上大笑賜帛十疋高道傳道士張元化不知密修何道郷人一旦皆夢元化來别云且暫遠遊是夕果羽化達旦人有疑而來訪者大小皆同既葬之後塚上有一竅可容臂識者云此蟬蛻矣未幾有客自河陰來貨石榴於汝墳中途遇一道士自云我乃汝墳張觀主託附一書仍市石榴數十顆獻于北極殿客諾之既至其徒曰此書乃師之墨迹也引客至影堂客曰向所見者與此略無異焉携琴負壺浮家泛宅高道傳道士李真隱華山岐州之西王祐者家巨萬計常設館以待四方嘉肴旨酒無不備具真携琴負藥壺謁祐遂延于館真曰我聞人之好樂皆有以師縱横者必有游說之志讀韜略者必有戰敵之心吾携一張琴一壺藥豈無旨哉携琴者我知琴有古風欲使人還淳朴省澆浮也負藥壺者我知人之多病欲使人少疾苦常安平且我之琴非止自化也化人也我之藥非止自保也保人也君雖能以有餘濟於人固與不義而誅剥以富者則異矣比古之豪貴待士則未也要在賢不肖有别則君之身名可保無累矣真乃命酒自酌達曉遽辭去祐潜伺之見真化一大鹿西走不知所之唐史屬辭張志和字子同顔真卿為湖州刺史志和來謁真卿以舟弊陋請更之志和曰願為浮家泛宅往來苕霅間李德裕稱志和隱而有名顯而無事不窮不達嚴禮以敬三洞羣仙録卷之十五
