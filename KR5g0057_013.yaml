body:
  text: 正一道士陳葆光撰集沙苑矯翅華陽養翮高道傳益州城西有道觀非修習者莫之居徐佐卿嘗自稱青城道士一歲三四至天寳中重陽日明皇獵于沙苑見雲間一孤鶴翔飛上射中之帶箭而墜焂然矯翅翥于東南是日佐卿携箭而來神采不怡謂人曰吾行山中偶為此物所加已無恙矣此箭非人間所有越明年箭主到此當付之遂留於後壁復題其時云十三載九月九日也明皇狩蜀至觀因幸道院見前箭命取閱之即御箭爾上驚異詢之道士以實對即知前歲沙苑中所射之鶴乃徐佐卿也復覽其題則又知當日自沙苑一翥而至于斯也今有飛仙嶺傳佐卿帶箭飛泊之所下有飛仙觀存焉真誥姜叔茂為巴陵侯棄官入句曲山修煉道戌寄書與僚友云我昔學道於鬼谷道成於少室養翮於華陽待舉於逸城時乘飈輪宴我句曲悟我永嘆代謝之速馮長回黄世京守白真誥馮長字延壽年十五通陰陽占候之術感鄧真人授書能回黄轉赤而面生玉澤道成今為西嶽真人又陳世京守玄白之道常旦旦坐卧任意存泥丸黑氣心中白氣臍中黄氣三氣俱生如雲以覆其身因變成火火燒於身洞徹内外如此旦旦行之服氣二十過畢乃止所謂知白守黑欲死不得知黑守白萬邪消却世京後得仙裴雲盤旋戚霞焕赫續仙傳裴元静幼而恬淡及笄願入道父母曰女生有歸遂逼之以適李言為妻夫妻如賔幾月乃告於夫曰神人不許為君妻請絶之獨居一室中夜嘗聞談笑之聲夫疑而潜窺之光明滿室及旦與夫别去而雲霞盤旋仙女奏樂而元静上昇戚氏號逍遥好道誦經不輟及笄父母强適薊尋為妻而逍遥獨處一室絶粒静坐而人莫得而測一夕聞屋裂如雷聲但見衣裳在室仰視雲霞焕赫而逍遥上昇正節野人含光清客高道傳吴筠天師字正節天寳初至京師係道士籍入嵩山依潘師正究其術明皇聞名召與語甚悅上復問道對於道者無如老子五千言復問神仙治鍊法對曰此野人之事積歲月求之非人主宜留意筠每開陳皆名教世務以微言諷天子天子重之道士李含光工篆隸或稱過其父一聞之終身不書後師正一先生雲篆寳書傾囊相付且曰李含光真玉清之客也隱柱羅遠入圖柳成逸史道士羅公遠時明皇一日召見問隱形術對曰陛下以玉書金格簡於九清矣豈以社稷之重而輕徇小術耶上怒公辱駕之走入殿柱中數上過上愈怒劈柱追之既見入玉磶中又碎磶為十數塊皆有公遠之形上謝之乃如故上復强之不已因教焉然不肯盡其術試自隱常露衣帶或見影迹上怒遂斬之有中使輔仙玉自蜀還逢公遠駕與語袖出一書及蜀當歸為寄仙玉具以奏上頗加悔恨天寳末果西蜀之幸當歸不誣矣酉陽雜俎正元末有畫人寧采圖為竹林會甚工坐客郭萱柳成二秀才每以氣相軋柳忽盻圖謂曰今欲為公設薄伎不施五色令其精采殊勝如何郭殊不信柳曰當入彼畫中治之乃騰身起入圖而滅坐客大駭圖表於壁衆模索不獲久之忽語曰郭子信矣聲若出畫中也食頃瞥目圖上墜下指阮籍像曰工夫抵及此衆視之覺阮籍圖像獨異脣若方嘯寧采覩之不復認意其得道與郭俱謝之數日遂遁去子虛學古桃俊明經真境録暨天師名齊物字子虛學古通經傳時有浮屠梵臻問道釋所起之由師為分其同異曰道無前後杳不可稱論也且老子即長生仙道屬太上左宫故老子生左腋手舉於左故貴左法教服其黄黄者陽也得其道則存亡在已出入無間大劫有窮而吾道不泯太子即輪轉生死之道滅度之法屬太上右宫故太子生右腋手舉於右故貴右法教服其緇緇者陰也命盡而有死其二法殊途同歸於太上非至人莫見其奥也聽者嘆服真誥桃俊字翁仲少為郡幹佐明經術晩為交阯太守遇東郭幼平服九精鍊氣輔星在心之術後修之得道今在洞中滕公火鈐許君燈檠澠水醼談滕宗諒待制守歷陽聞山中有逸人隱居窮僻滕訪之會其方眠呼覺揖滕偶坐言極有理滕詢其山居幾許年月始避兵㓂獨處於此但見花卉滿中即知為春草木摇落即知為秋大寒大暑即知冬夏坐久顧滕曰日向夕當亦必飢有山芋野栗可以充餐乃撥松卉火炮芋栗遺滕食訖語以手掊火得無苦耶欲致一火鈐可否笑曰久處山中安於恬淡不欲以物役心鈐無用日暮滕悽然而歸後再遣人致問已不復知所止矣西山記許真君與吴君還豫章因歸逍遥山日與弟子講論教戒郷里人皆遷善遠罪仁孝興行嘗有以鐵燈檠詣山售者真君買之夜為燈照漆剥處細視之乃黄金也遽訪其人還之伯慈疾愈禮正身輕真誥范伯慈有邪勞之疾頓卧經年費用家財而疾不除於是發心入道棄俗務静坐修養五十日而疾愈於是入天目山服食精思十九年感真仙降授丹藥服食白日昇天補為元一真人衡山有學道者張禮正初遇西城王君授丹方服食自後目明身輕日行五百里東華帝君遣迎白日乘雲上昇漢武四多黄帝七昧仙傳拾遺月支使者謂武帝曰眼多視則貪恣口多言則犯難心多動則淫賊身多則奢侈未有用此四多而天下成治者也黄帝内傳王母授帝七昧之術帝曰何謂七昩王母曰目昧即不明耳昧即不聦口昧即不爽鼻昩即不通手昧即不固足昧即不正心昧即不真但心不亂即真矣目不昧即明矣耳不昧即聦矣口不昧即爽矣鼻不昧即通矣手不昩即固矣足不昩即正矣是知七昩其要在一一之稍昩六昩俱塞則一身不治近於死也黄覺餞客仙鳳赴會劉貢父詩話黄覺善詩嘗餞客都門外至則客已遠不及旅舍中見一羽士在側因取所携酒肴呼道士共飲食既罷道士舉皿摭水寫吕字覺始悟其為洞賔也道士曰明年江南見君覺果得江南官及期見道士出懷中大錢七其次又三小錢曰數不可益也予藥可數寸許告曰歲旦以酒磨服之可保一歲之疾覺如其言至七十藥亦垂盡作詩曰牀頭曆日無多子屈指來年七十三果以是歲終仙傳拾遺劉仙鳳者九隴道士也因入白鹿山見神人授隱祕之術堋口山有大雪寺方衆會仙鳳與道流十餘人赴其會既不為之禮鳳與道流纔出忽聞齋處衆人驚徹連聲不已云籬外籬中有虎三十餘頭縱横出入衆不暇食憂懼莫知所為僧知其術也命衆人與衆僧望仙鳳焚香致禮悔謝虎乃息元卿麟脂介象鯔膾續仙傳謝元卿遇神仙設鳳冠粟龍精稻麟脂班螭髓玄洲白㮈空洞靈瓜扶桑丹椹清河文藻又有瓊𥹋酒桂腦芸英又彈八琅之璈叢霄之笙洞陰之磬奏元鈞之歌回鸞轉鳳之舞廣記介象字元則與吴王論膾何者最美象曰海中鯔魚為上請於殿前作方坎汲水滿之象垂綸於坎中食頃得鯔魚作膾章后折爪守一破塊感應録陳武帝章皇后母蘇氏嘗遇一道士以一小龜遺之光彩五色曰三年有應及期后生紫光照室因失龜所在后少美容儀手爪長五寸色並紅白每有期功之服則一爪先折王氏神仙傳王守一貞觀初自號終南山人王布衣賣藥於洛陽富人柳信生一子眉上一肉塊布衣壺中抔藥一粒傳之須臾肉破有小蛇突出五色爛然漸及一丈許布衣叱之蛇躍起雲霧昏暗布衣乘蛇而去王倪飛步許鵲上昇王氏神仙傳王倪即齧缺師也得道於羲農之間黄帝遇之以傳道要歷少昊顓帝世常遊人間行飛步之道堯舜之時猶見者後一日昇天郡閣雅談許鵲真人唐末遊南嶽招仙觀壁上題歌一首云洪鑪烹鍊人性命器用不同分皆定妖精鬼魅闘神通只自干邪不干正黄口小兒初學行唯知日月東西生還為萬靈威聖力移月在南日在北玉是玉兮石是石藴棄深泥終不易鄧通餓死嚴陵貧帝王豈是無人力丈夫未達莫相侵攀龍附鳳損精神題後數日上昇子長德合圖南道成真誥太上真人告長史云我見南陽樂子長淳朴之人不師不受順天任命亦不知修生之方行不犯惡德合自然雖不得延年度世死登福堂煉神受氣名賔帝録今補脩文郎天資有分亦由先世積德流慶所及若使有攝生之理兼行太上之訣以此求道無往不舉矣高道傳陳摶字圖南舉進士不第肆志山水間凡二十餘年夜於庭間見一金甲神人持劒曰子道成矣當有歸成之地先生曰何謂歸成金人云歸成之地者蓋秋為萬寳之所歛而歸者也吾其隱於西方乎遂遷入華山居淳風占日薛賾諫星國史異纂唐太史李淳風校新曆日太陽合朔當蝕既於占不吉太宗不悅曰日或不食卿將何以自處曰如有不蝕臣請死之及期帝使人於庭謂淳風曰吾放汝與妻子别對以尚早一刻指表影曰至此則蝕如言而蝕不差毫髮又嘗奏曰北斗七星當化為人明日至西市飲酒宜令候取太宗從之乃使人候有婆羅門僧七人入自金光門至西市酒肆登樓而飲使者登樓宣勑曰今請師等至宫胡僧相顧而笑曰必李淳風小兒言我也飲畢下樓已失胡僧所在仙傳拾遺薛賾河東汾陰人後居渭州去俗為道士明於天文律曆太宗將封襌有彗見賾諫而止之每奏災祥與李淳風符契後無疾而卒有異香雲鶴天樂之異山下及觀中咸聞見之及葬空棺而已子華太霄遠遊上清真誥山陽吕子華陰君之弟子也服虹丹之液未讀内經來從太君授太霄隱書而誦之常以幽館方臺為樂而不願造仙位許先生邁改名遠遊乃長史之兄也君清虛懷道幽棲野外遇異人授返行之法服玉液朝腦精而面光華還顔返少晉永和中嘉遁不返後棲大滌中峰丹成天降玉童白鹿下迎今南陵院乃其遺跡公房䑛瘡張蒼吮乳神仙傳李八百蜀人也年八百歲因以為號或隱山林或出市里唐公房有至心而不遇明師李欲試之為作偏客公房不知是仙人八百驅使用意過於他客公房甚愛之後八百偽作病困欲死公房為迎醫合藥價數十萬不以為損憂念之意形於顔色八百轉作惡瘡遍身臭不可近八百曰吾瘡若得君䑛之當愈公房即為䑛八百曰君䑛復不能愈君婦䑛之當愈公房乃使婦䑛八百曰然三十斛美酒浴當即愈公房乃為具酒浴瘡體如凝脂亦無餘痕乃告公房曰吾是仙人子至心故相試爾子可教也以丹經一函授之公房入雲臺山中合丹丹成而白日昇天抱朴子漢丞相張蒼偶得小術吮婦人乳汁得一百八十歲此蓋道薄者耳而蒼為之猶得中壽之三倍況於備術行諸祕妙何為不得長生乎沙海石蕖唐昌玉蘂拾遺記黄帝使風后負書常伯荷劒旦遊洹沙夕歸陰浦萬里一息洹沙有石蕖一莖百葉千年一花其地一名沙瀾沙湧起成波瀾也中有神龍魚鼈皆能飛翔仙人寧封食飛魚而死二百年更生故寧先生遊沙海頌云青蕖的皪千載舒百齡暫死食飛魚劇談録長安唐昌觀有玉蘂花車馬尋翫者相繼一日有女子年可十七八衣繡衣垂鬟容色婉娩從以二女冠三小僕僕皆丱髻容彩端麗無比異香馥郁佇立良久令小僕取花數枝曰曩有玉峰之期此可以行矣舉轡須臾已在半天方悟神仙之遊也道士振衣將軍舉塵括異志方道士失其名隱於滏陽之西山磁州有護國靈應公祠每歲二三月天下所獻奇禽異獸巧工妙伎珍肴異果無所不有人多會於祠下遊覽宴聚以至夏初社人罷去及期方道士無歲不來常以九蒸黄精以遺交舊一歲忽不至皆謂徙居他山或以為物故春城隍廟神座後有死人塵埃厚且寸餘官吏將檢視忽振衣而起乃方道士也復陪諸君酣飲月餘乃去自是不復來真誥保命君語楊真人曰許子能委形冥化從張鎭南受夜解法云許子即許掾是也係師為鎭南將軍尸解葬鄰東後四十四年至魏時遇大風木棺開見尸如生舉塵尾覆面而大笑便者迎茅天玉問許茅山記三天使者乘紫雲擎玉板披繡衣齎命至大茅山迎大茅君君授命而赴赤城之任今茅山有繡衣亭是當時受九錫之處也真誥仙人王子登位為小有天王東卿知許長史之慈肅而子登問此人今何在東卿曰是我郷人也内明真正外混世業乃良才也今脩上道插花飲酒擊竹和歌郡閣雅談李夢符梁開平初鍾傅鎭洪州日與布衣飲酒狂吟放逸四時常插花以釣竿掛一魚向市肆蹈漁父引賣其辭好事者爭買得錢便入酒家其辭有千餘首傳於江表略其一兩首云村寺鍾聲渡遠灘半輪殘月落前山徐徐撥棹却歸灣浪疊朝霞碎錦翻又曰漁弟漁兄喜到來婆官賽却坐江隈椰榆杓子木瘤杯爛煑鱸魚滿案堆鍾傅以其狂妄惑衆將罪之夢符於獄中獻詩十餘首其略曰揷花飲酒無妨事樵唱漁歌不礙時鍾不之罪遣之後不知所在神仙傳擊竹子不知其姓氏在成都酒肆中手持一竹節相擊鏗然有聲歌以和之所歌辭旨皆合道意如此十餘年一日東市藥肆語黄氏子曰余知長者好道今欲以誠奉託可乎黄曰願聞其所須曰我乞士也在七里亭橋下今病甚且死死之日幸火焚之然愼勿觸我心翌日至橋下見之擊竹子欣然感謝言訖而逝黄為置衣衾具棺歛焚於郊外即聞異香馥郁鳥鳴至晩其心不化且如斗大黄氏子以日暮欲歸誤以杖觸其心忽炮聲如雷人馬驚駭見有人長尺餘自煙焰中即擊竹子也手擊其竹嘹然有聲杳杳入雲中而去厲畫一鷂董歎二鵝高道傳道士厲歸真唐末遊洪州信果觀見三官殿功德塑像乃明皇詔以夾紵製作甚妙然主者不甚嚴護常有雀鴿糞㸃汙歸真遂於壁畫一鷂自此雀鴿無復栖止後有人見歸真於羅浮山登真晉逸史董養字仲通陳留浚儀人泰始初到洛下不干禄求榮木嘉中洛城東北步廣里中地陷有二鵝出焉其蒼者飛去白者不能飛養聞嘆曰昔周時所盟會狄泉即此地也今有二鵝蒼者胡象白者國家之象其可盡言乎顧謂謝鯤阮孚曰易稱知機其神乎君等可深藏矣乃與妻荷擔入蜀莫知所終德誠蛇劒陶侃龍梭仙傳拾遺鄧德誠者撫州臨川人世崇於道每焚香常誓佐國扶教入道於麻姑山親友聞其志或謂曰夫佐國之功非文武不可也吾子退為道士何以遂斯志邪笑曰此志非世人所知也忽一日自山中還私第中道逢巨蛇横路掬水以噀之曰汝若龍也當隨水飛騰勿障行徑蛇忽化為劒持之以歸一旦有道士見之曰此神劒也乃教以所用之法明皇耽味至道博訪道術詔至京師暇日因謂德誠曰石堡之城頗為邊患德誠曰臣以草野之賤荷非次之恩敢不效用以安聖慮乃燃七燈以象斗形焚香冥祝乃有一燈飛去勢若流星石堡之城為灰燼矣真誥云陶侃為西河侯侃嘗捕魚得一梭因掛著壁間有風雷梭成赤龍從屋而躍出事見劉欽異苑玉源寳馬芙蓉素騾青瑣劉丞相赴舉京師過獨木鎭有老叟贈詩曰今年且跨窮騾去異日當乘寳馬歸又曰公自是羅浮山玉源道君歐陽詩話石曼卿死後人有恍惚見之者云我今為仙主芙蓉城騎一素騾如飛後又降於舉子家留詩云鶯聲不逐春光老花影長隨日脚移煙蘿三友竹溪六逸真誥鄭遨字雲叟舉進士不第唐末振衣遠去入少室山為道士有二青童一鶴一琴從之遊處與梁室權臣李振友善振欲禄之拒而不諾既而振得罪南遷遨徒步千里往省之由是聞者益高其行遨聞華山有五粒松脂淪地千年化為藥能去三尸因徙居華山與道士李道盛羅隱之三人為煙蘿友世目之為三高士唐李白善縱横術擊劒為任俠輕財重施客任城與魯中諸生孔巢父韓準裴政張叔明陶沔居徂來山日沉飲酣歌號竹溪六逸王探投簪韋節還紱丹臺新録王探字養伯太原人也神標頴秀幽樞潜密靈規洞洽絳精凝皓景粲霄衢誠凝玉陛所以瑶林翳薈仙浪潔渟故能驤首拔藻延頸入素初因吕后攝政權任中常之職至文帝龍飛乃投簪鳳闕天子禮賢以道稱為逸人神仙傳法師韋節後魏莊帝時為陽夏守師道士趙通法師遂還簪紱於朝受三洞靈文神方秘訣後卜居華山之陽人因號為華陽子澤民燕堂杜沖寢室翰林名談張澤民元豐中死而復生云至一處若瓊瑶世界有堂榜曰五相清燕之堂詢門吏可得入乎吏曰此神仙所聚爾不可入問五相姓名曰吕夷簡李迪劉寵龐籍富弼也俄呵道自中出其乘馬者貌類劉夔侍郎呼澤民與語張曰公今去世為仙乎劉曰吾今為土地主比人間守令功行未至何敢望仙被會督役令方畢工軒䆫階砌皆明王也已命王元澤作記邵踈篆矣張曰富相當安何故先有此堂劉曰更三年至矣丹臺新録杜冲師文始先生經上十年感展真人降於寢室授冲丹方謂沖曰地司舉子之功老君遣我授子仙經冲依奉修煉行之有驗能驅策虎豹役使鬼神為通幽洞冥莫測其端矣干吉療病法滿寢疾江表傳吴孫策時有道士干吉讀道書制作符水以療病吴會多事之策常會客郡樓吉趨度門下諸將賔客三分之二下樓拜之止之不能策即收之策母曰干先生亦助軍作福醫護將士不可殺之策不從俄見吉卒後葬之失尸所在真境録法師朱君緒字法滿居玉清觀即解紛異俗尚行全真閉户閑庭下帷虛室器宇宏雅泰定發乎天光情性淵默雷聲洊乎江表爰以玉清本觀地迫諠煩天柱古壇境遠閑静乃拂衣不駐策杖攸往數年之間諸業未就忽寢微疾一朝倐起命水澡浴具冠服焚香端坐語弟子曰吾於彭殤存亡齊之久矣然道妙寂寂感者通焉神理冥冥契者昭焉吾言之矣汝知之矣經法戒行爾其勉諸言訖奄然而逝三洞羣仙録卷之十三
