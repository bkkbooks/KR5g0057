body:
  text: 正一道士陳葆光撰集青丘元老紫微小星異人録台州道士王遠知善易知人死生禍福作易緫十五卷一日雷雨雲霧中一老人叱曰所泄者書何在上帝命吾攝六丁雷電追取逺知惶懼據地旁有六人青衣已捧書至老人責曰上方禁文自有飛天保衛祕藏元都汝是何者轍藏緗祑遠智對曰青丘元老傳授老人曰上帝勅下汝仙品已及授度期展四年二已數也師後於光宅中尸解湘中野録太祖居潜日與趙韓王普遊長安市忽逢陳希夷曰可市飲乎太祖曰可與趙學究同之希夷睥睨韓王曰也得也得既入酒舍韓王足痺偶坐席左陳怒曰紫微垣一小星輙據上次可乎斥之便居席右李虞論語顧歡孝經逸史信州李虞員外與楊稜遊華山俄至一小洞見川巖草木不似人間有紫衣人邀入居處若公府多竹屋堂室甚潔自言姓杜名子華因避世便遇仙侣居此已數百年矣因留宿飲饌皆甚精豐肉有駞羊其狀如牛書有論語留連累日各遺銀器數事遣使者導之而返曰此可住否二子色難子華笑執手而别後尋其洞穴不可見矣道學傳宋顧歡善道術弟子鮑雲綬門前有一株木大十餘圍上有精魅歡印木木即枯死又有病邪者問歡歡曰家有何書答曰唯有孝經歡曰可取仲尼居置病人枕邊恭禮之自差而後病者果愈王遠題門隱容濬井王氏神仙傳王逺字方平明天文圖讖逆知吉凶漢武帝問災祥不答乃題宫門四百餘字預說方來帝惡之令人削除外字雖滅内字復見墨迹徹入板裏廣記房州竹山縣陰隱容家濬井千餘尺而無水工人捫壁見别一天地日月世界榜曰天柱山門内兩童皓齒鬟鬟問汝胡爲至此工人具陳本末須臾有緋衣傳勅曰以禮遣之引至清泉洗浴白泉漱飲甘美似酒行半日見宫室皆金玉題云梯仙國工人詢曰此國如何答曰諸仙初得仙者關送此國修行王皎破腦楊公擊頂酉陽雜爼王皎先生善伎術天寳中偶與客夜中露坐指星月曰時將否矣爲鄰人所傳時上春秋高頗拘忌爲人所奏上令殺之刑者钁其頭數十方死因破其腦骨厚一寸八分皎先與達奚侍郎還往及安史平皎杖屨至達奚家方知異人也北夢瑣言淄齊間有道士楊仙公者莫知其年壽耆老自童稚見之每出閭巷兒童聚而觀之或就鐵鋪借鐵椎自擊其頂或令人極力擊之一無所損唯言甚快入山林與虎豹爲戲以手擊之猛獸爲之偃仆多勸人行陰德長興中入蜀居峨嵋去也祈嘉呼遁仲甫吸景晉逸史祈嘉字孔賔年二十許好學經史夜静忽於䆫間聞有聲呼之曰祈孔賔隱去來修飾人間事甚苦不可諧所得未毫銖所喪已山崖嘉遂遁去西遊海渚教授門生三千餘人王氏神仙傳王仲甫少好道術得吸景飡霞之法行之四十餘年一夕夢神人告之曰子所以不得升度者謂其腦宫虧减靈津未溢遂授以服食之法方得上昇今在玄洲矣成師挈囊伊尹負鼎高道傳成道士不知何許人明皇聞其名召入館于蓬萊院問道術所修皆不對未幾乞歸山上允乃挈布囊而去人皆笑之而後因撤幕壁上有題詩曰蜀路西行燕師北至本擬白日昇天且看黑龍飲渭其字刮洗愈明不數月禄山起明皇乃入蜀仙傳拾遺伊尹商人也其先佐夏爲諸侯母將孕遊於西川之上大水遽至母驚奔避水乃拱而立化爲枯桑水退父來求之謂已溺死忽見枯桑非昔所有疑妻所化以石扣之聞空桑中有兒聲取養之遂以伊爲姓及長明緯候聲律陰陽探幽察微志救天下負鼎干湯湯大悦用之爲相年八十棄位絶粒示死於家太上命太和眞人蒙谷希授以解形之法入蒙秦山石室修之白日上昇元達夢鳥文子擊蜺三洞珠囊鄧郁之字元達南陽新野人嘗夢一鳥吐印以與之自是民間有疾輙以印治救求爲符章病者自愈漢郊祀志注列仙傳曰崔文子學仙於王子喬子喬化白蜺文子驚引戈擊之俯而見之王子喬之尸也須臾化大鳥飛去玉蘭疈腹上仙蛻皮集仙録張玉蘭天師之孫也幼不茹葷年十七夢赤光自天而下光中金字篆文隨光入口中因而有孕母氏責之終不言所夢唯侍婢知之一旦謂曰吾不能忍恥而生死後當剖腹以明我心其夕無疾而卒見一物如蓮花疈腹而出視之乃素書金字本際經十卷傳於世間遂葬玉蘭忽大風雲雨棺飛在木上失經及玉蘭所在今墓在益州温江縣女郎觀是也又董上仙遂州方義女也年十七神姿艷雅故號上仙一旦紫雲垂布天樂下於其庭二青童引之昇天父母素愚號哭呼之不已去地十數丈復下還家居數月又復如是後因蛻其皮於地形衣不解乃飛而去杜瓊作賦許堅能詩眞誥酆都山上林木水澤如世間但稻米粒幾大味如芡其餘四穀不爾但稻爲重思耳杜瓊作重思賦曰霏霏春茂翠矣重思靈氣交被嘉穀應時四節既享祝人以祀神禾鬱乎浩京巨穗橫我元臺爰有明祥帝者以熙此之謂矣雅言雜載許堅江左人多居三茅不知其年歳形容不變多談神仙事能詩如題茅山觀云常恨清風千載郁洞天今得恣遊遨松楸古色玉壇静鸞鶴不來青帝高茅氏井寒丹已化明皇碑斷夢仍勞分明有箇長生路休向紅塵嘆二毛又一絶寄舍人徐鉉云幾霄煙月鎖樓臺欲寄侯門薦禰才滿面夭埃人不識謾隨流水出山來丘伯相鶴桐君碎雞相鶴經云浮丘伯昔授之於王子晉後崔文子學道於子晉得其文藏之嵩山石室淮南公採藥得之遂傳于世經云鶴陽鳥也禀金火之氣以生三年頂赤七年善飛又七年十二時嗚六十年茸毛生泥不能汗一百六十年雌雄相視而孕一千六百年不食而胎生其相以長頸脩竦則善嗚龜背鼈腹則能舞乃仙人騏驥也卓異記建安三年咠圖國獻嗚石雞色如丹大如燕常在地上應時而嗚能逺徹其國聞其嗚乃殺牲以祀之當聲處掘則得此雞若天下太平翔飛頡頏以爲嘉瑞亦謂之寳雞又聽地中以候晷刻道士云仙人桐君採石入穴數里得丹石雞舂碎爲藥服令人有聲氣後天而死寳鼎元年四方貢異珍有琥珀燕置之静室則嗚翔此之類也員外穢夫屯田役卒逸史唐大曆中有王員外郎者好道術雖在朝列布衣山客日與周旋一日會除穢裴老與語王君異之其妻呼駡曰身爲朝官與穢夫交結遣人逐之而去居一日復來布袍曳杖頗有隱逸之風曰員外非眞好道乃是愛藥耳因取王君一鐵合可二斤許解小藥裹兩粒如麻粟撚散合上却堆火燒之食頃取出乃上金色如雞冠王君驚嘆乃别去後不知所之括異志屯田郎曾公奉先嘉祐中知惠州居有蔬圃役老卒守之灌蒔尤力凡所欲之物必先致之曾問曰汝常逆知吾意何也卒曰偶然耳曾自此亦待之善一日白曾曰荷使君厚顧某非碌碌者今夜三鼓請乞一到園中有祕術上聞公忻然許諾將具公裳諸之家人皆曰豈有郡守夜半公裳謁一老卒哉遂止黎明報園子物故仍於腰下得白金數兩曾爲買棺殯于野數月有人自廣州來卒附書爲謝發其塚但布袍巾屨存焉毛女食松何娘採橘神仙傳毛女字正美隱華山形體生毛自言秦時宫人後流亡入山道士教食松葉遂不飢寒身輕如飛陳摶常與遊華山樵人多見之有詩贈曰藥苗不滿笥又更上危巓回首歸去路相將入翠煙其二曰曾折松枝爲寳櫛又編栗葉代羅襦有時問著秦宫事笑撚仙花望太虚續仙傳何阿六者徐州女也華陰雲臺觀爲諸女冠採薪汲水數年諸女冠因話江吴間有甘橘美果而秦川難求阿六笑曰此不難致近亦有之言訖出門食頃袖出甘橘五六枚與諸女冠因曰廣詶柑子甚美又致十餘枚分食之後三年有崔鍊師自羅浮山遊華陰因話及前年廣州官園内有婦人盗採柑子擒之忽失衆乃驗阿六非常人也元放乞骸竇峙藏骨丹臺新録左慈字元放得九丹變化之術曹公求之不與公欲殺之求乞骸骨公爲設酒慈曰今當逺曠乞分盃飲酒公曰善慈拔簪以畫盃酒酒中斷慈即飲半半送與公公不喜未即飲慈乞盡自飲飲畢以盃擲屋棟動摇如飛鳥狀衆舉目矚視已失慈所在眞誥茅君云女仙竇瓊英其七世祖峙每以藏枯骨活死爲事其陰德有及於瓊英之身而得進於華陽洞府宋江鬼堆衡山仙窟天師符記益昌之東有縣曰嘉川又東北二十里有水曰宋江江中有聚石曰天師殯鬼堆江傍巨石有文突起曰天師符如刓如刻如鈎如勒如籀篆而尊雄勁毅如甲胄猛士仗劒而立兇邪視之敦不股慄士人以紙墨印用能辟邪元和七年仲春安行罷官卭南道由益昌華人張當世時知綿谷縣輙以天師符見贈曰非吾郷屬不可得也於是置其符書篋中以歸半年發篋而鼠碎群書獨符無毫髮傷吁其異也宣德郎知鳳翔府扶風縣李安行記其事王氏神仙傳王道長不知何許人居利景谷縣楊謨郷直縣西二十里渡嘉陵江沂安樂溪抵其山下峰巒峭拔溪之東曰仙窟長於此修道舉家得仙其宅基瓴甓猶存焉尹君飲堇杜巫吐丹仙傳拾遺尹君者不知何許人嘗隱晉山不食五穀時尚書李說鎮北門馮翊嚴綬爲從事嚴尚奇好異雅重神仙迎致尹君於官舍日與同席常有異香自肌中出嚴益重之嚴有女弟爲尼常怒其兄與尹君同遊處忽一日密以堇斟使尹飲之既飲驚起曰酒非佳俄吐一物堅而有香嚴剖視之即眞麝臍也尹其夕卒嚴即瘞之明年秋有朱太虚遇尹君於晋山曰吾頃於北門遇鴆酒示之以死然鴆安能敗吾眞邪太虚異其事歸以告嚴公曰吾誠知其尸解矣元怪録杜巫尚書年少未達時曾於長白山遇道士貽丹一粒即令服訖不欲食容色悅澤輕健無疾後任商州刺史自知既登郡守班位已崇而不食恐驚於衆於是欲去其丹歲餘一道士至教食猪血肉巫從之食訖須臾即吐丹出裴氏盤石韋翁古壇廣記裴氏子事親以孝雖貧而好救人一日行遇一老人相拉入太白山見一大盤石老人以杖撃之石開引裴入洞洞中森羅萬象仙童玉女老人復引裴出且告之曰此去二十年可來此避世及期果有安史之禍裴氏一族隱于西嵓遂皆得免焉異聞集代宗時韋侍御奉使華山拜黄帝壇至山下邸中見一老父問壇所在老人曰蓮華中峰西南上有一古壇髣髴餘址此當是也問何姓答云姓韋自述世系乃侍御之高祖也相與入山老人策杖先行韋鞭馬追之不及至石室見二老嫗曰爾之祖母祖姑也俱雙鬟以木葉爲衣喜曰年代遷變一朝遂見玄孫尋與老父上山拜壇畢辭歸後再尋求忘失舊路山下人云此老二三年一來不知其所子玉白首昌容紅顔續仙傳蘇子玉幼而敏惠博覽群書见黃帝採首山之銅鑄鼎煉丹得昇天之事乃拾卷而歎日先儒之書五常之要拘以禮樂束以名教區區未幾忽成白首身苟逝矣虚名何益因仰挹霞津内融眞寂呼吸道氣欲及其和後遇正一眞人授以瓊文紫字天眞上訣勤行佩服遂通神明忽爾騰昇廣記昌容入恒山修煉自號昌容子二百餘歲其顔愈紅如二十許一云商王女食蓬蔂根往來上下世世人見之通元望闕徐則還山墨客揮犀眞廟時有道士紫通元者居陜州承天觀壽百餘歲耐寒暑日縱酒往往不食祀汾陰隨輦自羅山至太一洞一日臨終召官寮士庶言死生之要夜分盥濯望闕而逝舉體甚輕若蟬蛻焉仇池筆記東海徐則隱居天台絶粒養性太極眞人徐君降曰汝年八十當爲王者師然後得道晉王廣聞名召之則曰吾今年八十三來召我徐君之言驗矣遂詣楊州王請授道辭以時日不利後數日死道路皆見其徒步還山云得放還乃得經書分遺弟子而去左徹朝像高遠辭帝仙傳拾遺左徹黃帝臣也黃帝升天徹刻木爲黃帝之像率諸侯而朝之七年黃帝不還徹顓帝時亦登仙而去人間刻木爲象自此始也仙傳拾遺蒲高逺者巴西人黃籙先生王普進之弟子也言意詭譎持操無準皆謂之狂大同十二年七月十六日於南峰絶頂乘雲徑諸金陵辭謁梁武帝方宴坐忽集其殿帝問其故對曰夐居巴西得道上清將歸天來辭帝耳言畢飛去時益州刺史王蕭紀以事上奏帝亦詔問命郎中劉孝先撰碑旌其事跡今尚存焉韓泳策蹇子真乘驥采異記古成之自廣次于湘潭聞有韓泳者高人乃謁之韓一見若故人謂曰君有道氣可罷此行否古以干禄爲辭韓曰子此行必成名他日可於京師閶闔門外相見乃别去至次春成之果登第暇日有故出閶闔門見一人策蹇目之乃泳也成之記前約乃大神之相與市飲韓乃贈詩云德行文章已出群的將仙道付於君浮名若乃眞休得占取閑中一片雲復别去自此絶無音問古其後不食亦頗有奇異焉高道傳潘師正奉母至孝母喪乃廬于墓側道士劉愛道見而奇之云三清之驥非汝誰乘之邪景度玉冠紫元錦帔王氏神仙傳王司王君諱景度衣絳章單衣九色鳳章頭戴太天飛神玉冠手執九色之節治南朱陽之臺主人生死之籍知其名存其神修行九年致神草不死之藥丹霞飛雲下迎兆身上昇玉清宫矣又南極王夫人王母第四女也號紫元夫人著錦帔青羽裙漢平帝時常降於陽洛山石室中道成始珍屬文可記高道傳張始珍居南嶽遇神人授以明鑑之道使修之曰夫照物理者天也照物形者鑑也天之道以清鑑之道以明人能存天清鑑明澄心静神而内外調暢至道成矣若以内役其志外勞其形心不澄神不清則至道遠矣古人所謂虚其室白自生定其心道自至始珍修之九年道成上補眞人於梁天監中白日上昇續仙傳金可記新羅人博學善屬文入終南山務行陰德唐大中十一年十二月忽上表言臣奉玉皇詔爲英文臺侍郎二月二十五日當上昇宣宗遣使召入内固辭不就又求見玉皇詔辭以别仙所掌不留人間遂賜宫女四人香藥金綵又遣中使二人看侍至二月二十五日春景明媚花卉爛熳天有五雲唳鶴翔鸞白鵠笙簫金石羽蓋瓊輪旛幢滿空仙仗昇天而去入聖超凡積功所致筆此仙蹤永昭盛世三洞羣仙録卷之二十
